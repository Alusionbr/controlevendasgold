<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://zcwnfrhtlhjfprsjktlx.supabase.co; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <title>Controle360 Multi — Estoque, CMV, Produção, Vendas e Consignados</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <p class="eyebrow">Conta com login · dados sincronizados na nuvem</p>
      <h1>Controle360 <span>Multi</span></h1>
      <p>Estoque, ficha técnica, custo de produto, vendas, pedidos, tarefas e consignados — com admin e vendedores em contas separadas.</p>
    </div>
    <div class="header-actions" id="headerActions" hidden>
      <button id="btnExport" class="secondary">Baixar Excel</button>
      <button id="btnDataTab" class="ghost">Backup e exportação</button>
      <button id="btnLogout" class="ghost">Sair</button>
    </div>
  </header>

  <div id="authRoot"></div>

  <main class="app-shell" id="appShell" hidden>
    <section class="business-bar" aria-label="Negócio ativo">
      <div>
        <label for="activeBusiness">Negócio ativo</label>
        <select id="activeBusiness"></select>
      </div>
      <button id="btnReset" class="danger ghost">Zerar dados locais</button>
    </section>

    <section id="dashboard" class="dashboard"></section>

    <nav class="tabs" id="tabsBar" aria-label="Módulos do sistema"></nav>

    <section id="view" class="view"></section>
  </main>

  <nav class="bottom-nav" id="bottomNav" aria-label="Navegação principal" hidden></nav>

  <div class="more-menu" id="moreMenu" hidden>
    <div class="more-menu-backdrop" data-more-menu-close></div>
    <div class="more-menu-sheet" role="dialog" aria-modal="true" aria-label="Mais opções">
      <header>
        <strong>Mais</strong>
        <button type="button" class="ghost small" data-more-menu-close aria-label="Fechar">Fechar</button>
      </header>
      <div class="more-menu-list" id="moreMenuList"></div>
    </div>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <strong>Nenhum registro ainda.</strong>
      <span>Cadastre os itens necessários para começar. O sistema não vem com exemplos preenchidos.</span>
    </div>
  </template>

  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <script src="src/utils.js"></script>
  <script src="src/api.js"></script>
  <script src="src/state.js"></script>
  <script src="src/calculations.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/auth.js"></script>
  <script src="src/pricing.js"></script>
  <script src="src/returns.js"></script>
  <script src="src/sellerStock.js"></script>
  <script src="src/calculator.js"></script>
  <script src="src/salesCart.js"></script>
  <script src="src/sellerLedger.js"></script>
  <script src="src/goals.js"></script>
  <script src="src/sellerHelp.js"></script>
  <script src="src/xlsx-lite.js"></script>
  <script src="src/exportImport.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
