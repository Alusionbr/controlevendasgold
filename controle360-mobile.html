        U.qty(sale.quantity, product && product.unit),
        UI.moneyCell(sale.netRevenue),
        UI.moneyCell(sale.cogs),
        UI.moneyCell(sale.grossProfit),
      ];
    });
    const consignments = consignmentsFor(sellerId).filter((row) => U.number(row.quantitySent) > 0);
    const consRows = consignments.map((item) => {
      const product = productById(item.productId);
      return [
        U.escapeHtml(item.date || '—'),
        UI.productName(product),
        U.qty(item.quantitySent, product && product.unit),
        U.qty(item.quantitySold, product && product.unit),
        UI.moneyCell(Calc.consignmentOpenAmount(item)),
      ];
    });
    return `
      <h3>Vendas do vendedor</h3>
      ${UI.table(['Data', 'Canal', 'Cliente', 'Produto', 'Qtd.', 'Receita líquida', 'CMV', 'Lucro'], rows, 'Este vendedor ainda não tem vendas.')}
      <h3>Consignações</h3>
      ${UI.table(['Data', 'Produto', 'Enviado', 'Vendido', 'Em aberto'], consRows, 'Nenhuma consignação com este vendedor.')}
    `;
  }

  function renderEstoque(sellerId) {
    const stockRows = stockFor(sellerId).map((row) => {
      const product = productById(row.productId);
      return [
        product ? U.escapeHtml(product.name) : 'Produto removido',
        U.qty(row.quantity, product ? product.unit : ''),
      ];
    });
    const products = productOptionsForConsignment();
    return `
      <h3>Enviar estoque consignado</h3>
      <p class="cockpit-hint">Baixa do estoque central, credita o estoque do vendedor e gera dívida no valor enviado (${UI.help('consignado')}).</p>
      <form class="grid-form compact-form" data-cockpit-consign>
        <label>Produto
          <select name="productId" required>${UI.optionList(products, '', products.length ? 'Selecione o produto' : 'Nenhum produto cadastrado')}</select>
        </label>
        <label>Quantidade
          <input name="quantity" type="number" step="0.001" min="0.001" required>
        </label>
        <label>Preço unitário (dívida)
          <input name="unitPrice" type="number" step="0.01" min="0" required>
        </label>
        <button type="submit" class="small">Enviar consignado</button>
      </form>
      <h3>Estoque atual do vendedor</h3>
      ${UI.table(['Produto', 'Quantidade'], stockRows, 'Nenhum estoque com este vendedor.')}
    `;
  }

  function renderSaldo(sellerId) {
    const L = ledger();
    const balance = L ? L.balanceFor(sellerId) : 0;
    const entries = L ? L.entriesForSeller(sellerId).slice(0, 20) : [];
    const payments = (state().sellerPayments || [])
      .filter((payment) => String(payment.sellerId) === String(sellerId)).slice(0, 10);
    const typeLabel = {
      debit_replenishment: 'Reposição', payment: 'Pagamento', return_credit: 'Devolução',
      manual_adjustment: 'Ajuste manual', writeoff: 'Baixa de dívida', bonus_credit: 'Bonificação',
    };
    const entryRows = entries.map((entry) => {
      const signed = entry.direction === 'credit' ? -U.number(entry.amount) : U.number(entry.amount);
      return [
        (entry.createdAt || '').slice(0, 10),
        U.escapeHtml(typeLabel[entry.type] || entry.type),
        UI.badge(entry.direction === 'credit' ? 'Crédito' : 'Débito', entry.direction === 'credit' ? 'ok' : ''),
        U.escapeHtml(entry.notes || ''),
        `<strong>${signed < 0 ? '- ' : ''}${U.money(Math.abs(signed))}</strong>`,
      ];
    });
    return `
      ${UI.metric(balance > 0 ? 'Deve ao admin' : 'Situação', balance > 0 ? U.money(balance) : 'Em dia', null)}
      <h3>Registrar pagamento recebido</h3>
      <form class="grid-form compact-form" data-cockpit-payment>
        <label>Valor recebido
          <input name="amount" type="number" step="0.01" min="0.01" required>
        </label>
        <label>Forma
          <input name="method" placeholder="Pix, dinheiro...">
        </label>
        <label class="wide">Observação
          <input name="notes" placeholder="Opcional">
        </label>
        <button type="submit" class="small">Registrar pagamento</button>
      </form>
      <h3>Histórico do saldo</h3>
      ${UI.table(['Data', 'Tipo', '', 'Nota', 'Valor'], entryRows, 'Nenhum lançamento ainda.')}
      <h3>Pagamentos registrados</h3>
      ${UI.table(['Data', 'Forma', 'Nota', 'Valor'], payments.map((payment) => [
        (payment.paymentDate || '').slice(0, 10),
        U.escapeHtml(payment.method || '—'),
        U.escapeHtml(payment.notes || ''),
        UI.moneyCell(payment.amount),
      ]), 'Nenhum pagamento registrado ainda.')}
    `;
  }

  function renderPedidos(sellerId) {
    const groups = groupsFor(sellerId);
    const statusLabel = {
      pendente: 'Pendente', em_preparo: 'Em montagem', pronto: 'Pronto',
      despachado: 'Despachado', concluido: 'Concluído',
    };
    const cards = groups
      .filter((group) => group.approvalStatus !== 'rejeitado')
      .map((group) => {
        const pending = group.approvalStatus === 'pendente_aprovacao';
        const items = group.rows.map((order) => {
          const product = productById(order.productId);
          return `<li><span>${U.escapeHtml(product ? product.name : 'Produto')}</span><strong>${U.qty(order.quantity, product && product.unit)}</strong></li>`;
        }).join('');
        const actions = pending
          ? `<div class="actions">
              <button type="button" class="small" data-cockpit-approve="${U.escapeHtml(group.key)}">Aprovar</button>
              <button type="button" class="small danger" data-cockpit-reject="${U.escapeHtml(group.key)}">Rejeitar</button>
            </div>`
          : UI.badge(statusLabel[group.status] || group.status, group.status === 'concluido' ? 'ok' : '');
        return `
          <article class="panel-card cockpit-order-card ${pending ? 'board-card-pending' : ''}">
            <div class="approval-card-head">
              <strong>${U.escapeHtml(({ avista: 'À vista', parcial: 'Parcial', consignado: 'Consignado' })[group.paymentMode] || 'Pedido')}</strong>
              ${pending ? UI.badge('Aguardando aprovação', 'warn') : ''}
            </div>
            <ul class="board-card-items">${items}</ul>
            <div class="board-card-foot"><span>Total</span><strong>${U.money(group.total)}</strong></div>
            ${actions}
          </article>`;
      }).join('');
    return `
      <h3>Pedidos do vendedor</h3>
      <p class="cockpit-hint">Aprove ou rejeite as reposições pedidas por este vendedor. Depois de aprovado, o despacho acontece na esteira em Vendas.</p>
      ${cards ? `<div class="cockpit-order-grid">${cards}</div>` : UI.formNotice('Nenhum pedido deste vendedor.', 'info')}
    `;
  }

  function renderDevolucoes(sellerId) {
    const movements = movementsFor(sellerId).slice(0, 20);
    const kindLabel = { devolucao: 'Devolução', desperdicio: 'Desperdício', brinde: 'Brinde' };
    const statusLabel = { a_devolver: 'A devolver', pending: 'Aguardando', reviewed: 'Conferido', rejected: 'Rejeitado' };
    const rows = movements.map((movement) => {
      const product = productById(movement.productId);
      return [
        (movement.createdAt || '').slice(0, 10),
        U.escapeHtml(kindLabel[movement.kind] || movement.kind || '—'),
        UI.productName(product),
        U.qty(movement.quantity, product && product.unit),
        UI.badge(statusLabel[movement.status] || movement.status || '—', ['a_devolver', 'pending'].includes(movement.status) ? 'warn' : 'ok'),
      ];
    });
    return `
      <h3>Devoluções, desperdícios e brindes</h3>
      ${UI.table(['Data', 'Tipo', 'Produto', 'Qtd.', 'Status'], rows, 'Nada registrado para este vendedor.')}
      <p class="cockpit-hint">A conferência (que dá baixa no estoque/dívida) é feita na fila do admin.</p>
      <button type="button" class="small secondary" data-cockpit-goto="devolucoes">Abrir fila de conferência</button>
    `;
  }

  function renderSection(sellerId) {
    switch (activeSection) {
      case 'vendas': return renderVendas(sellerId);
      case 'estoque': return renderEstoque(sellerId);
      case 'saldo': return renderSaldo(sellerId);
      case 'pedidos': return renderPedidos(sellerId);
      case 'devolucoes': return renderDevolucoes(sellerId);
      default: return renderResumo(sellerId);
    }
  }

  // ---------------------------------------------------------------------
  // Montagem
  // ---------------------------------------------------------------------
  function mount(container, sellerId, options = {}) {
    if (!container) return;
    if (String(sellerId) !== String(activeSellerId)) {
      activeSellerId = sellerId;
      activeSection = 'resumo';
    }
    let feedback = null;

    function paint() {
      const seller = sellerProfile(sellerId);
      const L = ledger();
      const balance = L ? L.balanceFor(sellerId) : 0;
      const nav = SECTIONS.map((section) => `
        <button type="button" class="cockpit-tab ${section.id === activeSection ? 'active' : ''}" data-cockpit-section="${section.id}">${U.escapeHtml(section.label)}</button>
      `).join('');
      container.innerHTML = `
        <div class="cockpit">
          <div class="cockpit-head">
            <button type="button" class="link-button" data-cockpit-back>← Voltar aos vendedores</button>
            <div class="cockpit-title">
              <h2>${U.escapeHtml((seller && seller.name) || 'Vendedor')}</h2>
              <p>${U.escapeHtml((seller && seller.email) || '')}${balance > 0 ? ` · ${UI.badge('Deve ' + U.money(balance), 'danger')}` : ` · ${UI.badge('Em dia', 'ok')}`}</p>
            </div>
          </div>
          <nav class="cockpit-nav">${nav}</nav>
          ${feedback ? UI.formNotice(feedback.message, feedback.type) : ''}
          <div class="cockpit-body">${renderSection(sellerId)}</div>
        </div>
      `;
    }

    async function withFeedback(fn, okMessage) {
      try {
        await fn();
        feedback = { message: okMessage, type: 'success' };
      } catch (error) {
        feedback = { message: (error && error.message) || 'Não foi possível concluir a ação.', type: 'danger' };
      }
      paint();
    }

    container.addEventListener('click', async (event) => {
      const back = event.target.closest('[data-cockpit-back]');
      if (back) { if (typeof options.onBack === 'function') options.onBack(); return; }

      const tab = event.target.closest('[data-cockpit-section]');
      if (tab) { activeSection = tab.dataset.cockpitSection; feedback = null; paint(); return; }

      const goto = event.target.closest('[data-cockpit-goto]');
      if (goto) {
        if (window.C360.app && typeof window.C360.app.setTab === 'function') window.C360.app.setTab(goto.dataset.cockpitGoto);
        return;
      }

      const approve = event.target.closest('[data-cockpit-approve]');
      if (approve) {
        await withFeedback(() => cart().approveGroup(approve.dataset.cockpitApprove), 'Pedido aprovado e despachado. O estoque ja esta com o vendedor.');
        return;
      }
      const reject = event.target.closest('[data-cockpit-reject]');
      if (reject) {
        if (!confirm('Rejeitar este pedido?')) return;
        await withFeedback(() => cart().rejectGroup(reject.dataset.cockpitReject), 'Pedido rejeitado.');
        return;
      }
    });

    container.addEventListener('submit', async (event) => {
      const consignForm = event.target.closest('[data-cockpit-consign]');
      if (consignForm) {
        event.preventDefault();
        const data = U.formData(consignForm);
        await withFeedback(() => cart().sendConsignmentToSeller({
          sellerId,
          productId: data.productId,
          quantity: data.quantity,
          unitPrice: data.unitPrice,
        }), 'Consignado enviado. Estoque baixado e dívida lançada no saldo do vendedor.');
        return;
      }

      const paymentForm = event.target.closest('[data-cockpit-payment]');
      if (paymentForm) {
        event.preventDefault();
        const data = U.formData(paymentForm);
        const L = ledger();
        if (!L || typeof L.registerPayment !== 'function') { feedback = { message: 'Registro de pagamento indisponível.', type: 'danger' }; paint(); return; }
        await withFeedback(() => L.registerPayment(sellerId, { amount: data.amount, method: data.method, notes: data.notes }), 'Pagamento registrado.');
        return;
      }
    });

    paint();
  }

  window.C360.sellerCockpit = { mount };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Devolução com status, desperdício e brinde (Fase 4 do pacote de
  // replicação — ver docs/replication-v1/05-fase4-devolucoes-desperdicio-brinde.md).
  //
  // Regra central: "a_devolver"/"pending" NÃO mexe em estoque nem
  // financeiro. Só a CONFERÊNCIA do admin dispara o impacto. Por isso não
  // há RPC de banco aqui — confirmar é sempre uma ação do admin logado
  // (mesmo padrão de src/salesCart.js approveCart / src/sellerLedger.js).
  //
  // Distinto de src/returns.js: aquele módulo é para devolução/desperdício
  // IMEDIATOS a partir de uma venda direta (dinheiro e estoque voltam na
  // hora). Este módulo é para mercadoria que está fisicamente com o
  // vendedor (reposição/consignado) voltando, se perdendo ou virando
  // brinde — sempre passando por conferência do admin antes de valer.
  // ==========================================================================

  const TYPE_LABELS = { return: 'Devolução', waste: 'Desperdício', gift: 'Brinde' };
  const RETURN_STATUS_LABELS = {
    a_devolver: 'A devolver', enviado: 'Enviado', recebido: 'Recebido',
    devolvido: 'Devolvido', devolvido_parcialmente: 'Devolvido parcialmente', recusado: 'Recusado',
  };
  const SIMPLE_STATUS_LABELS = { pending: 'Pendente', confirmed: 'Confirmado', cancelled: 'Cancelado' };

  function S() { return window.C360.state; }
  function state() { return S().getState(); }
  function user() { return S().getCurrentUser(); }
  function productById(id) { return (state().products || []).find((item) => String(item.id) === String(id)) || null; }
  function sellerName(id) {
    const profile = (state().profiles || []).find((item) => String(item.id) === String(id));
    return profile ? profile.name : 'Vendedor';
  }
  function sellerStockRow(sellerId, productId) {
    return (state().sellerStock || []).find((row) => String(row.sellerId) === String(sellerId) && String(row.productId) === String(productId)) || null;
  }
  function assertSellerStockAvailable(sellerId, productId, quantity) {
    if (!sellerId) return null;
    const current = sellerStockRow(sellerId, productId);
    const available = U.number(current?.quantity);
    if (!current || available < U.number(quantity)) {
      const product = productById(productId);
      throw new Error(`Estoque proprio insuficiente para ${product ? product.name : 'este produto'}. Disponivel: ${U.qty(available, product?.unit)}.`);
    }
    return current;
  }

  function statusLabel(movement) {
    const map = movement.type === 'return' ? RETURN_STATUS_LABELS : SIMPLE_STATUS_LABELS;
    return map[movement.status] || movement.status;
  }

  function statusBadgeType(movement) {
    if (['devolvido', 'confirmed'].includes(movement.status)) return 'ok';
    if (['recusado', 'cancelled'].includes(movement.status)) return 'danger';
    return '';
  }

  // ---------------------------------------------------------------------
  // Efeito real (estoque + financeiro) — só chamado na conferência.
  // ---------------------------------------------------------------------
  async function decrementSellerStock(sellerId, productId, quantity) {
    const current = assertSellerStockAvailable(sellerId, productId, quantity);
    const nextQuantity = U.number(current.quantity) - U.number(quantity);
    await S().update('sellerStock', current.id, { quantity: nextQuantity });
  }

  async function applyMovementEffects(movement, { quantityReceived, unitValue, affectsFinance }) {
    const qty = U.number(quantityReceived);
    if (qty <= 0) return;
    const product = productById(movement.productId);
    if (!product) throw new Error('Produto não encontrado.');

    if (movement.type === 'return') {
      // Mercadoria consignada/reposição volta do vendedor para o estoque
      // central do admin — sempre incrementa products.currentStock e gera
      // o mesmo tipo de movimento já usado em outros retornos consignados.
      if (movement.sellerId) await decrementSellerStock(movement.sellerId, movement.productId, qty);
      await S().update('products', product.id, { currentStock: U.number(product.currentStock) + qty });
      await S().recordMovement({
        date: U.today(),
        type: 'entrada_devolucao_consignado',
        productId: product.id,
        quantity: qty,
        unitCost: U.number(product.avgCost),
        totalCost: qty * U.number(product.avgCost),
        refType: 'operational_movement',
        refId: movement.id,
        notes: `Devolução conferida${movement.reason ? ` - ${movement.reason}` : ''}`,
      });
      if (affectsFinance && movement.sellerId) {
        const total = qty * U.number(unitValue);
        if (total > 0) {
          await S().add('sellerAccountEntries', {
            sellerId: movement.sellerId,
            type: 'return_credit',
            direction: 'credit',
            amount: total,
            sourceType: 'operational_movement',
            sourceId: movement.id,
            notes: `Devolução conferida (${U.qty(qty, product.unit)})`,
          });
        }
      }
      return;
    }

    // waste | gift: se a mercadoria era do estoque próprio do vendedor, só
    // sai de lá (o central já tinha sido baixado no envio consignado); se
    // era do estoque central do admin, baixa direto e gera stock_movements
    // (mesmo padrão de src/returns.js recordDesperdicio).
    if (movement.sellerId) {
      await decrementSellerStock(movement.sellerId, movement.productId, qty);
      return;
    }
    await S().update('products', product.id, { currentStock: Math.max(U.number(product.currentStock) - qty, 0) });
    await S().recordMovement({
      date: U.today(),
      type: movement.type === 'waste' ? 'saida_desperdicio' : 'saida_brinde',
      productId: product.id,
      quantity: -qty,
      unitCost: U.number(product.avgCost),
      totalCost: -(qty * U.number(product.avgCost)),
      refType: 'operational_movement',
      refId: movement.id,
      notes: `${movement.type === 'waste' ? 'Desperdício' : 'Brinde'} conferido${movement.reason ? ` - ${movement.reason}` : ''}`,
    });
  }

  async function confirmMovement(movement, { quantityReceived, unitValue, affectsFinance }) {
    const qty = U.number(quantityReceived);
    const declared = U.number(movement.quantityDeclared);
    const status = movement.type === 'return'
      ? (qty <= 0 ? 'recusado' : (qty < declared ? 'devolvido_parcialmente' : 'devolvido'))
      : (qty <= 0 ? 'cancelled' : 'confirmed');

    await applyMovementEffects(movement, { quantityReceived: qty, unitValue, affectsFinance });
    await S().update('operationalMovements', movement.id, {
      status,
      quantityReceived: qty,
      unitValue: U.number(unitValue),
      totalValue: qty * U.number(unitValue),
      affectsFinance: !!affectsFinance,
      approvedBy: user()?.id || null,
      confirmedAt: new Date().toISOString(),
    });
    await S().refresh();
  }

  async function rejectMovement(movement) {
    await S().update('operationalMovements', movement.id, {
      status: movement.type === 'return' ? 'recusado' : 'cancelled',
      approvedBy: user()?.id || null,
      confirmedAt: new Date().toISOString(),
    });
    await S().refresh();
  }

  // ---------------------------------------------------------------------
  // Vendedor — solicitar + acompanhar (só leitura depois de criado)
  // ---------------------------------------------------------------------
  function movementRow(movement) {
    const product = productById(movement.productId);
    return [
      U.escapeHtml(TYPE_LABELS[movement.type] || movement.type),
      UI.badge(statusLabel(movement), statusBadgeType(movement)),
      U.escapeHtml(product ? product.name : 'Produto removido'),
      U.qty(movement.quantityDeclared, product?.unit),
      U.escapeHtml(movement.reason || ''),
      (movement.createdAt || '').slice(0, 10),
    ];
  }

  function renderSellerForm(feedback) {
    const ownStockIds = new Set((state().sellerStock || [])
      .filter((row) => U.number(row.quantity) > 0)
      .map((row) => String(row.productId)));
    const products = (state().products || [])
      .filter((product) => product.type !== 'servico' && ownStockIds.has(String(product.id)));
    const productSelect = UI.optionList(products, '', products.length ? 'Produto' : 'Sem estoque proprio');
    return `
      ${feedback ? UI.formNotice(feedback.message, feedback.type) : ''}
      <form class="grid-form" data-om-form novalidate>
        <label>Tipo
          <select name="type">
            <option value="return">Devolução (ao admin)</option>
            <option value="waste">Desperdício</option>
            <option value="gift">Brinde</option>
          </select>
        </label>
        <label>Produto
          <select name="productId" required>${productSelect}</select>
        </label>
        <label>Quantidade
          <input name="quantityDeclared" type="number" step="0.001" min="0.001" required>
        </label>
        <label class="wide">Motivo
          <input name="reason" required placeholder="Ex.: cliente desistiu, caiu no chão, amostra para cliente">
        </label>
        <label class="wide">Observações
          <input name="notes" placeholder="Opcional">
        </label>
        <button type="submit">Registrar</button>
      </form>
    `;
  }

  function renderSellerList() {
    const currentUser = user();
    const movements = (state().operationalMovements || []).filter((movement) => String(movement.sellerId) === String(currentUser?.id));
    return UI.section(
      'Minhas devoluções, desperdícios e brindes',
      '"A devolver"/pendente não altera estoque nem financeiro — só depois que o admin confere.',
      UI.table(['Tipo', 'Status', 'Produto', 'Qtd.', 'Motivo', 'Data'], movements.map(movementRow), 'Nenhuma movimentação ainda.')
    );
  }

  function mountSeller(container) {
    if (!container) return;
    let feedback = null;

    function paint() {
      container.innerHTML = renderSellerForm(feedback) + renderSellerList();
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-om-form]');
      if (!form) return;
      event.preventDefault();
      const data = U.formData(form);
      try {
        const currentUser = user();
        const qty = U.number(data.quantityDeclared);
        if (!currentUser) throw new Error('Entre na sua conta antes de registrar.');
        if (qty <= 0) throw new Error('Informe uma quantidade maior que zero.');
        if (!data.productId) throw new Error('Selecione um produto.');
        if (!data.reason || !data.reason.trim()) throw new Error('Informe o motivo.');
        assertSellerStockAvailable(currentUser.id, data.productId, qty);
        await S().add('operationalMovements', {
          type: data.type,
          status: data.type === 'return' ? 'a_devolver' : 'pending',
          productId: data.productId,
          quantityDeclared: qty,
          reason: data.reason.trim(),
          notes: data.notes || '',
          affectsStock: true,
        });
        await S().refresh();
        feedback = { message: 'Registrado. Aguarde a conferência do admin.', type: 'success' };
        form.reset();
      } catch (error) {
        feedback = { message: error.message, type: 'danger' };
      }
      paint();
    });

    paint();
  }

  // ---------------------------------------------------------------------
  // Admin — fila de conferência
  // ---------------------------------------------------------------------
  function renderAdminQueue(feedback) {
    const pending = (state().operationalMovements || []).filter((movement) => ['a_devolver', 'pending'].includes(movement.status));
    const cards = pending.map((movement) => {
      const product = productById(movement.productId);
      const sellerLabel = movement.sellerId ? sellerName(movement.sellerId) : 'Estoque do admin';
      return `
        <article class="panel-card om-card" data-om-card="${U.escapeHtml(movement.id)}">
          <div class="approval-card-head">
            <strong>${U.escapeHtml(TYPE_LABELS[movement.type] || movement.type)}</strong>
            ${UI.badge(statusLabel(movement))}
          </div>
          <p>Vendedor: <strong>${U.escapeHtml(sellerLabel)}</strong> — Produto: <strong>${U.escapeHtml(product ? product.name : 'Removido')}</strong></p>
          <p>Solicitado: <strong>${U.qty(movement.quantityDeclared, product?.unit)}</strong> — Motivo: ${U.escapeHtml(movement.reason || '')}</p>
          <form class="grid-form compact-form" data-om-confirm-form>
            <label>Qtd. recebida/confirmada
              <input name="quantityReceived" type="number" step="0.001" min="0" value="${U.escapeHtml(movement.quantityDeclared)}">
            </label>
            ${movement.type === 'return' ? `
              <label>Valor unitário (para o crédito)
                <input name="unitValue" type="number" step="0.01" min="0" value="${U.escapeHtml(product?.avgCost || 0)}">
              </label>
              <label class="wide"><input type="checkbox" name="affectsFinance" ${movement.sellerId ? 'checked' : ''}> Abater da dívida do vendedor</label>
            ` : ''}
            <div class="actions">
              <button type="submit">Confirmar</button>
              <button type="button" class="danger" data-om-reject="${U.escapeHtml(movement.id)}">Recusar</button>
            </div>
          </form>
        </article>
      `;
    }).join('');
    return UI.section(
      'Devoluções, desperdícios e brindes',
      '"A devolver"/pendente não mexe em estoque nem financeiro até você conferir.',
      `${feedback ? UI.formNotice(feedback.message, feedback.type) : ''}<div class="om-admin-list">${cards || '<div class="empty-state"><strong>Nada aguardando conferência.</strong></div>'}</div>`
    );
  }

  function mountAdmin(container, options = {}) {
    if (!container) return;
    let feedback = null;

    function paint() {
      container.innerHTML = renderAdminQueue(feedback);
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-om-confirm-form]');
      if (!form) return;
      event.preventDefault();
      const card = form.closest('[data-om-card]');
      const movement = (state().operationalMovements || []).find((item) => String(item.id) === card?.dataset.omCard);
      if (!movement) return;
      const data = U.formData(form);
      try {
        await confirmMovement(movement, {
          quantityReceived: data.quantityReceived,
          unitValue: data.unitValue,
          affectsFinance: !!data.affectsFinance,
        });
        feedback = { message: 'Movimentação conferida.', type: 'success' };
      } catch (error) {
        feedback = { message: error.message, type: 'danger' };
      }
      paint();
      if (typeof options.onDone === 'function') options.onDone();
    });

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-om-reject]');
      if (!button) return;
      if (!confirm('Recusar esta movimentação?')) return;
      const movement = (state().operationalMovements || []).find((item) => String(item.id) === button.dataset.omReject);
      if (!movement) return;
      try {
        await rejectMovement(movement);
        feedback = { message: 'Movimentação recusada.', type: 'warning' };
      } catch (error) {
        feedback = { message: error.message, type: 'danger' };
      }
      paint();
      if (typeof options.onDone === 'function') options.onDone();
    });

    paint();
  }

  window.C360.operationalMovements = { mountAdmin, mountSeller };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Metas de vendas (semanais/mensais) com premiação — módulo autocontido.
  //
  // API remota esperada (implementada por outro agente em window.C360.api).
  // Este módulo checa a existência de cada método antes de chamar e cai em
  // um placeholder inofensivo quando ela ainda não existe:
  //
  //   C360.api.listSellers()                 -> Promise<Array<{ id, name }>>
  //   C360.api.listSalesGoals(params?)        -> Promise<Array<SalesGoal>>
  //   C360.api.listGoalsProgress(params?)      -> Promise<Array<GoalProgress>>
  //   C360.api.createSalesGoal(payload)        -> Promise<SalesGoal>
  //   C360.api.updateSalesGoal(id, patch)      -> Promise<SalesGoal>
  //   C360.api.deleteSalesGoal(id)             -> Promise<void>
  //
  //   params (opcional em listSalesGoals/listGoalsProgress): { sellerId }
  //
  //   SalesGoal (linha de public.sales_goals, ver supabase/migrations/0002_goals.sql):
  //     { id, seller_id, period_type: 'semana'|'mes', period_start, period_end,
  //       target_amount, reward_description, reward_value, achieved, achieved_at }
  //
  //   GoalProgress (linha da view public.sales_goals_progress):
  //     { goal_id, seller_id, period_type, period_start, period_end, target_amount,
  //       reward_description, reward_value, achieved_amount, progress_pct, is_achieved }
  //
  // Contexto do usuário logado (opcional, usado por mountSeller quando
  // options.sellerId não é informado):
  //   C360.state.getCurrentUser() -> { id, name, role, businessId } | null
  // ==========================================================================

  const PERIOD_TYPES = [
    { value: 'semana', label: 'Semana' },
    { value: 'mes', label: 'Mês' },
  ];

  // ---------------------------------------------------------------------
  // Datas
  // ---------------------------------------------------------------------
  function pad2(value) {
    return String(value).padStart(2, '0');
  }

  function parseDateLocal(dateStr) {
    const [year, month, day] = String(dateStr || '').split('-').map(Number);
    return new Date(year, (month || 1) - 1, day || 1);
  }

  function formatDateLocal(date) {
    return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
  }

  function addDays(dateStr, days) {
    if (!dateStr) return '';
    const date = parseDateLocal(dateStr);
    date.setDate(date.getDate() + days);
    return formatDateLocal(date);
  }

  function endOfMonth(dateStr) {
    if (!dateStr) return '';
    const date = parseDateLocal(dateStr);
    const end = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    return formatDateLocal(end);
  }

  // Regra pedida: semana = início + 7 dias; mês = fim do mês do início.
  function suggestPeriodEnd(periodType, startDate) {
    if (!startDate) return '';
    return periodType === 'mes' ? endOfMonth(startDate) : addDays(startDate, 7);
  }

  // ---------------------------------------------------------------------
  // Estilos (injetados uma única vez; o módulo não edita styles/main.css).
  // Novas variáveis --accent-gold* usam fallback inline via var(--x, #hex)
  // para funcionar standalone; se o tema oficial definir essas variáveis em
  // styles/main.css, o valor real do tema prevalece automaticamente.
  // ---------------------------------------------------------------------
  const STYLE_ID = 'c360-goals-inline-styles';

  function ensureStyles() {
    if (document.getElementById(STYLE_ID)) return;
    const style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = `
      .goals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.85rem; margin-bottom: 1.2rem; }
      .goals-seller-group { margin-bottom: 1.4rem; }
      .goals-seller-name { font-size: 1rem; font-weight: 700; color: var(--ink, #14302f); margin-bottom: 0.6rem; }
      .goals-seller-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
      .goal-card {
        background: var(--surface, #fff);
        border: 1px solid var(--line, #d8e1df);
        border-radius: var(--radius, 14px);
        padding: 1rem;
        box-shadow: var(--shadow-sm, 0 4px 14px rgba(12, 60, 56, 0.07));
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .goal-card--achieved {
        border-color: var(--accent-gold, #c9a227);
        background: linear-gradient(180deg, var(--accent-gold-soft, #faf1d4), var(--surface, #fff) 65%);
      }
      .goal-card-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
      .goal-period { font-size: 0.8rem; color: var(--muted, #5d6f6d); margin: 0; }
      .goal-badge-gold { background: var(--accent-gold-soft, #faf1d4); color: var(--accent-gold-deep, #8a6f14); }
      .goal-progress { display: flex; flex-direction: column; gap: 0.35rem; }
      .goal-progress-bar {
        position: relative;
        height: 10px;
        border-radius: 999px;
        background: var(--surface-soft, #f6f8f7);
        border: 1px solid var(--line, #d8e1df);
        overflow: hidden;
      }
      .goal-progress-bar--lg { height: 14px; }
      .goal-progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        height: 100%;
        border-radius: 999px;
        background: var(--accent, #c9610c);
        transition: width 0.4s ease;
      }
      .goal-progress-fill--gold { background: linear-gradient(90deg, var(--accent-gold-deep, #8a6f14), var(--accent-gold, #c9a227)); }
      .goal-progress-label { font-size: 0.78rem; color: var(--muted, #5d6f6d); font-variant-numeric: tabular-nums; }
      .goal-reward { font-size: 0.85rem; margin: 0; }
      .goal-incentive { font-size: 0.88rem; color: var(--muted, #5d6f6d); margin: 0; }
      .goal-reward-highlight { font-size: 0.9rem; margin: 0.2rem 0 0; }
      .goal-celebrate {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
        padding: 0.6rem 0.7rem;
        border-radius: var(--radius-sm, 10px);
        background: var(--accent-gold-soft, #faf1d4);
        color: var(--accent-gold-deep, #8a6f14);
        animation: c360GoalPulse 1.8s ease-in-out infinite;
      }
      .goal-trophy { font-size: 1.3rem; line-height: 1; }
      @keyframes c360GoalPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(201, 162, 39, 0.35); }
        50% { box-shadow: 0 0 0 6px rgba(201, 162, 39, 0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .goal-celebrate { animation: none; }
        .goal-progress-fill { transition: none; }
      }
    `;
    document.head.appendChild(style);
  }

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.api / C360.state
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function hasApi(method) {
    return !!(api() && typeof api()[method] === 'function');
  }

  async function safeCall(method, ...args) {
    if (!hasApi(method)) return null;
    try {
      return await api()[method](...args);
    } catch (error) {
      console.error(`C360.goals: erro ao chamar C360.api.${method}`, error);
      return null;
    }
  }

  function currentUser() {
    try {
      if (window.C360.state && typeof window.C360.state.getCurrentUser === 'function') {
        return window.C360.state.getCurrentUser() || null;
      }
    } catch (error) {
      console.error('C360.goals: erro ao ler usuário atual', error);
    }
    return null;
  }

  // ---------------------------------------------------------------------
  // Render — admin
  // ---------------------------------------------------------------------
  function adminForm(sellers, editingGoal) {
    const defaults = editingGoal || {};
    const periodType = defaults.period_type || 'semana';
    const start = defaults.period_start || U.today();
    const end = defaults.period_end || suggestPeriodEnd(periodType, start);

    return `
      <form id="goalsAdminForm" class="grid-form">
        <label>Vendedor
          <select name="sellerId" required ${editingGoal ? 'disabled' : ''}>
            ${UI.optionList(sellers, defaults.seller_id || '', sellers.length ? 'Selecione' : 'Nenhum vendedor disponível')}
          </select>
        </label>
        <label>Tipo de período
          <select name="periodType" required>
            ${UI.optionList(PERIOD_TYPES, periodType, '')}
          </select>
        </label>
        <label>Início do período
          <input name="periodStart" type="date" required value="${U.escapeHtml(start)}">
        </label>
        <label>Fim do período
          <input name="periodEnd" type="date" required value="${U.escapeHtml(end)}">
        </label>
        <label>Meta de vendas (R$)
          <input name="targetAmount" type="number" step="0.01" min="0.01" required value="${U.escapeHtml(defaults.target_amount ?? '')}">
        </label>
        <label>Premiação (descrição)
          <input name="rewardDescription" placeholder="Ex.: R$50 de bônus, dia de folga..." value="${U.escapeHtml(defaults.reward_description || '')}">
        </label>
        <label>Valor da premiação (R$, opcional)
          <input name="rewardValue" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.reward_value ?? '')}">
        </label>
        <button type="submit">${editingGoal ? 'Salvar alterações' : 'Criar meta'}</button>
        ${editingGoal ? '<button type="button" class="ghost" data-goal-action="cancel-edit">Cancelar edição</button>' : ''}
      </form>
    `;
  }

  function adminGoalCard(goal, progressRow) {
    const pct = progressRow ? U.number(progressRow.progress_pct) : 0;
    const achievedAmount = progressRow ? U.number(progressRow.achieved_amount) : 0;
    const isAchieved = !!(progressRow ? progressRow.is_achieved : goal.achieved);
    const clampedPct = Math.max(0, Math.min(100, pct));
    const periodLabel = goal.period_type === 'mes' ? 'Mensal' : 'Semanal';

    return `
      <article class="goal-card ${isAchieved ? 'goal-card--achieved' : ''}">
        <div class="goal-card-head">
          <span class="badge">${U.escapeHtml(periodLabel)}</span>
          ${isAchieved ? '<span class="badge goal-badge-gold">🏆 Meta batida</span>' : ''}
        </div>
        <p class="goal-period">${U.escapeHtml(goal.period_start)} — ${U.escapeHtml(goal.period_end)}</p>
        <div class="goal-progress">
          <div class="goal-progress-bar"><div class="goal-progress-fill ${isAchieved ? 'goal-progress-fill--gold' : ''}" style="width:${clampedPct}%"></div></div>
          <span class="goal-progress-label">${U.money(achievedAmount)} de ${U.money(goal.target_amount)} (${clampedPct.toFixed(0)}%)</span>
        </div>
        ${goal.reward_description ? `<p class="goal-reward">Prêmio: <strong>${U.escapeHtml(goal.reward_description)}</strong>${goal.reward_value ? ` (${U.money(goal.reward_value)})` : ''}</p>` : ''}
        <div class="actions">
          <button type="button" class="small secondary" data-goal-action="edit" data-goal-id="${U.escapeHtml(goal.id)}">Editar</button>
          <button type="button" class="small danger" data-goal-action="delete" data-goal-id="${U.escapeHtml(goal.id)}">Excluir</button>
        </div>
      </article>
    `;
  }

  function renderAdmin(data = {}) {
    ensureStyles();
    const sellers = data.sellers || [];
    const goals = data.goals || [];
    const progress = data.progress || [];
    const editingGoal = data.editingGoal || null;
    const apiAvailable = data.apiAvailable !== false;
    const loading = !!data.loading;

    const progressByGoal = new Map(progress.map((row) => [row.goal_id, row]));
    const sellersById = new Map(sellers.map((seller) => [String(seller.id), seller]));

    const grouped = new Map();
    goals.forEach((goal) => {
      const key = String(goal.seller_id);
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(goal);
    });

    let listHtml;
    if (loading) {
      listHtml = UI.formNotice('Carregando metas...', 'info');
    } else if (!goals.length) {
      listHtml = '<div class="empty-state"><strong>Nenhuma meta cadastrada ainda.</strong><span>Crie a primeira meta usando o formulário acima.</span></div>';
    } else {
      listHtml = [...grouped.entries()].map(([sellerId, sellerGoals]) => {
        const seller = sellersById.get(sellerId);
        const name = seller ? seller.name : 'Vendedor';
        const cards = sellerGoals.map((goal) => adminGoalCard(goal, progressByGoal.get(goal.id))).join('');
        return `
          <div class="goals-seller-group">
            <h3 class="goals-seller-name">${U.escapeHtml(name)}</h3>
            <div class="goals-grid">${cards}</div>
          </div>
        `;
      }).join('');
    }

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (listSellers, listSalesGoals, listGoalsProgress, createSalesGoal, updateSalesGoal, deleteSalesGoal) para salvar e carregar metas reais.', 'warning');

    return UI.section(
      'Metas de vendas',
      'Defina metas semanais e mensais por vendedor, com premiação, para incentivar as vendas.',
      `${notice}${adminForm(sellers, editingGoal)}${listHtml}`
    );
  }

  // ---------------------------------------------------------------------
  // Render — vendedor (gamificado)
  // ---------------------------------------------------------------------
  function sellerGoalCard(row) {
    const pct = U.number(row.progress_pct);
    const achievedAmount = U.number(row.achieved_amount);
    const target = U.number(row.target_amount);
    const remaining = Math.max(0, target - achievedAmount);
    const isAchieved = !!row.is_achieved;
    const clampedPct = Math.max(0, Math.min(100, pct));
    const periodLabel = row.period_type === 'mes' ? 'Meta mensal' : 'Meta semanal';

    const statusHtml = isAchieved
      ? `
        <div class="goal-celebrate">
          <span class="goal-trophy" aria-hidden="true">🏆</span>
          <strong>Meta batida! Parabéns!</strong>
          ${row.reward_description ? `<p class="goal-reward-highlight">Seu prêmio: <strong>${U.escapeHtml(row.reward_description)}</strong>${row.reward_value ? ` — ${U.money(row.reward_value)}` : ''}</p>` : ''}
        </div>
      `
      : `<p class="goal-incentive">Faltam <strong>${U.money(remaining)}</strong> para bater a meta!</p>`;

    return `
      <article class="goal-card goal-card-seller ${isAchieved ? 'goal-card--achieved' : ''}">
        <div class="goal-card-head">
          <span class="badge">${U.escapeHtml(periodLabel)}</span>
          <span class="goal-period">${U.escapeHtml(row.period_start)} – ${U.escapeHtml(row.period_end)}</span>
        </div>
        <div class="goal-progress">
          <div class="goal-progress-bar goal-progress-bar--lg">
            <div class="goal-progress-fill ${isAchieved ? 'goal-progress-fill--gold' : ''}" style="width:${clampedPct}%"></div>
          </div>
          <span class="goal-progress-label">${clampedPct.toFixed(0)}% • ${U.money(achievedAmount)} de ${U.money(target)}</span>
        </div>
        ${statusHtml}
      </article>
    `;
  }

  function renderSeller(data = {}) {
    ensureStyles();
    const rows = data.goals || [];
    const sellerName = data.sellerName || '';
    const loading = !!data.loading;
    const apiAvailable = data.apiAvailable !== false;

    const title = sellerName ? `Minhas metas — ${sellerName}` : 'Minhas metas';

    if (loading) {
      return UI.section(title, 'Acompanhe sua meta semanal e mensal.', UI.formNotice('Carregando suas metas...', 'info'));
    }

    const cards = rows.slice().sort((a, b) => String(b.period_start || '').localeCompare(String(a.period_start || '')));

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.listGoalsProgress para ver suas metas reais.', 'warning');

    const body = cards.length
      ? `<div class="goals-seller-cards">${cards.map(sellerGoalCard).join('')}</div>`
      : '<div class="empty-state"><strong>Nenhuma meta ativa no momento.</strong><span>Assim que o administrador definir uma meta para você, ela aparece aqui.</span></div>';

    return UI.section(
      title,
      'Bata sua meta semanal e mensal e garanta sua premiação!',
      `${notice}${body}`
    );
  }

  // ---------------------------------------------------------------------
  // Mount — admin (listeners escopados ao container, sem depender do
  // delegador global de cliques da aplicação)
  // ---------------------------------------------------------------------
  function mountAdmin(container, options = {}) {
    if (!container) return null;

    let sellers = options.sellers || [];
    let goals = [];
    let progress = [];
    let editingId = null;
    let loading = true;

    function paint() {
      container.innerHTML = renderAdmin({
        sellers,
        goals,
        progress,
        editingGoal: editingId ? goals.find((goal) => goal.id === editingId) || null : null,
        loading,
        apiAvailable: hasApi('listSalesGoals') || hasApi('createSalesGoal'),
      });
    }

    async function loadAll() {
      loading = true;
      paint();
      const [sellersRes, goalsRes, progressRes] = await Promise.all([
        hasApi('listSellers') ? safeCall('listSellers') : Promise.resolve(null),
        safeCall('listSalesGoals'),
        safeCall('listGoalsProgress'),
      ]);
      if (Array.isArray(sellersRes)) sellers = sellersRes;
      goals = Array.isArray(goalsRes) ? goalsRes : [];
      progress = Array.isArray(progressRes) ? progressRes : [];
      loading = false;
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('#goalsAdminForm');
      if (!form) return;
      event.preventDefault();
      try {
        const data = U.formData(form);
        const payload = {
          period_type: data.periodType,
          period_start: data.periodStart,
          period_end: data.periodEnd,
          target_amount: U.number(data.targetAmount),
          reward_description: (data.rewardDescription || '').trim(),
          reward_value: data.rewardValue ? U.number(data.rewardValue) : null,
        };
        U.assertPositive(payload.target_amount, 'Meta de vendas');

        if (editingId) {
          if (hasApi('updateSalesGoal')) {
            await api().updateSalesGoal(editingId, payload);
          } else {
            alert('Modo demonstração: conecte C360.api.updateSalesGoal para salvar alterações de verdade.');
          }
          editingId = null;
        } else {
          if (!data.sellerId) throw new Error('Selecione um vendedor.');
          payload.seller_id = data.sellerId;
          if (hasApi('createSalesGoal')) {
            await api().createSalesGoal(payload);
          } else {
            alert('Modo demonstração: conecte C360.api.createSalesGoal para criar metas de verdade.');
          }
        }
        await loadAll();
      } catch (error) {
        alert(error.message);
      }
    });

    container.addEventListener('change', (event) => {
      const trigger = event.target.closest('[name="periodType"], [name="periodStart"]');
      if (!trigger) return;
      const form = event.target.closest('#goalsAdminForm');
      if (!form) return;
      const periodType = form.elements.periodType.value;
      const start = form.elements.periodStart.value;
      if (periodType && start) {
        form.elements.periodEnd.value = suggestPeriodEnd(periodType, start);
      }
    });

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-goal-action]');
      if (!button) return;
      const { goalAction, goalId } = button.dataset;
      try {
        if (goalAction === 'edit') {
          editingId = goalId;
          paint();
        } else if (goalAction === 'cancel-edit') {
          editingId = null;
          paint();
        } else if (goalAction === 'delete') {
          if (!confirm('Excluir esta meta?')) return;
          if (hasApi('deleteSalesGoal')) {
            await api().deleteSalesGoal(goalId);
          } else {
            alert('Modo demonstração: conecte C360.api.deleteSalesGoal para excluir de verdade.');
          }
          if (editingId === goalId) editingId = null;
          await loadAll();
        }
      } catch (error) {
        alert(error.message);

  function mountSeller(container, options = {}) {

(function () {
  'use strict';

  // Motor .xlsx mínimo, em JavaScript puro, sem dependências externas.
  // Escrita: monta um ZIP "stored" (sem compressão), aceito pelo Excel e Google Sheets.
  // Leitura: lê o ZIP, descomprime com a API nativa do navegador quando necessário.
  // Mantém o projeto offline e revisável, conforme CLAUDE.md.

  window.C360 = window.C360 || {};

  const ENC = new TextEncoder();
  const DEC = new TextDecoder('utf-8');

  // ----- CRC32 (necessário para o cabeçalho do ZIP) -----
  const CRC_TABLE = (function () {
    const table = new Uint32Array(256);
    for (let n = 0; n < 256; n += 1) {
      let c = n;
      for (let k = 0; k < 8; k += 1) {
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      table[n] = c >>> 0;
    }
    return table;
  })();

  function crc32(bytes) {
    let crc = 0xffffffff;
    for (let i = 0; i < bytes.length; i += 1) {
      crc = CRC_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  // ----- Escrita de bytes em um array dinâmico -----
  function pushU16(arr, value) {
    arr.push(value & 0xff, (value >>> 8) & 0xff);
  }
  function pushU32(arr, value) {
    arr.push(value & 0xff, (value >>> 8) & 0xff, (value >>> 16) & 0xff, (value >>> 24) & 0xff);
  }
  function pushBytes(arr, bytes) {
    for (let i = 0; i < bytes.length; i += 1) arr.push(bytes[i]);
  }

  function xmlEscape(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&apos;');
  }

  function colLetter(index) {
    let n = index;
    let letters = '';
    do {
      letters = String.fromCharCode(65 + (n % 26)) + letters;
      n = Math.floor(n / 26) - 1;
    } while (n >= 0);
    return letters;
  }

  function sanitizeSheetName(name, fallback) {
    let clean = String(name || fallback || 'Planilha').replace(/[:\\/?*\[\]]/g, ' ').trim();
    if (!clean) clean = fallback || 'Planilha';
    if (clean.length > 31) clean = clean.slice(0, 31);
    return clean;
  }

  // ----- Geração do XML de uma planilha -----
  function sheetXml(rows) {
    const body = rows.map((cells, rowIndex) => {
      const r = rowIndex + 1;
      const cellsXml = cells.map((value, colIndex) => {
        const ref = `${colLetter(colIndex)}${r}`;
        if (value === null || value === undefined || value === '') {
          return '';
        }
        if (typeof value === 'number' && Number.isFinite(value)) {
          return `<c r="${ref}"><v>${value}</v></c>`;
        }
        if (typeof value === 'boolean') {
          return `<c r="${ref}" t="b"><v>${value ? 1 : 0}</v></c>`;
        }
        return `<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xmlEscape(value)}</t></is></c>`;
      }).join('');
      return `<row r="${r}">${cellsXml}</row>`;
    }).join('');

    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">` +
      `<sheetData>${body}</sheetData></worksheet>`;
  }

  // ----- Monta o arquivo .xlsx (Blob) a partir de [{name, rows}] -----
  function buildXlsx(sheets) {
    const usedNames = new Set();
    const prepared = sheets.map((sheet, i) => {
      let name = sanitizeSheetName(sheet.name, `Planilha${i + 1}`);
      let unique = name;
      let suffix = 2;
      while (usedNames.has(unique.toLowerCase())) {
        unique = `${name.slice(0, 28)} ${suffix}`;
        suffix += 1;
      }
      usedNames.add(unique.toLowerCase());
      return { name: unique, rows: sheet.rows || [] };
    });

    const files = [];

    const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">` +
      `<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>` +
      `<Default Extension="xml" ContentType="application/xml"/>` +
      `<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>` +
      prepared.map((_, i) => `<Override PartName="/xl/worksheets/sheet${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('') +
      `</Types>`;
    files.push({ path: '[Content_Types].xml', data: ENC.encode(contentTypes) });

    const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">` +
      `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>` +
      `</Relationships>`;
    files.push({ path: '_rels/.rels', data: ENC.encode(rootRels) });

    const workbook = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">` +
      `<sheets>` +
      prepared.map((sheet, i) => `<sheet name="${xmlEscape(sheet.name)}" sheetId="${i + 1}" r:id="rId${i + 1}"/>`).join('') +
      `</sheets></workbook>`;
    files.push({ path: 'xl/workbook.xml', data: ENC.encode(workbook) });

    const workbookRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">` +
      prepared.map((_, i) => `<Relationship Id="rId${i + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i + 1}.xml"/>`).join('') +
      `</Relationships>`;
    files.push({ path: 'xl/_rels/workbook.xml.rels', data: ENC.encode(workbookRels) });

    prepared.forEach((sheet, i) => {
      files.push({ path: `xl/worksheets/sheet${i + 1}.xml`, data: ENC.encode(sheetXml(sheet.rows)) });
    });

    return zipStored(files);
  }

  // ----- Empacota arquivos em um ZIP sem compressão -----
  function zipStored(files) {
    const out = [];
    const central = [];
    let offset = 0;

    files.forEach((file) => {
      const nameBytes = ENC.encode(file.path);
      const crc = crc32(file.data);
      const size = file.data.length;

      // Cabeçalho local
      pushU32(out, 0x04034b50);
      pushU16(out, 20); // versão necessária
      pushU16(out, 0); // flags
      pushU16(out, 0); // método: 0 = stored
      pushU16(out, 0); // hora
      pushU16(out, 0x21); // data (1980-01-01)
      pushU32(out, crc);
      pushU32(out, size);
      pushU32(out, size);
      pushU16(out, nameBytes.length);
      pushU16(out, 0); // extra
      pushBytes(out, nameBytes);
      pushBytes(out, file.data);

      // Entrada do diretório central
      pushU32(central, 0x02014b50);
      pushU16(central, 20); // versão criadora
      pushU16(central, 20); // versão necessária
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0x21);
      pushU32(central, crc);
      pushU32(central, size);
      pushU32(central, size);
      pushU16(central, nameBytes.length);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU32(central, 0);
      pushU32(central, offset);
      pushBytes(central, nameBytes);

      offset += 30 + nameBytes.length + size;
    });

    const centralOffset = offset;
    const centralSize = central.length;

    const eocd = [];
    pushU32(eocd, 0x06054b50);
    pushU16(eocd, 0);
    pushU16(eocd, 0);
    pushU16(eocd, files.length);
    pushU16(eocd, files.length);
    pushU32(eocd, centralSize);
    pushU32(eocd, centralOffset);
    pushU16(eocd, 0);

    const total = new Uint8Array(out.length + central.length + eocd.length);
    total.set(out, 0);
    total.set(central, out.length);
    total.set(eocd, out.length + central.length);

    return new Blob([total], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    });
  }

  async function inflateRaw(bytes) {
    if (typeof DecompressionStream === 'undefined') {
      throw new Error('Este navegador não consegue ler planilhas compactadas. Atualize o navegador ou use o backup JSON.');
    }
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    const buffer = await new Response(stream).arrayBuffer();
    return new Uint8Array(buffer);
  }

  function findEocd(view, length) {
    for (let i = length - 22; i >= 0; i -= 1) {
      if (view.getUint32(i, true) === 0x06054b50) return i;
    }
    return -1;
  }

  async function unzip(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    const view = new DataView(arrayBuffer);
    const eocd = findEocd(view, bytes.length);
    if (eocd === -1) throw new Error('Arquivo não é um .xlsx válido.');

    const count = view.getUint16(eocd + 10, true);
    let pointer = view.getUint32(eocd + 16, true);
    const entries = {};

    for (let n = 0; n < count; n += 1) {
      if (view.getUint32(pointer, true) !== 0x02014b50) break;
      const method = view.getUint16(pointer + 10, true);
      const compSize = view.getUint32(pointer + 20, true);
      const nameLen = view.getUint16(pointer + 28, true);
      const extraLen = view.getUint16(pointer + 30, true);
      const commentLen = view.getUint16(pointer + 32, true);
      const localOffset = view.getUint32(pointer + 42, true);
      const name = DEC.decode(bytes.subarray(pointer + 46, pointer + 46 + nameLen));

      const localNameLen = view.getUint16(localOffset + 26, true);
      const localExtraLen = view.getUint16(localOffset + 28, true);
      const dataStart = localOffset + 30 + localNameLen + localExtraLen;
      const raw = bytes.subarray(dataStart, dataStart + compSize);

      // eslint-disable-next-line no-await-in-loop
      entries[name] = method === 0 ? raw : await inflateRaw(raw);
      pointer += 46 + nameLen + extraLen + commentLen;
    }

    return entries;
  }

  function parseXml(text) {
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) {
      throw new Error('Não foi possível ler o conteúdo da planilha.');
    }
    return doc;
  }

  function readSharedStrings(entries) {
    const file = entries['xl/sharedStrings.xml'];
    if (!file) return [];
    const doc = parseXml(DEC.decode(file));
    return [...doc.getElementsByTagName('si')].map((si) => {
      return [...si.getElementsByTagName('t')].map((t) => t.textContent).join('');
    });
  }

  function colRefToIndex(ref) {
    const letters = String(ref || '').replace(/[0-9]/g, '');
    let index = 0;
    for (let i = 0; i < letters.length; i += 1) {
      index = index * 26 + (letters.charCodeAt(i) - 64);
    }
    return Math.max(index - 1, 0);
  }

  function readSheetRows(xml, shared) {
    const doc = parseXml(xml);
    const rows = [];
    [...doc.getElementsByTagName('row')].forEach((rowEl) => {
      const cells = [];
      [...rowEl.getElementsByTagName('c')].forEach((cellEl) => {
        const colIndex = colRefToIndex(cellEl.getAttribute('r'));
        const type = cellEl.getAttribute('t');
        let value = '';
        if (type === 'inlineStr') {
          value = [...cellEl.getElementsByTagName('t')].map((t) => t.textContent).join('');
        } else {
          const vEl = cellEl.getElementsByTagName('v')[0];
          const raw = vEl ? vEl.textContent : '';
          if (type === 's') {
            value = shared[Number(raw)] ?? '';
          } else if (type === 'str') {
            value = raw;
          } else if (type === 'b') {
            value = raw === '1';
          } else {

          }
        }
        cells[colIndex] = value;
      });
      for (let i = 0; i < cells.length; i += 1) if (cells[i] === undefined) cells[i] = '';
      rows.push(cells);
    });
    return rows;
  }

  async function parseXlsx(arrayBuffer) {
    const entries = await unzip(arrayBuffer);
    const shared = readSharedStrings(entries);

    const relsFile = entries['xl/_rels/workbook.xml.rels'];
    const rels = {};
    if (relsFile) {
      const relsDoc = parseXml(DEC.decode(relsFile));
      [...relsDoc.getElementsByTagName('Relationship')].forEach((rel) => {
        rels[rel.getAttribute('Id')] = rel.getAttribute('Target');
      });
    }

    const workbookFile = entries['xl/workbook.xml'];
    if (!workbookFile) throw new Error('Planilha sem workbook.xml.');
    const workbookDoc = parseXml(DEC.decode(workbookFile));

    const result = [];
    [...workbookDoc.getElementsByTagName('sheet')].forEach((sheetEl, i) => {
      const name = sheetEl.getAttribute('name') || `Planilha${i + 1}`;
      const rid = sheetEl.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'id') ||
        sheetEl.getAttribute('r:id');
      let target = rels[rid];
      if (!target) target = `worksheets/sheet${i + 1}.xml`;
      target = target.replace(/^\//, '').replace(/^xl\//, '');
      const path = `xl/${target}`;
      const file = entries[path];
      const rows = file ? readSheetRows(DEC.decode(file), shared) : [];
      result.push({ name, rows });
    });

    return result;
  }

  window.C360.xlsx = {
    buildXlsx,
    parseXlsx,
  };
})();

  // ---------- Importar Excel ----------
  function buildReverseMap(collection) {

  function rowToRecord(headerKeys, cells) {
    const record = {};

    headerKeys.forEach((key, index) => {
      if (!key) return;

      hasValue = true;
      if (NUMERIC_KEYS.has(key)) {

  function csvField(value) {
    const isRealNumber = typeof value === 'number';
    let text = String(value ?? '');
    if (!isRealNumber && /^[=+\-@]/.test(text.trim())) {
      text = `'${text}`;
    }
    if (/[;"\n\r]/.test(text)) return `"${text.replaceAll('"', '""')}"`;
    return text;

  function exportCsv(collectionKey) {

    if (collectionKey !== 'businesses' && state.activeBusinessId) {
      records = records.filter((record) => record.businessId === state.activeBusinessId);
    }
