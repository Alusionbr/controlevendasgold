      .ss-stock-adjust-notice { margin-bottom: 0.6rem; }
    `;
    document.head.appendChild(style);
  }

  // =========================================================================
  // SELLER SIDE — Meu estoque
  // =========================================================================

  function sellFormHtml(productId, product) {
    const clients = fullState().clients || [];
    const salePrice = product && product.salePrice ? product.salePrice : '';
    return `
      <form class="ss-inline-form" data-ss-sell-form data-product-id="${U.escapeHtml(productId)}">
        <label>Cliente
          <select name="clientId" required>${UI.optionList(clients, '', clients.length ? 'Selecione o cliente' : 'Nenhum cliente cadastrado')}</select>
        </label>
        <label>Quantidade
          <input name="quantity" type="number" step="0.001" min="0.001" required>
        </label>
        <label>Preço unitário
          <input name="unitPrice" type="number" step="0.01" min="0.01" required value="${U.escapeHtml(salePrice)}">
        </label>
        <label>Observações
          <input name="notes" placeholder="Opcional">
        </label>
        <div class="actions">
          <button type="submit">Confirmar venda</button>
          <button type="button" class="small secondary" data-ss-action="cancel-sell">Cancelar</button>
        </div>
      </form>
    `;
  }

  function stockCardHtml(row, openProductId) {
    const product = row.product || productById(row.productId);
    const name = product ? U.escapeHtml(product.name) : 'Produto removido';
    const unit = product ? product.unit : '';
    const isOpen = String(openProductId) === String(row.productId);
    return `
      <article class="ss-stock-card" data-stock-product-id="${U.escapeHtml(row.productId)}">
        <div class="ss-stock-card-head">
          <strong>${name}</strong>
          <span class="badge">${U.qty(row.quantity, unit)}</span>
        </div>
        <button type="button" data-ss-action="toggle-sell" data-product-id="${U.escapeHtml(row.productId)}">Vender deste estoque</button>
        ${isOpen ? sellFormHtml(row.productId, product) : ''}
      </article>
    `;
  }

  // ---------------------------------------------------------------------
  // Pedir mais estoque ao admin — à vista ou a prazo (consignado, gera
  // dívida). Um único ponto de entrada em "Meu estoque" em vez de o
  // vendedor precisar entender o construtor de carrinho genérico (canal,
  // link público, múltiplos itens) na aba Pedidos só pra pedir reposição.
  // ---------------------------------------------------------------------
  function sellerPriceForProduct(productId) {
    return (fullState().sellerPrices || []).find((row) => String(row.productId) === String(productId)) || null;
  }

  // ---------------------------------------------------------------------
  // Acerto de estoque próprio — só aparece quando o admin liberou 1 crédito
  // (seller_settings.stock_adjustment_credits > 0). Consome o RPC
  // seller_adjust_own_stock via C360.api.adjustOwnStock, que já zera o
  // crédito no servidor depois de usado.
  // ---------------------------------------------------------------------
  function adjustFormHtml(adjustFeedback) {
    const products = productsList();
    return `
      <div class="ss-stock-adjust-notice">${UI.badge('Acerto de estoque liberado pelo administrador', 'ok')}</div>
      <form class="ss-inline-form" data-ss-adjust-form>
        <label>Produto
          <select name="productId" required>${UI.optionList(products, '', 'Selecione o produto')}</select>
        </label>
        <label>Novo estoque (quantidade correta)
          <input name="newQuantity" type="number" step="0.001" min="0" required>
        </label>
        <label>Motivo do acerto (obrigatório)
          <input name="reason" required placeholder="Ex.: contagem antiga nunca foi lançada certo">
        </label>
        <div class="actions">
          <button type="submit">Registrar acerto (usa o crédito)</button>
        </div>
        ${adjustFeedback ? UI.formNotice(adjustFeedback.message, adjustFeedback.type) : ''}
      </form>
    `;
  }

  function renderMyStock(data = {}) {
    ensureStyles();
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : hasApi('listSellerStock');
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.listSellerStock para ver seu estoque próprio real.', 'warning');

    if (data.loading) {
      return UI.section(
        'Meu estoque',
        'Produtos que você guarda para vender por conta própria. Ao vender, o valor vira consignado devido ao administrador.',
        `${notice}${UI.formNotice('Carregando seu estoque...', 'info')}`
      );
    }

    const rows = (data.rows || []).filter((row) => U.number(row.quantity) > 0);
    const body = rows.length
      ? `<div class="ss-stock-grid">${rows.map((row) => stockCardHtml(row, data.openProductId)).join('')}</div>`
      : '<div class="empty-state"><strong>Nenhum estoque próprio no momento.</strong><span>Peça ao administrador para lhe repassar produtos.</span></div>';

    const credits = U.number(data.sellerSettings && data.sellerSettings.stockAdjustmentCredits);
    const adjustSection = credits > 0
      ? UI.section(
          'Acerto de estoque',
          'Corrige a quantidade que você realmente tem, com motivo obrigatório. Depois de usar, o administrador precisa liberar de novo.',
          adjustFormHtml(data.adjustFeedback)
        )
      : '';

    return `
      ${UI.section(
        'Meu estoque',
        'Produtos que você guarda para vender por conta própria. Ao vender, o valor vira consignado devido ao administrador. Para pedir mais estoque, use a aba Vendas → "Pedir estoque ao admin".',
        `${notice}${body}`
      )}
      ${adjustSection}
    `;
  }

  function mountMyStock(container) {
    if (!container) return null;

    const user = currentUser();
    if (!hasApi('listSellerStock') || !user) {
      container.innerHTML = renderMyStock({ apiAvailable: hasApi('listSellerStock'), rows: [] });
      return null;
    }

    let rows = [];
    let loading = true;
    let openProductId = null;
    let sellerSettings = null;
    let adjustFeedback = null;

    function paint() {
      container.innerHTML = renderMyStock({ rows, loading, openProductId, apiAvailable: true, sellerSettings, adjustFeedback });
    }

    async function load() {
      loading = true;
      paint();
      try {
        const [stockRes, settingsRes] = await Promise.all([
          safeCall('listSellerStock', user.id),
          hasApi('listSellerSettings') ? safeCall('listSellerSettings', { sellerId: user.id }) : Promise.resolve(null),
        ]);
        rows = Array.isArray(stockRes) ? stockRes : [];
        sellerSettings = Array.isArray(settingsRes) ? (settingsRes[0] || null) : null;
      } catch (error) {
        console.error('C360.sellerStock: erro ao carregar estoque próprio', error);
        rows = [];
        sellerSettings = null;
      }
      loading = false;
      paint();
    }

    container.addEventListener('click', (event) => {
      const toggleButton = event.target.closest('[data-ss-action="toggle-sell"]');
      if (toggleButton) {
        const { productId } = toggleButton.dataset;
        openProductId = String(openProductId) === String(productId) ? null : productId;
        paint();
        return;
      }
      const cancelButton = event.target.closest('[data-ss-action="cancel-sell"]');
      if (cancelButton) {
        openProductId = null;
        paint();
      }
    });

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-ss-sell-form]');
      if (!form) return;
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      try {
        const data = U.formData(form);
        if (submitButton) submitButton.disabled = true;
        const result = await sellFromOwnStock({
          productId: form.dataset.productId,
          quantity: data.quantity,
          unitPrice: data.unitPrice,
          clientId: data.clientId,
          notes: data.notes || '',
        });
        if (!result.ok) throw new Error(result.error || 'Não foi possível registrar a venda.');
        openProductId = null;
        await load();
      } catch (error) {
        alert(error.message);
        if (submitButton) submitButton.disabled = false;
      }
    });

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-ss-adjust-form]');
      if (!form) return;
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      try {
        if (!hasApi('adjustOwnStock')) throw new Error('Recurso de acerto de estoque indisponível (modo demonstração).');
        const data = U.formData(form);
        if (submitButton) submitButton.disabled = true;
        await safeCall('adjustOwnStock', {
          productId: data.productId,
          newQuantity: U.number(data.newQuantity),
          reason: (data.reason || '').trim(),
        });
        adjustFeedback = null;
        await load();
      } catch (error) {
        adjustFeedback = { message: error.message, type: 'danger' };
        if (submitButton) submitButton.disabled = false;
        paint();
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  async function sellFromOwnStock({ productId, quantity, unitPrice, clientId, notes } = {}) {
    try {
      if (!hasApi('listSellerStock') || !hasApi('setSellerStock')) {
        return { ok: false, error: 'Recurso de estoque próprio indisponível (modo demonstração).' };
      }
      const user = currentUser();
      if (!user) return { ok: false, error: 'Usuário não autenticado.' };
      if (!productId) return { ok: false, error: 'Produto não informado.' };
      if (!clientId) return { ok: false, error: 'Selecione um cliente.' };

      const qty = U.number(quantity);
      const price = U.number(unitPrice);
      if (qty <= 0) return { ok: false, error: 'Quantidade precisa ser maior que zero.' };
      if (price <= 0) return { ok: false, error: 'Preço unitário precisa ser maior que zero.' };

      // 1) Ler estoque atual do vendedor e validar disponibilidade.
      const currentRows = (await safeCall('listSellerStock', user.id)) || [];
      const row = Array.isArray(currentRows)
        ? currentRows.find((item) => String(item.productId) === String(productId))
        : null;
      const currentQty = row ? U.number(row.quantity) : 0;
      if (qty > currentQty) {
        return { ok: false, error: 'Estoque insuficiente' };
      }

      // 2) Decrementar o estoque próprio do vendedor.
      await safeCall('setSellerStock', { sellerId: user.id, productId, quantity: currentQty - qty });

      // 3) Criar a consignação já vendida (ver nota de interpretação no topo do arquivo).
      const product = productById(productId);
      const costAtSend = product && typeof product.avgCost === 'number' ? product.avgCost : 0;
      const math = Calc && typeof Calc.saleMath === 'function'
        ? Calc.saleMath({ quantity: qty, unitPrice: price, discount: 0, fixedFees: 0, feePercent: 0, unitCost: costAtSend })
        : {
            grossRevenue: qty * price,
            netRevenue: qty * price,
            percentFees: 0,
            cogs: qty * costAtSend,
            grossProfit: (qty * price) - (qty * costAtSend),
            margin: qty * price > 0 ? ((qty * price) - (qty * costAtSend)) / (qty * price) : 0,
          };
      const sale = await addRecord('sales', {
        date: U.today(),
        channel: 'Estoque proprio',
        clientId,
        productId,
        quantity: qty,
        unitPrice: price,
        discount: 0,
        fixedFees: 0,
        feePercent: 0,
        unitCost: costAtSend,
        ...math,
        notes: notes || 'Venda pelo estoque proprio',
        origin: 'manual',
        originId: null,
      });

      const consignmentPayload = {
        sellerId: user.id,
        productId,
        clientId,
        quantitySent: qty,
        quantitySold: qty,
        quantityReturned: 0,
        unitPrice: price,
        costAtSend,
        amountPaid: 0,
        status: 'com_cliente',
        date: U.today(),
        notes: notes || (sale && sale.id ? `Venda ${sale.id}` : ''),
      };
      const consignment = await addRecord('consignments', consignmentPayload);

      // 4) Evento de venda, best-effort — não deve derrubar o fluxo se falhar.
      if (consignment && consignment.id) {
        try {
          await addRecord('consignment_events', {
            consignmentId: consignment.id,
            type: 'venda_cliente',
            date: U.today(),
            quantity: qty,
            amount: qty * price,
          });
        } catch (eventError) {
          console.error('C360.sellerStock: consignação criada, mas evento falhou', eventError);
        }
      }

      return { ok: true, consignment };
    } catch (error) {
      console.error('C360.sellerStock: erro em sellFromOwnStock', error);
      return { ok: false, error: error.message || 'Erro ao registrar venda do estoque próprio.' };
    }
  }

  // =========================================================================
  // ADMIN SIDE — Repassar estoque
  // =========================================================================

  function renderGrantStock(data = {}) {
    ensureStyles();
    if (!isAdmin()) {
      return UI.formNotice('Acesso restrito ao administrador.', 'warning');
    }
    const sellers = data.sellers || [];
    const products = data.products || productsList();
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : hasApi('setSellerStock');
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.setSellerStock para repassar estoque de verdade.', 'warning');
    const feedback = data.feedback ? UI.formNotice(data.feedback.message, data.feedback.type || 'success') : '';

    return UI.section(
      'Repassar estoque a vendedor',
      'Defina quanto de cada produto fica sob responsabilidade do vendedor (consignado dele).',
      `
        ${notice}${feedback}
        <form data-ss-grant-form class="grid-form">
          <label>Vendedor
            <select name="sellerId" required>${UI.optionList(sellers, '', sellers.length ? 'Selecione' : 'Nenhum vendedor cadastrado')}</select>
          </label>
          <label>Produto
            <select name="productId" required>${UI.optionList(products, '', 'Selecione o produto')}</select>
          </label>
          <label>Quantidade a repassar
            <input name="quantity" type="number" step="0.001" min="0" required>
          </label>
          <button type="submit">Definir estoque do vendedor</button>
        </form>
        <p class="ss-hint">O valor informado substitui o saldo atual do vendedor para este produto (não soma).</p>
      `
    );
  }

  function mountGrantStock(container) {
    if (!container) return null;
    if (!isAdmin()) {
      container.innerHTML = renderGrantStock();
      return null;
    }

    let sellers = [];
    let feedback = null;

    function paint() {
      container.innerHTML = renderGrantStock({
        sellers,
        products: productsList(),
        apiAvailable: hasApi('setSellerStock'),
        feedback,
      });
    }

    async function load() {
      sellers = await loadSellers();
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-ss-grant-form]');
      if (!form) return;
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      try {
        const data = U.formData(form);
        if (!data.sellerId) throw new Error('Selecione um vendedor.');
        if (!data.productId) throw new Error('Selecione um produto.');
        const quantity = U.number(data.quantity);
        if (quantity < 0) throw new Error('Quantidade não pode ser negativa.');
        if (!hasApi('setSellerStock')) {
          feedback = { message: 'Modo demonstração: conecte C360.api.setSellerStock para repassar estoque de verdade.', type: 'warning' };
          paint();
          return;
        }
        if (submitButton) submitButton.disabled = true;
        await safeCall('setSellerStock', { sellerId: data.sellerId, productId: data.productId, quantity });
        feedback = { message: 'Estoque do vendedor atualizado.', type: 'success' };
        form.reset();
        paint();
      } catch (error) {
        feedback = { message: error.message, type: 'error' };
        paint();
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  // =========================================================================
  // ADMIN SIDE — Aprovações de pedidos
  // =========================================================================

  function orderApprovalStatus(order) {
    return order.approvalStatus || order.approval_status || '';
  }

  function approvalCardHtml(order) {
    const product = productById(order.productId);
    const st = fullState();
    const seller = (st.profiles || []).find((profile) => String(profile.id) === String(order.sellerId));
    const sellerName = seller ? seller.name : 'Vendedor';
    const qtyLabel = U.qty(order.quantity, product ? product.unit : '');
    const dateLabel = order.dueDate || order.date || '—';

    return `
      <article class="ss-approval-card" data-order-id="${U.escapeHtml(order.id)}">
        <div class="ss-approval-head">
          <strong>${product ? U.escapeHtml(product.name) : 'Produto removido'}</strong>
          <span class="badge ss-badge-urgent">Aguardando aprovação</span>
        </div>
        <p class="ss-approval-detail">Vendedor: <strong>${U.escapeHtml(sellerName)}</strong> · Quantidade: <strong>${qtyLabel}</strong></p>
        <p class="ss-approval-detail">Data: ${U.escapeHtml(dateLabel)}${order.notes ? ` · Obs.: ${U.escapeHtml(order.notes)}` : ''}</p>
        <div class="actions">
          <button type="button" data-ss-action="approve" data-order-id="${U.escapeHtml(order.id)}">Aprovar</button>
          <button type="button" class="danger" data-ss-action="reject" data-order-id="${U.escapeHtml(order.id)}">Rejeitar</button>
        </div>
      </article>
    `;
  }

  function renderApprovals(data = {}) {
    ensureStyles();
    if (!isAdmin()) {
      return UI.formNotice('Acesso restrito ao administrador.', 'warning');
    }
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : (hasApi('list') || hasApi('approveOrder'));
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (list/approveOrder/rejectOrder) para aprovar pedidos de verdade.', 'warning');

    if (data.loading) {
      return UI.section(
        'Aprovações de pedidos',
        'Pedidos de reposição feitos pelos vendedores aguardando sua aprovação.',
        `${notice}${UI.formNotice('Carregando pedidos pendentes...', 'info')}`
      );
    }

    const orders = data.orders || [];
    const count = orders.length;
    const countBadge = count > 0
      ? `<span class="badge ss-badge-urgent">${count} pendente${count === 1 ? '' : 's'}</span>`
      : '<span class="badge ok">Tudo em dia</span>';

    const listHtml = count
      ? orders.map((order) => approvalCardHtml(order)).join('')
      : '<div class="empty-state"><strong>Nenhum pedido aguardando aprovação.</strong><span>Pedidos novos de vendedores aparecem aqui.</span></div>';

    return UI.section(
      'Aprovações de pedidos',
      'Pedidos de reposição feitos pelos vendedores aguardando sua aprovação.',
      `
        ${notice}
        <div class="ss-approvals-head">${countBadge}</div>
        <div class="ss-approvals-list">${listHtml}</div>
      `
    );
  }

  function mountApprovals(container, options = {}) {
    if (!container) return null;
    const onDone = options.onDone;
    if (!isAdmin()) {
      container.innerHTML = renderApprovals();
      return null;
    }

    let orders = [];
    let loading = true;

    function paint() {
      container.innerHTML = renderApprovals({ orders, loading, apiAvailable: hasApi('list') || hasApi('approveOrder') });
    }

    async function load() {
      loading = true;
      paint();
      let rows = null;
      if (hasApi('list')) {
        try {
          rows = await safeCall('list', 'orders', { approval_status: 'pendente_aprovacao' });
        } catch (error) {
          console.error('C360.sellerStock: erro ao listar pedidos pendentes', error);
          rows = null;
        }
      }
      if (!Array.isArray(rows)) {
        const st = fullState();
        rows = (st.orders || []).filter((order) => orderApprovalStatus(order) === 'pendente_aprovacao');
      }
      orders = Array.isArray(rows) ? rows : [];
      loading = false;
      paint();
    }

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-ss-action="approve"], [data-ss-action="reject"]');
      if (!button) return;
      const { ssAction, orderId } = button.dataset;
      if (ssAction === 'reject' && !confirm('Rejeitar este pedido?')) return;
      button.disabled = true;
      try {
        if (ssAction === 'approve') {
          if (!hasApi('approveOrder')) throw new Error('Modo demonstração: conecte C360.api.approveOrder.');
          await safeCall('approveOrder', orderId);
        } else {
          if (!hasApi('rejectOrder')) throw new Error('Modo demonstração: conecte C360.api.rejectOrder.');
          await safeCall('rejectOrder', orderId);
        }
        await load();
        if (typeof onDone === 'function') onDone();
      } catch (error) {
        alert(error.message);
        button.disabled = false;
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  window.C360.sellerStock = {
    renderMyStock,
    mountMyStock,
    sellFromOwnStock,
    renderGrantStock,
    mountGrantStock,
    renderApprovals,
    mountApprovals,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  // Módulo "Calculadora" (aba Calculadora).
  // Expõe window.C360.calculator = { render, mount }.
  //
  // CSS novo necessário (ainda não existe em styles/main.css — não editado por
  // este arquivo, apenas listado aqui e no relatório para o agente MOBILE/SEC):
  //   .calculator-card   — cartão que envolve a calculadora padrão (pode herdar de .panel-card)
  //   .calc-display      — moldura do visor (número grande, alinhado à direita)
  //   .calc-expression   — linha pequena acima do visor com a operação pendente
  //   .calc-value        — número grande do visor
  //   .calc-keypad       — grid 4 colunas para as teclas
  //   .calc-key          — tamanho/toque das teclas (usadas junto com .secondary/.ghost/.danger já existentes)
  //   .calc-key.span2    — tecla que ocupa 2 colunas (o "0")
  //   .calc-field        — rótulo + input empilhados nos mini-formulários de negócio

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;
  const S = window.C360.state;
  const Calc = window.C360.calc;

  const OPERATORS = ['+', '-', '×', '÷'];

  function formatPercent(value) {
    return `${value.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}%`;
  }

  function placeholderResult() {
    return '<div class="cost-item"><span>Resultado</span><strong>—</strong></div>';
  }

  // ---------- HTML ----------

  function render() {
    return `
      <div class="calculator-page">
        ${renderStandardCalculator()}
        ${renderQuickSale()}
        ${renderBusinessTools()}
      </div>
    `;
  }

  function state() { return S.getState(); }
  function currentUser() { return S.getCurrentUser(); }
  function isAdmin() { return S.isAdmin(); }
  function productById(id) { return (state().products || []).find((item) => String(item.id) === String(id)) || null; }
  function sellerPriceForProduct(productId) {
    return (state().sellerPrices || []).find((row) => String(row.productId) === String(productId)) || null;
  }

  function quickSaleProductOptions() {
    const products = (state().products || []).filter((product) => !['materia_prima', 'embalagem'].includes(product.type));
    return UI.optionList(products.map((product) => ({
      id: product.id,
      name: `${product.name} - ${U.money(product.defaultPrice || product.salePrice || 0)}`,
    })), '', 'Produto');
  }

  function renderQuickSale() {
    return `
      <div class="panel-card calc-quick-sale" data-calc-sale-root>
        <h3>Venda rapida</h3>
        <form class="grid-form compact-form" data-calc-sale-add>
          <label>Produto
            <select name="productId" required>${quickSaleProductOptions()}</select>
          </label>
          <label>Qtd.
            <input name="quantity" type="number" min="0.001" step="0.001" required>
          </label>
          <label>Preco unitario
            <input name="unitPrice" type="number" min="0.01" step="0.01" required>
          </label>
          <button type="submit">Adicionar</button>
        </form>
        <div data-calc-sale-feedback></div>
        <div data-calc-sale-items></div>
        <div class="cart-total"><span>Total</span><strong data-calc-sale-total>${U.money(0)}</strong></div>
        <div class="actions">
          <button type="button" data-calc-sale-save disabled>Salvar venda</button>
          <button type="button" class="ghost" data-calc-sale-clear>Limpar</button>
        </div>
      </div>
    `;
  }

  function renderStandardCalculator() {
    return `
      <div class="panel-card calculator-card" id="calcStandard" tabindex="0" aria-label="Calculadora. Use o teclado numérico ou toque nos botões.">
        <h3>Calculadora</h3>
        <div class="calc-display" id="calcDisplay" aria-live="polite">
          <div class="calc-expression" id="calcExpression">&nbsp;</div>
          <div class="calc-value" id="calcValue">0</div>
        </div>
        <div class="calc-keypad" id="calcKeypad" role="group" aria-label="Teclado da calculadora">
          <button type="button" class="calc-key ghost danger" data-calc="clear" aria-label="Limpar tudo">C</button>
          <button type="button" class="calc-key ghost" data-calc="backspace" aria-label="Apagar último dígito">⌫</button>
          <button type="button" class="calc-key ghost" data-calc="percent" aria-label="Porcentagem">%</button>
          <button type="button" class="calc-key secondary" data-calc="op" data-op="÷" aria-label="Dividir">÷</button>

          <button type="button" class="calc-key ghost" data-calc="digit" data-digit="7">7</button>
          <button type="button" class="calc-key ghost" data-calc="digit" data-digit="8">8</button>

  async function saveCalculatorSaleItems(items) {
    const user = currentUser();
    if (!user) throw new Error('Entre na sua conta antes de vender.');
    if (!items.length) throw new Error('Adicione pelo menos um item.');

    for (const item of items) {
      const product = productById(item.productId);
      const quantity = U.number(item.quantity);
      const unitPrice = U.number(item.unitPrice);
      if (!product) throw new Error('Produto nao encontrado.');
      if (quantity <= 0) throw new Error('Quantidade precisa ser maior que zero.');
      if (unitPrice <= 0) throw new Error('Preco unitario precisa ser maior que zero.');

      if (user.role === 'vendedor' && Calc.resolveSellerPrice && Calc.validatePriceFloor) {
        const sellerPrice = sellerPriceForProduct(product.id);
        const { floor } = Calc.resolveSellerPrice({ product, sellerPrice });
        const floorCheck = Calc.validatePriceFloor({ unitPrice, floor });
        if (!floorCheck.ok) throw new Error(floorCheck.message);
      }

      const unitCost = U.number(product.avgCost);
      const math = Calc.saleMath({ quantity, unitPrice, discount: 0, fixedFees: 0, feePercent: 0, unitCost });

      if (user.role === 'vendedor' && product.type !== 'servico') {
        const stockRow = (state().sellerStock || []).find((row) => String(row.sellerId) === String(user.id) && String(row.productId) === String(product.id));
        if (!stockRow || U.number(stockRow.quantity) < quantity) {
          throw new Error(`${product.name} nao tem estoque proprio suficiente.`);
        }
        // eslint-disable-next-line no-await-in-loop
        await window.C360.api.consumeSellerStock({ productId: product.id, quantity });
        // eslint-disable-next-line no-await-in-loop
        const sale = await S.add('sales', {
          date: U.today(),
          channel: 'Calculadora',
          clientId: null,
          productId: product.id,
          quantity,
          unitPrice,
          discount: 0,
          fixedFees: 0,
          feePercent: 0,
          unitCost,
          ...math,
          notes: 'Venda rapida pela calculadora',
          origin: 'calculadora',
          originId: null,
        });
        // eslint-disable-next-line no-await-in-loop
        const consignment = await S.add('consignments', {
          sellerId: user.id,
          clientId: null,
          productId: product.id,
          quantitySent: quantity,
          quantitySold: quantity,
          quantityReturned: 0,
          unitPrice,
          costAtSend: unitCost,
          amountPaid: 0,
          status: 'com_cliente',
          date: U.today(),
          notes: `Venda calculadora ${sale.id}`,
        });
        if (consignment && consignment.id) {
          // eslint-disable-next-line no-await-in-loop
          await S.add('consignmentEvents', {
            consignmentId: consignment.id,
            type: 'venda_cliente',
            date: U.today(),
            quantity,
            amount: quantity * unitPrice,
          });
        }
      } else {
        if (product.type !== 'servico' && U.number(product.currentStock) < quantity) {
          throw new Error(`${product.name} nao tem estoque suficiente.`);
        }
        // eslint-disable-next-line no-await-in-loop
        await S.add('sales', {
          date: U.today(),
          channel: 'Calculadora',
          clientId: null,
          productId: product.id,
          quantity,
          unitPrice,
          discount: 0,
          fixedFees: 0,
          feePercent: 0,
          unitCost,
          ...math,
          notes: 'Venda rapida pela calculadora',
          origin: 'calculadora',
          originId: null,
        });
        if (isAdmin() && product.type !== 'servico') {
          // eslint-disable-next-line no-await-in-loop
          await S.update('products', product.id, { currentStock: U.number(product.currentStock) - quantity });
          // eslint-disable-next-line no-await-in-loop
          await S.recordMovement({
            date: U.today(),
            type: 'saida_venda',
            productId: product.id,
            quantity: -quantity,
            unitCost,
            totalCost: -(quantity * unitCost),
            notes: 'Venda rapida pela calculadora',
          });
        }
      }
    }
    await S.refresh();
  }

  function wireQuickSale(container) {
    const root = container.querySelector('[data-calc-sale-root]');
    if (!root) return;
    const form = root.querySelector('[data-calc-sale-add]');
    const itemsEl = root.querySelector('[data-calc-sale-items]');
    const totalEl = root.querySelector('[data-calc-sale-total]');
    const feedbackEl = root.querySelector('[data-calc-sale-feedback]');
    const saveButton = root.querySelector('[data-calc-sale-save]');
    const clearButton = root.querySelector('[data-calc-sale-clear]');
    const items = [];

    function setFeedback(message, type = 'info') {
      feedbackEl.innerHTML = message ? UI.formNotice(message, type) : '';
    }

    function suggestedPrice(product) {
      if (!product) return 0;
      if (currentUser()?.role === 'vendedor' && Calc.resolveSellerPrice) {
        return Calc.resolveSellerPrice({ product, sellerPrice: sellerPriceForProduct(product.id) }).price;
      }
      return product.defaultPrice || product.salePrice || 0;
    }

    function renderItems() {
      const rows = items.map((item, index) => {
        const product = productById(item.productId);
        return [
          U.escapeHtml(product ? product.name : 'Produto'),
          U.qty(item.quantity, product?.unit),
          UI.moneyCell(item.unitPrice),
          UI.moneyCell(U.number(item.quantity) * U.number(item.unitPrice)),
          `<button type="button" class="small danger" data-calc-sale-remove="${index}">Remover</button>`,
        ];
      });
      itemsEl.innerHTML = UI.table(['Produto', 'Qtd.', 'Unitario', 'Total', ''], rows, 'Nenhum item na venda.');
      totalEl.textContent = U.money(items.reduce((sum, item) => sum + U.number(item.quantity) * U.number(item.unitPrice), 0));
      saveButton.disabled = items.length === 0;
    }

    form.addEventListener('change', (event) => {
      if (event.target.name !== 'productId') return;
      const product = productById(event.target.value);
      if (product && form.elements.unitPrice && !form.elements.unitPrice.dataset.touched) {
        form.elements.unitPrice.value = suggestedPrice(product);
      }
    });
    form.elements.unitPrice?.addEventListener('input', (event) => { event.target.dataset.touched = '1'; });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const data = U.formData(form);
      const product = productById(data.productId);
      if (!product) return;
      items.push({
        productId: data.productId,
        quantity: U.number(data.quantity),
        unitPrice: U.number(data.unitPrice || suggestedPrice(product)),
      });
      form.reset();
      if (form.elements.unitPrice) delete form.elements.unitPrice.dataset.touched;
      setFeedback('');
      renderItems();
    });

    itemsEl.addEventListener('click', (event) => {
      const button = event.target.closest('[data-calc-sale-remove]');
      if (!button) return;
      items.splice(Number(button.dataset.calcSaleRemove), 1);
      renderItems();
    });

    clearButton.addEventListener('click', () => {
      items.splice(0, items.length);
      setFeedback('');
      renderItems();
    });

    saveButton.addEventListener('click', async () => {
      saveButton.disabled = true;
      try {
        await saveCalculatorSaleItems(items);
        items.splice(0, items.length);
        setFeedback('Venda salva e estoque atualizado.', 'success');
        renderItems();
        if (window.C360.app && typeof window.C360.app.refresh === 'function') window.C360.app.refresh();
      } catch (error) {
        setFeedback(error.message, 'danger');
        saveButton.disabled = items.length === 0;
      }
    });

    renderItems();
  }

  function wireStandardCalculator(container) {
    const card = container.querySelector('#calcStandard');
    const keypad = container.querySelector('#calcKeypad');
    const valueEl = container.querySelector('#calcValue');
    const exprEl = container.querySelector('#calcExpression');
    if (!card || !keypad || !valueEl || !exprEl) return;

    let current = '0'; // string bruta digitada: dígitos + no máximo uma vírgula
    let previous = null; // número (operando anterior)
    let operator = null; // '+' | '-' | '×' | '÷'
    let overwrite = false; // true logo após operador/igual/porcentagem: próximo dígito começa número novo
    let errorState = false;

    function parseCurrent() {
      const normalized = current.replace(',', '.');
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatNumber(value) {
      return value.toLocaleString('pt-BR', { maximumFractionDigits: 6 });
    }

    function formatRawForDisplay(raw) {
      const [intPart, decPart] = raw.split(',');
      const cleanInt = intPart.replace(/^0+(?=\d)/, '') || '0';
      const grouped = Number(cleanInt).toLocaleString('pt-BR');
      return decPart !== undefined ? `${grouped},${decPart}` : grouped;
    }

    function numberToRaw(value) {
      if (!Number.isFinite(value)) return '0';
      let text = value.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
      if (text === '' || text === '-0') text = '0';
      return text.replace('.', ',');
    }

    function round(value) {
      return Math.round(value * 1e10) / 1e10;
    }

    function calculate(a, op, b) {
      switch (op) {
        case '+': return round(a + b);
        case '-': return round(a - b);
        case '×': return round(a * b);
        case '÷': return b === 0 ? null : round(a / b);
        default: return b;
      }
    }

    function updateDisplay() {
      valueEl.textContent = errorState ? 'Erro' : formatRawForDisplay(current);
      exprEl.textContent = operator && previous !== null ? `${formatNumber(previous)} ${operator}` : ' ';
    }

    function showError() {
      errorState = true;
      current = '0';
      previous = null;
      operator = null;
      overwrite = true;
      updateDisplay();
    }

    function pressDigit(digit) {
      if (errorState) { current = '0'; errorState = false; overwrite = false; }
      if (overwrite) {
        current = digit;
        overwrite = false;
      } else if (current === '0') {
        current = digit;
      } else if (current.length < 15) {
        current += digit;
      }
      updateDisplay();
    }

    function pressDecimal() {
      if (errorState) { current = '0'; errorState = false; overwrite = false; }
      if (overwrite) {
        current = '0,';
        overwrite = false;
        updateDisplay();
        return;
      }
      if (!current.includes(',')) current += ',';
      updateDisplay();
    }

    function pressOperator(nextOperator) {
      if (errorState) return;
      const value = parseCurrent();
      if (operator && !overwrite) {
        const result = calculate(previous, operator, value);
        if (result === null) { showError(); return; }
        previous = result;
      } else {
        previous = value;
      }
      operator = nextOperator;
      overwrite = true;
      updateDisplay();
    }

    function pressEquals() {
      if (errorState) return;
      if (operator === null || previous === null) return;
      const value = parseCurrent();
      const result = calculate(previous, operator, value);
      if (result === null) { showError(); return; }
      current = numberToRaw(result);
      previous = null;
      operator = null;
      overwrite = true;
      updateDisplay();
    }

    function pressPercent() {
      if (errorState) return;
      const value = parseCurrent();
      const result = operator && previous !== null ? previous * (value / 100) : value / 100;
      current = numberToRaw(result);
      overwrite = true;
      updateDisplay();
    }

    function pressBackspace() {
      if (errorState) { current = '0'; errorState = false; updateDisplay(); return; }
      if (overwrite) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    function pressClear() {
      current = '0';
      previous = null;
      operator = null;
      overwrite = false;
      errorState = false;
      updateDisplay();
    }

    keypad.addEventListener('click', (event) => {
      const button = event.target.closest('[data-calc]');
      if (!button) return;
      const kind = button.dataset.calc;
      if (kind === 'digit') pressDigit(button.dataset.digit);
      else if (kind === 'decimal') pressDecimal();
      else if (kind === 'op') pressOperator(button.dataset.op);
      else if (kind === 'equals') pressEquals();
      else if (kind === 'percent') pressPercent();
      else if (kind === 'clear') pressClear();
      else if (kind === 'backspace') pressBackspace();
    });

    card.addEventListener('keydown', (event) => {
      const key = event.key;
      if (/^[0-9]$/.test(key)) { pressDigit(key); event.preventDefault(); }
      else if (key === ',' || key === '.') { pressDecimal(); event.preventDefault(); }
      else if (key === '+') { pressOperator('+'); event.preventDefault(); }
      else if (key === '-') { pressOperator('-'); event.preventDefault(); }
      else if (key === '*' || key.toLowerCase() === 'x') { pressOperator('×'); event.preventDefault(); }
      else if (key === '/') { pressOperator('÷'); event.preventDefault(); }
      else if (key === '%') { pressPercent(); event.preventDefault(); }
      else if (key === 'Enter' || key === '=') { pressEquals(); event.preventDefault(); }
      else if (key === 'Backspace') { pressBackspace(); event.preventDefault(); }
      else if (key === 'Escape') { pressClear(); event.preventDefault(); }
      else if (OPERATORS.includes(key)) { pressOperator(key); event.preventDefault(); }
    });

    updateDisplay();
  }

  function wireMargemTool(container) {
    const custoEl = container.querySelector('#calcMargemCusto');
    const precoEl = container.querySelector('#calcMargemPreco');
    const resultEl = container.querySelector('#calcMargemResultado');
    if (!custoEl || !precoEl || !resultEl) return;

    function recompute() {
      if (!custoEl.value.trim() && !precoEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const custo = U.number(custoEl.value);
      const preco = U.number(precoEl.value);
      if (preco <= 0) {
        resultEl.innerHTML = UI.formNotice('Informe um preço de venda maior que zero.', 'warning');
        return;
      }
      if (custo < 0) {
        resultEl.innerHTML = UI.formNotice('O custo não pode ser negativo.', 'warning');
        return;
      }
      const lucro = preco - custo;
      const margem = (lucro / preco) * 100;
      resultEl.innerHTML = `
        <div class="cost-item"><span>Margem</span><strong>${formatPercent(margem)}</strong></div>
        <div class="cost-item"><span>Lucro</span><strong>${U.money(lucro)}</strong></div>
      `;
    }

    custoEl.addEventListener('input', recompute);
    precoEl.addEventListener('input', recompute);
  }

    const margemEl = container.querySelector('#calcAlvoPercent');
    const resultEl = container.querySelector('#calcAlvoResultado');
    if (!custoEl || !margemEl || !resultEl) return;

    function recompute() {
      if (!custoEl.value.trim() && !margemEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const custo = U.number(custoEl.value);
      const margemAlvo = U.number(margemEl.value);

      if (margemAlvo < 0 || margemAlvo >= 100) {
