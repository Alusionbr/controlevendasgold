(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Preços por produto (padrão + piso) e preços específicos por vendedor.
  //
  // Camada de dados esperada em window.C360.api (implementada por outro
  // agente, em paralelo). Este módulo checa a existência de cada método
  // antes de chamar e cai em um placeholder inofensivo ("modo demonstração")
  // quando ela ainda não existe — mesmo padrão defensivo usado em
  // src/goals.js:
  //
  //   C360.api.list(table, query)                       -> Promise<Array<object>>
  //   C360.api.update(table, id, patch)                  -> Promise<object>
  //   C360.api.listSellerPrices(sellerId)                -> Promise<Array<{id, sellerId, productId, price, floor}>>
  //   C360.api.setSellerPrice({sellerId, productId, price, floor}) -> Promise<object> (upsert)
  //
  //   C360.state.getState()       -> objeto síncrono com cache; para ADMIN
  //                                   inclui `products` completo (com
  //                                   defaultPrice/priceFloor).
  //   C360.state.getCurrentUser() -> {id, role, name, businessId} | null
  //
  // Ver docs/backend.md §5 (products/seller_prices) e §7 (regra do piso de
  // preço) para o contrato completo destes campos.
  // ==========================================================================

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.api / C360.state
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function hasApi(method) {
    return !!(api() && typeof api()[method] === 'function');
  }

  async function safeCall(method, ...args) {
    if (!hasApi(method)) return null;
    try {
      return await api()[method](...args);
    } catch (error) {
      console.error(`C360.pricing: erro ao chamar C360.api.${method}`, error);
      return null;
    }
  }

  function currentUser() {
    try {
      if (window.C360.state && typeof window.C360.state.getCurrentUser === 'function') {
        return window.C360.state.getCurrentUser() || null;
      }
    } catch (error) {
      console.error('C360.pricing: erro ao ler usuário atual', error);
    }
    return null;
  }

  function readProductsFromState() {
    try {
      if (window.C360.state && typeof window.C360.state.getState === 'function') {
        const st = window.C360.state.getState();
        return Array.isArray(st?.products) ? st.products : [];
      }
    } catch (error) {
      console.error('C360.pricing: erro ao ler produtos do estado', error);
    }
    return [];
  }

  // ---------------------------------------------------------------------
  // Botão de ação escopado ao módulo (não usa o delegador global de
  // cliques da aplicação — os listeners abaixo ficam presos ao container).
  // ---------------------------------------------------------------------
  function pricingActionButton(action, id, label, extraClass = 'secondary') {
    return `<button type="button" class="small ${extraClass}" data-pricing-action="${U.escapeHtml(action)}" data-id="${U.escapeHtml(id)}">${U.escapeHtml(label)}</button>`;
  }

  // ---------------------------------------------------------------------
  // Render — admin
  // ---------------------------------------------------------------------
  function productDefaultsForm(products, editingProduct) {
    const defaults = editingProduct || {};
    return `
      <form id="pricingProductForm" class="grid-form">
        <label>Produto
          <select name="productId" required ${editingProduct ? 'disabled' : ''}>
            ${UI.optionList(products, defaults.id || '', products.length ? 'Selecione' : 'Nenhum produto cadastrado')}
          </select>
        </label>
        <label>Preço padrão sugerido (R$)
          <input name="defaultPrice" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.defaultPrice ?? '')}">
        </label>
        <label>Piso mínimo de venda (R$)
          <input name="priceFloor" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.priceFloor ?? '')}">
          <span>Deixe vazio para este produto não ter piso mínimo.</span>
        </label>
        <button type="submit">${editingProduct ? 'Salvar preço padrão' : 'Definir preço padrão'}</button>
        ${editingProduct ? '<button type="button" class="ghost" data-pricing-action="cancel-edit-product">Cancelar edição</button>' : ''}
      </form>
    `;
  }

  function sellerOverrideForm(sellers, products) {
    return `
      <form id="pricingSellerForm" class="grid-form">
        <label>Vendedor
          <select name="sellerId" required>
            ${UI.optionList(sellers, '', sellers.length ? 'Selecione' : 'Nenhum vendedor disponível')}
          </select>
        </label>
        <label>Produto
          <select name="productId" required>
            ${UI.optionList(products, '', products.length ? 'Selecione' : 'Nenhum produto cadastrado')}
          </select>
        </label>
        <label>Preço deste vendedor (R$)
          <input name="price" type="number" step="0.01" min="0" placeholder="Vazio = usa o preço padrão do produto">
        </label>
        <label>Piso deste vendedor (R$)
          <input name="floor" type="number" step="0.01" min="0" placeholder="Vazio = usa o piso padrão do produto">
        </label>
        <button type="submit">Salvar preço do vendedor</button>
      </form>
    `;
  }

  function productsTable(products) {
    const rows = products.map((product) => [
      U.escapeHtml(product.name),
      U.escapeHtml(product.unit || '—'),
      UI.moneyCell(product.defaultPrice),
      product.priceFloor === null || product.priceFloor === undefined ? '—' : UI.moneyCell(product.priceFloor),
      pricingActionButton('edit-product', product.id, 'Editar'),
    ]);
    return UI.table(['Produto', 'Un.', 'Preço padrão', 'Piso mínimo', 'Ações'], rows, 'Nenhum produto cadastrado ainda.');
  }

  function overridesTable(sellerPrices, sellersById, productsById) {
    const rows = sellerPrices.map((row) => [
      U.escapeHtml(sellersById.get(String(row.sellerId))?.name || 'Vendedor removido'),
      U.escapeHtml(productsById.get(String(row.productId))?.name || 'Produto removido'),
      row.price === null || row.price === undefined ? '—' : UI.moneyCell(row.price),
      row.floor === null || row.floor === undefined ? '—' : UI.moneyCell(row.floor),
    ]);
    return UI.table(['Vendedor', 'Produto', 'Preço', 'Piso'], rows, 'Nenhum preço específico de vendedor cadastrado ainda.');
  }

  function renderAdmin(data = {}) {
    const products = data.products || [];
    const sellers = data.sellers || [];
    const sellerPrices = data.sellerPrices || [];
    const editingProduct = data.editingProductId
      ? products.find((product) => String(product.id) === String(data.editingProductId)) || null
      : null;
    const apiAvailable = data.apiAvailable !== false;
    const loading = !!data.loading;

    const sellersById = new Map(sellers.map((seller) => [String(seller.id), seller]));
    const productsById = new Map(products.map((product) => [String(product.id), product]));

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (update, listSellerPrices, setSellerPrice) e C360.state.getState para gerenciar preços reais.', 'warning');
    const loadingNotice = loading ? UI.formNotice('Carregando preços...', 'info') : '';

    return UI.section(
      'Preços e piso mínimo',
      'Defina o preço padrão e o piso mínimo de venda de cada produto, e ajuste preços específicos por vendedor quando necessário.',
      `
        ${notice}${loadingNotice}
        <div class="two-columns">
          <div class="panel-card">
            <h3>Preço padrão do produto</h3>
            ${productDefaultsForm(products, editingProduct)}
          </div>
          <div class="panel-card">
            <h3>Preço específico por vendedor</h3>
            ${sellerOverrideForm(sellers, products)}
          </div>
        </div>
        <h3>Produtos</h3>
        ${productsTable(products)}
        <h3>Preços por vendedor cadastrados</h3>
        ${overridesTable(sellerPrices, sellersById, productsById)}
      `
    );
  }

  // ---------------------------------------------------------------------
  // Mount — admin (listeners escopados ao container, sem depender do
  // delegador global de cliques da aplicação)
  // ---------------------------------------------------------------------
  function mountAdmin(container, options = {}) {
    if (!container) return null;

    let products = options.products || readProductsFromState();
    let sellers = options.sellers || [];
    let sellerPrices = [];
    let editingProductId = null;
    let loading = true;

    function paint() {
      container.innerHTML = renderAdmin({
        products,
        sellers,
        sellerPrices,
        editingProductId,
        loading,
        apiAvailable: hasApi('update') || hasApi('setSellerPrice') || hasApi('listSellerPrices') || hasApi('list'),
      });
    }

    // Estratégia de busca:
    // - produtos: lidos de C360.state.getState().products (o contrato diz
    //   que a visão do admin já inclui defaultPrice/priceFloor), sem round-trip
    //   de rede extra;
    // - vendedores: C360.api.list('profiles', { role: 'vendedor', businessId })
    //   — método genérico documentado no contrato (não há um listSellers
    //   dedicado nesta entrega);
    // - preços por vendedor: C360.api.listSellerPrices(sellerId) chamado uma
    //   vez por vendedor encontrado e agregado em uma lista só, com sellerId
    //   preenchido defensivamente caso a linha não venha com o campo.
    async function fetchSellers() {
      if (!hasApi('list')) return [];
      const user = currentUser();
      try {
        const rows = await api().list('profiles', { role: 'vendedor', businessId: user?.businessId });
        return Array.isArray(rows) ? rows : [];
      } catch (error) {
        console.error('C360.pricing: erro ao listar vendedores', error);
        return [];
      }
    }

    async function fetchSellerPrices(sellerList) {
      if (!hasApi('listSellerPrices') || !sellerList.length) return [];
      try {
        const perSeller = await Promise.all(sellerList.map((seller) => safeCall('listSellerPrices', seller.id)));
        return perSeller.flatMap((rows, index) => {
          if (!Array.isArray(rows)) return [];
          return rows.map((row) => ({ ...row, sellerId: row.sellerId ?? sellerList[index].id }));
        });
      } catch (error) {
        console.error('C360.pricing: erro ao listar preços por vendedor', error);
        return [];
      }
    }

    async function loadAll() {
      loading = true;
      paint();
      products = readProductsFromState();
      sellers = await fetchSellers();
      sellerPrices = await fetchSellerPrices(sellers);
      loading = false;
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const productForm = event.target.closest('#pricingProductForm');
      const sellerForm = event.target.closest('#pricingSellerForm');

      if (productForm) {
        event.preventDefault();
        try {
          const data = U.formData(productForm);
          const productId = editingProductId || data.productId;
          if (!productId) throw new Error('Selecione um produto.');
          const patch = {
            default_price: data.defaultPrice === '' ? 0 : U.number(data.defaultPrice),
            price_floor: data.priceFloor === '' ? null : U.number(data.priceFloor),
          };
          if (hasApi('update')) {
            await api().update('products', productId, patch);
          } else {
            alert('Modo demonstração: conecte C360.api.update para salvar preços reais.');
          }
          editingProductId = null;
          await loadAll();
        } catch (error) {
          alert(error.message);
        }
        return;
      }

      if (sellerForm) {
        event.preventDefault();
        try {
          const data = U.formData(sellerForm);
          if (!data.sellerId) throw new Error('Selecione um vendedor.');
          if (!data.productId) throw new Error('Selecione um produto.');
          const payload = {
            sellerId: data.sellerId,
            productId: data.productId,
            price: data.price === '' ? null : U.number(data.price),
            floor: data.floor === '' ? null : U.number(data.floor),
          };
          if (hasApi('setSellerPrice')) {
            await api().setSellerPrice(payload);
          } else {
            alert('Modo demonstração: conecte C360.api.setSellerPrice para salvar preços reais.');
          }
          await loadAll();
        } catch (error) {
          alert(error.message);
        }
      }
    });

    container.addEventListener('click', (event) => {
      const button = event.target.closest('[data-pricing-action]');
      if (!button) return;
      const { pricingAction, id } = button.dataset;
      if (pricingAction === 'edit-product') {
        editingProductId = id;
        paint();
      } else if (pricingAction === 'cancel-edit-product') {
        editingProductId = null;
        paint();
      }
    });

    paint();
    loadAll();

    return { refresh: loadAll };
  }

  // ---------------------------------------------------------------------
  // Vendedor — hint de preço sugerido/mínimo e validação reutilizável
  //
  // Ponto de integração para a tela de VENDAS/DEVOLUÇÕES (dono: outro
  // agente): antes de enviar o formulário de venda, chamar
  //
  //   const result = C360.pricing.validateSalePriceInput(inputValue, { product, sellerPrice });
  //   if (!result.ok) { mostrar result.message e bloquear o envio; }
  //   // caso contrário, usar result.parsedPrice como unitPrice numérico.
  //
  // `product` é o item vindo de seller_products/products (precisa apenas de
  // salePrice/defaultPrice/priceFloor). `sellerPrice` é a linha de
  // seller_prices do vendedor logado para este produto, ou null/undefined
  // se ele não tiver override. Quem monta o formulário de venda decide como
  // obter esses dois objetos (ex.: via C360.api.listSellerPrices(currentUser.id)
  // filtrado pelo productId) — esta função não faz a busca sozinha para não
  // acoplar ao layout do formulário de vendas.
  // ---------------------------------------------------------------------
  function renderSellerFloorHint(product, sellerPrice) {
    const Calc = window.C360.calc;
    if (!Calc || typeof Calc.resolveSellerPrice !== 'function') return '';
    const resolved = Calc.resolveSellerPrice({ product, sellerPrice });
    const suggestedText = `Preço sugerido: ${U.money(resolved.price)}`;
    const floorText = resolved.floor === null || resolved.floor === undefined
      ? 'sem piso mínimo definido'
      : `Mínimo: ${U.money(resolved.floor)}`;
    return `<p class="pricing-hint">${suggestedText} · ${floorText}</p>`;
  }

  function validateSalePriceInput(unitPriceString, context = {}) {
    const parsedPrice = U.number(unitPriceString);
    const Calc = window.C360.calc;
    if (!Calc || typeof Calc.resolveSellerPrice !== 'function' || typeof Calc.validatePriceFloor !== 'function') {
      // Camadas de cálculo indisponíveis: não bloqueia o vendedor, o servidor
      // (trigger de piso de preço) continua sendo a garantia final.
      return { ok: true, message: null, parsedPrice };
    }
    const { floor } = Calc.resolveSellerPrice({ product: context.product, sellerPrice: context.sellerPrice });
    const result = Calc.validatePriceFloor({ unitPrice: parsedPrice, floor });
    return { ok: result.ok, message: result.message, parsedPrice };
  }

  window.C360.pricing = {
    renderAdmin,
    mountAdmin,
    renderSellerFloorHint,
    validateSalePriceInput,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Devoluções e desperdícios — lançáveis para QUALQUER venda, independente
  // de `origin` (manual | pedido | consignado | ...). Módulo autocontido.
  //
  // Contrato remoto esperado (implementado por outro agente em paralelo em
  // window.C360.api / window.C360.state — ver docs/backend.md §5 e §7):
  //
  //   C360.api.list(table, query)      -> Promise<Array<object>>
  //   C360.api.insert(table, payload)  -> Promise<object>
  //   C360.api.update(table, id, patch)-> Promise<object>
  //
  //   C360.state.getState()            -> object
  //   C360.state.getCurrentUser()      -> { id, role, name, businessId } | null
  //   C360.state.isAdmin()             -> boolean
  //   C360.state.add(collectionName, payload)    -> Promise<object>
  //   C360.state.recordMovement(payload)         -> Promise<object>
  //
  // Como em src/goals.js, cada chamada a C360.state é feita de forma
  // defensiva: se o método ainda não existir (módulo de dados não montado
  // nesta tela/teste), a função retorna { ok: false, error } em vez de
  // quebrar a UI.
  //
  // sale (camelCase) esperado por este módulo:
  //   { id, productId, clientId, quantity, unitPrice, unitCost, sellerId,
  //     businessId, origin, date }
  // ==========================================================================

  const FALLBACK_ERROR_DEVOLUCAO = 'Não foi possível registrar a devolução. Tente novamente.';
  const FALLBACK_ERROR_DESPERDICIO = 'Não foi possível registrar o desperdício. Tente novamente.';

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.state (mesmo padrão de src/goals.js)
  // ---------------------------------------------------------------------
  function stateApi() {
    return window.C360.state || null;
  }

  function hasState(method) {
    return !!(stateApi() && typeof stateApi()[method] === 'function');
  }

  function calc() {
    return window.C360.calc || null;
  }

  // ---------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------
  function panelDomId(sale, suffix) {
    return `returns-${U.escapeHtml(sale.id)}-${suffix}`;
  }

  function render(sale) {
    if (!sale || !sale.id) {
      return UI.formNotice('Venda não encontrada para lançar devolução/desperdício.', 'warning');
    }

    const maxQty = U.number(sale.quantity) > 0 ? U.number(sale.quantity) : '';
    const devQtyId = panelDomId(sale, 'dev-qtd');
    const devNotesId = panelDomId(sale, 'dev-notes');
    const despQtyId = panelDomId(sale, 'desp-qtd');
    const despNotesId = panelDomId(sale, 'desp-notes');

    return `
      <div class="returns-panel" data-returns-panel data-sale-id="${U.escapeHtml(sale.id)}">
        <div class="returns-panel-grid">
          <form class="stack-form returns-form" data-role="devolucao-form" novalidate>
            <h4>Registrar devolução</h4>
            <p class="returns-hint">O cliente devolveu parte ou toda a quantidade: o dinheiro e o estoque voltam.</p>
            <label>
              <span class="field-label">Quantidade devolvida</span>
              <input id="${devQtyId}" name="quantity" type="number" step="any" min="0" ${maxQty !== '' ? `max="${U.escapeHtml(maxQty)}"` : ''} required>
            </label>
            <label>
              <span class="field-label">Motivo (opcional)</span>
              <textarea id="${devNotesId}" name="notes" rows="2" maxlength="500" placeholder="Ex.: cliente desistiu de parte do pedido"></textarea>
            </label>
            <button type="submit">Registrar devolução</button>
            <div class="notice" data-role="feedback" hidden></div>
          </form>

          <form class="stack-form returns-form" data-role="desperdicio-form" novalidate>
            <h4>Registrar desperdício</h4>
            <p class="returns-hint">Produto perdido/estragado/quebrado: só o estoque sai, sem envolver dinheiro.</p>
            <label>
              <span class="field-label">Quantidade perdida</span>
              <input id="${despQtyId}" name="quantity" type="number" step="any" min="0" required>
            </label>
            <label>
              <span class="field-label">Motivo (opcional)</span>
              <textarea id="${despNotesId}" name="notes" rows="2" maxlength="500" placeholder="Ex.: caiu no chão, validade vencida"></textarea>
            </label>
            <button type="submit" class="secondary">Registrar desperdício</button>
            <div class="notice" data-role="feedback" hidden></div>
          </form>
        </div>
      </div>
    `;
  }

  // ---------------------------------------------------------------------
  // Feedback inline (dentro do próprio mini-form, sem alert())
  // ---------------------------------------------------------------------
  function showFeedback(form, message, type) {
    const box = form.querySelector('[data-role="feedback"]');
    if (!box) return;
    box.hidden = false;
    box.className = `notice ${type}`;
    box.innerHTML = U.escapeHtml(message);
  }

  function setFormBusy(form, busy) {
    const button = form.querySelector('button[type="submit"]');
    if (button) button.disabled = busy;
    form.querySelectorAll('input, textarea').forEach((field) => {
      field.disabled = busy;
    });
  }

  // ---------------------------------------------------------------------
  // Mount — wiring escopado ao container (mesmo padrão de src/goals.js:
  // listeners presos ao container recebido, não ao documento inteiro)
  // ---------------------------------------------------------------------
  function mount(container, sale, options = {}) {
    if (!container || !sale || !sale.id) return null;
    const onDone = typeof options.onDone === 'function' ? options.onDone : null;

    if (container.getAttribute('data-returns-sale-id') !== String(sale.id) || !container.querySelector('[data-returns-panel]')) {
      container.innerHTML = render(sale);
      container.setAttribute('data-returns-sale-id', String(sale.id));
    }

    if (container.dataset.c360ReturnsWired === '1') return { container, sale };
    container.dataset.c360ReturnsWired = '1';

    container.addEventListener('submit', async (event) => {
      const devForm = event.target.closest('[data-role="devolucao-form"]');
      const despForm = event.target.closest('[data-role="desperdicio-form"]');
      if (!devForm && !despForm) return;
      event.preventDefault();

      const form = devForm || despForm;
      const data = U.formData(form);
      const quantity = U.number(data.quantity);
      const notes = (data.notes || '').trim();

      setFormBusy(form, true);
      try {
        const result = devForm
          ? await recordDevolucao({ sale, quantity, notes })
          : await recordDesperdicio({ sale, quantity, notes });

        if (result.ok) {
          const label = devForm ? 'Devolução registrada com sucesso.' : 'Desperdício registrado com sucesso.';
          showFeedback(form, notes ? `${label} (${notes})` : label, 'success');
          form.reset();
          if (onDone) onDone();
        } else {
          showFeedback(form, result.error, 'error');
        }
      } finally {
        setFormBusy(form, false);
      }
    });

    return { container, sale };
  }

  // ---------------------------------------------------------------------
  // recordDevolucao
  // ---------------------------------------------------------------------
  async function recordDevolucao({ sale, quantity, notes } = {}) {
    try {
      const qty = U.number(quantity);
      const maxQty = U.number(sale?.quantity);

      if (!sale || !sale.id) return { ok: false, error: 'Venda inválida.' };
      if (qty <= 0) return { ok: false, error: 'Informe uma quantidade maior que zero.' };
      if (maxQty > 0 && qty > maxQty) {
        return { ok: false, error: `Quantidade não pode ser maior que a vendida (${maxQty}).` };
      }
      if (!hasState('add')) return { ok: false, error: FALLBACK_ERROR_DEVOLUCAO };

      let money = { grossRevenue: -qty * U.number(sale.unitPrice), netRevenue: -qty * U.number(sale.unitPrice), cogs: -qty * U.number(sale.unitCost), grossProfit: 0, percentFees: 0, margin: 0 };
      if (calc() && typeof calc().saleMath === 'function') {
        money = calc().saleMath({
          quantity: -qty,
          unitPrice: sale.unitPrice,
          discount: 0,
          fixedFees: 0,
          feePercent: 0,
          unitCost: sale.unitCost,
        });
      }

      const salePayload = {
        businessId: sale.businessId,
        productId: sale.productId,
        clientId: sale.clientId,
        sellerId: sale.sellerId,
        quantity: -qty,
        unitPrice: sale.unitPrice,
        unitCost: sale.unitCost,
        discount: 0,
        fixedFees: 0,
        feePercent: 0,
        percentFees: money.percentFees,
        grossRevenue: money.grossRevenue,
        netRevenue: money.netRevenue,
        cogs: money.cogs,
        grossProfit: money.grossProfit,
        margin: money.margin,
        parentSaleId: sale.id,
        origin: 'devolucao',
        date: U.today(),
        notes: notes || '',
      };

      const saleRecord = await stateApi().add('sales', salePayload);

      let movement = null;
      if (hasState('recordMovement')) {
        movement = await stateApi().recordMovement({
          type: 'entrada_devolucao_venda',
          productId: sale.productId,
          quantity: qty,
          unitCost: sale.unitCost,
          refType: 'sale',
          refId: sale.id,
          notes: notes || '',
          date: U.today(),
        });
      }

      return { ok: true, saleRecord, movement };
    } catch (error) {
      console.error('C360.returns: erro em recordDevolucao', error);
      return { ok: false, error: error?.message || FALLBACK_ERROR_DEVOLUCAO };
    }
  }

  // ---------------------------------------------------------------------
  // recordDesperdicio
  // ---------------------------------------------------------------------
  async function recordDesperdicio({ sale, quantity, notes } = {}) {
    try {
      const qty = U.number(quantity);
      if (!sale || !sale.id) return { ok: false, error: 'Venda inválida.' };
      if (qty <= 0) return { ok: false, error: 'Informe uma quantidade maior que zero.' };
      if (!hasState('recordMovement')) return { ok: false, error: FALLBACK_ERROR_DESPERDICIO };

      const movement = await stateApi().recordMovement({
        type: 'saida_desperdicio',
        productId: sale.productId,
        quantity: -qty,
        unitCost: sale.unitCost,
        refType: 'sale',
        refId: sale.id,
        notes: notes || '',
        date: U.today(),
      });

      return { ok: true, movement };
    } catch (error) {
      console.error('C360.returns: erro em recordDesperdicio', error);
      return { ok: false, error: error?.message || FALLBACK_ERROR_DESPERDICIO };
    }
  }

  window.C360.returns = {
    render,
    mount,
    recordDevolucao,
    recordDesperdicio,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Estoque próprio de vendedor + aprovação de pedidos — módulo autocontido.
  //
  // API remota esperada (implementada por outro agente em window.C360.api,
  // ver docs/backend.md). Este módulo checa a existência de cada método
  // antes de chamar e cai num placeholder inofensivo ("modo demonstração")
  // quando ela ainda não existe — segue o mesmo padrão defensivo de
  // src/goals.js:
  //
  //   C360.api.list(table, query)                        -> Promise<Array<object>>
  //   C360.api.insert(table, payload)                     -> Promise<object>
  //   C360.api.update(table, id, patch)                   -> Promise<object>
  //   C360.api.listSellerStock(sellerId)                  -> Promise<Array<{id, sellerId, productId, quantity}>>
  //   C360.api.setSellerStock({sellerId, productId, quantity}) -> Promise<object>
  //   C360.api.approveOrder(id)                           -> Promise<object>
  //   C360.api.rejectOrder(id)                            -> Promise<object>
  //
  //   C360.state.getState()        -> object (products, clients, orders, profiles...)
  //   C360.state.getCurrentUser()  -> { id, role, name, businessId } | null
  //   C360.state.isAdmin()         -> boolean
  //   C360.state.add(collectionName, payload)   -> Promise<object>
  //   C360.state.update(collectionName, id, patch) -> Promise<object>
  //
  // IMPORTANTE — interpretação de produto (flagged para o dono do negócio
  // confirmar): "vendedor vende do estoque próprio -> vira consignado devido
  // ao admin" foi modelado aqui como uma consignação já 100% vendida na hora
  // da venda: quantitySent = quantitySold = quantidade vendida,
  // quantityReturned = 0, amountPaid = 0. O saldo em aberto dessa consignação
  // (quantitySold * unitPrice - amountPaid, ver Calc.consignmentOpenAmount em
  // src/calculations.js) passa a representar exatamente o valor que o
  // vendedor deve repassar ao administrador por essa venda. Confirmar se essa
  // leitura ("saldo em aberto = dívida do vendedor com o admin") é a
  // semântica desejada, ou se o produto quer um conceito de "consignado
  // reverso" separado.
  // ==========================================================================

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.api / C360.state
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function hasApi(method) {
    return !!(api() && typeof api()[method] === 'function');
  }

  async function safeCall(method, ...args) {
    if (!hasApi(method)) return null;
    return api()[method](...args);
  }

  function stateApi() {
    return window.C360.state || null;
  }

  function currentUser() {
    try {
      const s = stateApi();
      return s && typeof s.getCurrentUser === 'function' ? s.getCurrentUser() || null : null;
    } catch (error) {
      console.error('C360.sellerStock: erro ao ler usuário atual', error);
      return null;
    }
  }

  function isAdmin() {
    try {
      const s = stateApi();
      return !!(s && typeof s.isAdmin === 'function' && s.isAdmin());
    } catch (error) {
      console.error('C360.sellerStock: erro ao checar admin', error);
      return false;
    }
  }

  function fullState() {
    try {
      const s = stateApi();
      return (s && typeof s.getState === 'function' && s.getState()) || {};
    } catch (error) {
      console.error('C360.sellerStock: erro ao ler estado', error);
      return {};
    }
  }

  function productsList() {
    const st = fullState();
    return Array.isArray(st.products) ? st.products : [];
  }

  function productById(id) {
    return productsList().find((product) => String(product.id) === String(id)) || null;
  }

  async function addRecord(collectionName, payload) {
    const s = stateApi();
    if (s && typeof s.add === 'function') return s.add(collectionName, payload);
    if (hasApi('insert')) return safeCall('insert', collectionName, payload);
    throw new Error('Não foi possível salvar: camada de dados indisponível.');
  }

  async function loadSellers() {
    const st = fullState();
    if (Array.isArray(st.profiles) && st.profiles.length) {
      return st.profiles
        .filter((profile) => profile.role === 'vendedor' && profile.active !== false)
        .map((profile) => ({ id: profile.id, name: profile.name }));
    }
    if (hasApi('list')) {
      try {
        const rows = await safeCall('list', 'profiles', { role: 'vendedor' });
        if (Array.isArray(rows)) {
          return rows.filter((profile) => profile.active !== false).map((profile) => ({ id: profile.id, name: profile.name }));
        }
      } catch (error) {
        console.error('C360.sellerStock: erro ao listar vendedores', error);
      }
    }
    return [];
  }

  // ---------------------------------------------------------------------
  // Estilos (injetados uma única vez; o módulo não edita styles/main.css).
  // Segue o mesmo padrão de src/goals.js: variáveis --accent-gold* com
  // fallback inline, para funcionar mesmo se o tema ainda não as define.
  // ---------------------------------------------------------------------
  const STYLE_ID = 'c360-sellerstock-inline-styles';

  function ensureStyles() {
    if (document.getElementById(STYLE_ID)) return;
    const style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = `
      .ss-stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.85rem; }
      .ss-stock-card {
        background: var(--surface, #fff);
        border: 1px solid var(--line, #d8e1df);
        border-radius: var(--radius, 14px);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .ss-stock-card-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
      .ss-inline-form { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px dashed var(--line, #d8e1df); }
      .ss-inline-form label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.85rem; }
      .ss-hint { font-size: 0.82rem; color: var(--muted, #5d6f6d); margin-top: 0.5rem; }
      .ss-approvals-head { display: flex; justify-content: flex-end; margin-bottom: 0.6rem; }
      .ss-approvals-list { display: flex; flex-direction: column; gap: 0.8rem; }
      .ss-approval-card {
        background: var(--surface, #fff);
        border: 1px solid var(--accent-gold, #c9a227);
        border-radius: var(--radius, 14px);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        box-shadow: var(--shadow-sm, 0 4px 14px rgba(12, 60, 56, 0.07));
      }
      .ss-approval-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
      .ss-approval-detail { font-size: 0.88rem; color: var(--muted, #5d6f6d); margin: 0; }
      .ss-badge-urgent {
        background: var(--accent-gold-soft, #faf1d4);
        color: var(--accent-gold-deep, #8a6f14);
        font-weight: 700;
        animation: c360SsPulse 1.8s ease-in-out infinite;
      }
      @keyframes c360SsPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(201, 162, 39, 0.35); }
        50% { box-shadow: 0 0 0 6px rgba(201, 162, 39, 0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .ss-badge-urgent { animation: none; }
      }
      .ss-approval-card .actions button { flex: 1 1 auto; min-width: 130px; }
    `;
    document.head.appendChild(style);
  }

  // =========================================================================
  // SELLER SIDE — Meu estoque
  // =========================================================================

  function sellFormHtml(productId, product) {
    const clients = fullState().clients || [];
    const salePrice = product && product.salePrice ? product.salePrice : '';
    return `
      <form class="ss-inline-form" data-ss-sell-form data-product-id="${U.escapeHtml(productId)}">
        <label>Cliente
          <select name="clientId" required>${UI.optionList(clients, '', clients.length ? 'Selecione o cliente' : 'Nenhum cliente cadastrado')}</select>
        </label>
        <label>Quantidade
          <input name="quantity" type="number" step="0.001" min="0.001" required>
        </label>
        <label>Preço unitário
          <input name="unitPrice" type="number" step="0.01" min="0.01" required value="${U.escapeHtml(salePrice)}">
        </label>
        <label>Observações
          <input name="notes" placeholder="Opcional">
        </label>
        <div class="actions">
          <button type="submit">Confirmar venda</button>
          <button type="button" class="small secondary" data-ss-action="cancel-sell">Cancelar</button>
        </div>
      </form>
    `;
  }

  function stockCardHtml(row, openProductId) {
    const product = row.product || productById(row.productId);
    const name = product ? U.escapeHtml(product.name) : 'Produto removido';
    const unit = product ? product.unit : '';
    const isOpen = String(openProductId) === String(row.productId);
    return `
      <article class="ss-stock-card" data-stock-product-id="${U.escapeHtml(row.productId)}">
        <div class="ss-stock-card-head">
          <strong>${name}</strong>
          <span class="badge">${U.qty(row.quantity, unit)}</span>
        </div>
        <button type="button" data-ss-action="toggle-sell" data-product-id="${U.escapeHtml(row.productId)}">Vender deste estoque</button>
        ${isOpen ? sellFormHtml(row.productId, product) : ''}
      </article>
    `;
  }

  function renderMyStock(data = {}) {
    ensureStyles();
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : hasApi('listSellerStock');
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.listSellerStock para ver seu estoque próprio real.', 'warning');

    if (data.loading) {
      return UI.section(
        'Meu estoque',
        'Produtos que você guarda para vender por conta própria. Ao vender, o valor vira consignado devido ao administrador.',
        `${notice}${UI.formNotice('Carregando seu estoque...', 'info')}`
      );
    }

    const rows = (data.rows || []).filter((row) => U.number(row.quantity) > 0);
    const body = rows.length
      ? `<div class="ss-stock-grid">${rows.map((row) => stockCardHtml(row, data.openProductId)).join('')}</div>`
      : '<div class="empty-state"><strong>Nenhum estoque próprio no momento.</strong><span>Peça ao administrador para lhe repassar produtos.</span></div>';

    return UI.section(
      'Meu estoque',
      'Produtos que você guarda para vender por conta própria. Ao vender, o valor vira consignado devido ao administrador.',
      `${notice}${body}`
    );
  }

  function mountMyStock(container) {
    if (!container) return null;

    const user = currentUser();
    if (!hasApi('listSellerStock') || !user) {
      container.innerHTML = renderMyStock({ apiAvailable: hasApi('listSellerStock'), rows: [] });
      return null;
    }

    let rows = [];
    let loading = true;
    let openProductId = null;

    function paint() {
      container.innerHTML = renderMyStock({ rows, loading, openProductId, apiAvailable: true });
    }

    async function load() {
      loading = true;
      paint();
      try {
        const res = await safeCall('listSellerStock', user.id);
        rows = Array.isArray(res) ? res : [];
      } catch (error) {
        console.error('C360.sellerStock: erro ao carregar estoque próprio', error);
        rows = [];
      }
      loading = false;
      paint();
    }

    container.addEventListener('click', (event) => {
      const toggleButton = event.target.closest('[data-ss-action="toggle-sell"]');
      if (toggleButton) {
        const { productId } = toggleButton.dataset;
        openProductId = String(openProductId) === String(productId) ? null : productId;
        paint();
        return;
      }
      const cancelButton = event.target.closest('[data-ss-action="cancel-sell"]');
      if (cancelButton) {
        openProductId = null;
        paint();
      }
    });

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-ss-sell-form]');
      if (!form) return;
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      try {
        const data = U.formData(form);
        if (submitButton) submitButton.disabled = true;
        const result = await sellFromOwnStock({
          productId: form.dataset.productId,
          quantity: data.quantity,
          unitPrice: data.unitPrice,
          clientId: data.clientId,
          notes: data.notes || '',
        });
        if (!result.ok) throw new Error(result.error || 'Não foi possível registrar a venda.');
        openProductId = null;
        await load();
      } catch (error) {
        alert(error.message);
        if (submitButton) submitButton.disabled = false;
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  async function sellFromOwnStock({ productId, quantity, unitPrice, clientId, notes } = {}) {
    try {
      if (!hasApi('listSellerStock') || !hasApi('setSellerStock')) {
        return { ok: false, error: 'Recurso de estoque próprio indisponível (modo demonstração).' };
      }
      const user = currentUser();
      if (!user) return { ok: false, error: 'Usuário não autenticado.' };
      if (!productId) return { ok: false, error: 'Produto não informado.' };
      if (!clientId) return { ok: false, error: 'Selecione um cliente.' };

      const qty = U.number(quantity);
      const price = U.number(unitPrice);
      if (qty <= 0) return { ok: false, error: 'Quantidade precisa ser maior que zero.' };
      if (price <= 0) return { ok: false, error: 'Preço unitário precisa ser maior que zero.' };

      // 1) Ler estoque atual do vendedor e validar disponibilidade.
      const currentRows = (await safeCall('listSellerStock', user.id)) || [];
      const row = Array.isArray(currentRows)
        ? currentRows.find((item) => String(item.productId) === String(productId))
        : null;
      const currentQty = row ? U.number(row.quantity) : 0;
      if (qty > currentQty) {
        return { ok: false, error: 'Estoque insuficiente' };
      }

      // 2) Decrementar o estoque próprio do vendedor.
      await safeCall('setSellerStock', { sellerId: user.id, productId, quantity: currentQty - qty });

      // 3) Criar a consignação já vendida (ver nota de interpretação no topo do arquivo).
      const product = productById(productId);
      const costAtSend = product && typeof product.avgCost === 'number' ? product.avgCost : null;

      const consignmentPayload = {
        sellerId: user.id,
        productId,
        clientId,
        quantitySent: qty,
        quantitySold: qty,
        quantityReturned: 0,
        unitPrice: price,
        costAtSend,
        amountPaid: 0,
        status: 'com_cliente',
        date: U.today(),
        notes: notes || '',
      };
      const consignment = await addRecord('consignments', consignmentPayload);

      // 4) Evento de venda, best-effort — não deve derrubar o fluxo se falhar.
      if (consignment && consignment.id) {
        try {
          await addRecord('consignment_events', {
            consignmentId: consignment.id,
            type: 'venda_cliente',
            date: U.today(),
            quantity: qty,
            amount: qty * price,
          });
        } catch (eventError) {
          console.error('C360.sellerStock: consignação criada, mas evento falhou', eventError);
        }
      }

      return { ok: true, consignment };
    } catch (error) {
      console.error('C360.sellerStock: erro em sellFromOwnStock', error);
      return { ok: false, error: error.message || 'Erro ao registrar venda do estoque próprio.' };
    }
  }

  // =========================================================================
  // ADMIN SIDE — Repassar estoque
  // =========================================================================

  function renderGrantStock(data = {}) {
    ensureStyles();
    if (!isAdmin()) {
      return UI.formNotice('Acesso restrito ao administrador.', 'warning');
    }
    const sellers = data.sellers || [];
    const products = data.products || productsList();
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : hasApi('setSellerStock');
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.setSellerStock para repassar estoque de verdade.', 'warning');
    const feedback = data.feedback ? UI.formNotice(data.feedback.message, data.feedback.type || 'success') : '';

    return UI.section(
      'Repassar estoque a vendedor',
      'Defina quanto de cada produto fica sob responsabilidade do vendedor (consignado dele).',
      `
        ${notice}${feedback}
        <form data-ss-grant-form class="grid-form">
          <label>Vendedor
            <select name="sellerId" required>${UI.optionList(sellers, '', sellers.length ? 'Selecione' : 'Nenhum vendedor cadastrado')}</select>
          </label>
          <label>Produto
            <select name="productId" required>${UI.optionList(products, '', 'Selecione o produto')}</select>
          </label>
          <label>Quantidade a repassar
            <input name="quantity" type="number" step="0.001" min="0" required>
          </label>
          <button type="submit">Definir estoque do vendedor</button>
        </form>
        <p class="ss-hint">O valor informado substitui o saldo atual do vendedor para este produto (não soma).</p>
      `
    );
  }

  function mountGrantStock(container) {
    if (!container) return null;
    if (!isAdmin()) {
      container.innerHTML = renderGrantStock();
      return null;
    }

    let sellers = [];
    let feedback = null;

    function paint() {
      container.innerHTML = renderGrantStock({
        sellers,
        products: productsList(),
        apiAvailable: hasApi('setSellerStock'),
        feedback,
      });
    }

    async function load() {
      sellers = await loadSellers();
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('[data-ss-grant-form]');
      if (!form) return;
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      try {
        const data = U.formData(form);
        if (!data.sellerId) throw new Error('Selecione um vendedor.');
        if (!data.productId) throw new Error('Selecione um produto.');
        const quantity = U.number(data.quantity);
        if (quantity < 0) throw new Error('Quantidade não pode ser negativa.');
        if (!hasApi('setSellerStock')) {
          feedback = { message: 'Modo demonstração: conecte C360.api.setSellerStock para repassar estoque de verdade.', type: 'warning' };
          paint();
          return;
        }
        if (submitButton) submitButton.disabled = true;
        await safeCall('setSellerStock', { sellerId: data.sellerId, productId: data.productId, quantity });
        feedback = { message: 'Estoque do vendedor atualizado.', type: 'success' };
        form.reset();
        paint();
      } catch (error) {
        feedback = { message: error.message, type: 'error' };
        paint();
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  // =========================================================================
  // ADMIN SIDE — Aprovações de pedidos
  // =========================================================================

  function orderApprovalStatus(order) {
    return order.approvalStatus || order.approval_status || '';
  }

  function approvalCardHtml(order) {
    const product = productById(order.productId);
    const st = fullState();
    const seller = (st.profiles || []).find((profile) => String(profile.id) === String(order.sellerId));
    const sellerName = seller ? seller.name : 'Vendedor';
    const qtyLabel = U.qty(order.quantity, product ? product.unit : '');
    const dateLabel = order.dueDate || order.date || '—';

    return `
      <article class="ss-approval-card" data-order-id="${U.escapeHtml(order.id)}">
        <div class="ss-approval-head">
          <strong>${product ? U.escapeHtml(product.name) : 'Produto removido'}</strong>
          <span class="badge ss-badge-urgent">Aguardando aprovação</span>
        </div>
        <p class="ss-approval-detail">Vendedor: <strong>${U.escapeHtml(sellerName)}</strong> · Quantidade: <strong>${qtyLabel}</strong></p>
        <p class="ss-approval-detail">Data: ${U.escapeHtml(dateLabel)}${order.notes ? ` · Obs.: ${U.escapeHtml(order.notes)}` : ''}</p>
        <div class="actions">
          <button type="button" data-ss-action="approve" data-order-id="${U.escapeHtml(order.id)}">Aprovar</button>
          <button type="button" class="danger" data-ss-action="reject" data-order-id="${U.escapeHtml(order.id)}">Rejeitar</button>
        </div>
      </article>
    `;
  }

  function renderApprovals(data = {}) {
    ensureStyles();
    if (!isAdmin()) {
      return UI.formNotice('Acesso restrito ao administrador.', 'warning');
    }
    const apiAvailable = data.apiAvailable !== undefined ? data.apiAvailable : (hasApi('list') || hasApi('approveOrder'));
    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (list/approveOrder/rejectOrder) para aprovar pedidos de verdade.', 'warning');

    if (data.loading) {
      return UI.section(
        'Aprovações de pedidos',
        'Pedidos de reposição feitos pelos vendedores aguardando sua aprovação.',
        `${notice}${UI.formNotice('Carregando pedidos pendentes...', 'info')}`
      );
    }

    const orders = data.orders || [];
    const count = orders.length;
    const countBadge = count > 0
      ? `<span class="badge ss-badge-urgent">${count} pendente${count === 1 ? '' : 's'}</span>`
      : '<span class="badge ok">Tudo em dia</span>';

    const listHtml = count
      ? orders.map((order) => approvalCardHtml(order)).join('')
      : '<div class="empty-state"><strong>Nenhum pedido aguardando aprovação.</strong><span>Pedidos novos de vendedores aparecem aqui.</span></div>';

    return UI.section(
      'Aprovações de pedidos',
      'Pedidos de reposição feitos pelos vendedores aguardando sua aprovação.',
      `
        ${notice}
        <div class="ss-approvals-head">${countBadge}</div>
        <div class="ss-approvals-list">${listHtml}</div>
      `
    );
  }

  function mountApprovals(container, options = {}) {
    if (!container) return null;
    const onDone = options.onDone;
    if (!isAdmin()) {
      container.innerHTML = renderApprovals();
      return null;
    }

    let orders = [];
    let loading = true;

    function paint() {
      container.innerHTML = renderApprovals({ orders, loading, apiAvailable: hasApi('list') || hasApi('approveOrder') });
    }

    async function load() {
      loading = true;
      paint();
      let rows = null;
      if (hasApi('list')) {
        try {
          rows = await safeCall('list', 'orders', { approval_status: 'pendente_aprovacao' });
        } catch (error) {
          console.error('C360.sellerStock: erro ao listar pedidos pendentes', error);
          rows = null;
        }
      }
      if (!Array.isArray(rows)) {
        const st = fullState();
        rows = (st.orders || []).filter((order) => orderApprovalStatus(order) === 'pendente_aprovacao');
      }
      orders = Array.isArray(rows) ? rows : [];
      loading = false;
      paint();
    }

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-ss-action="approve"], [data-ss-action="reject"]');
      if (!button) return;
      const { ssAction, orderId } = button.dataset;
      if (ssAction === 'reject' && !confirm('Rejeitar este pedido?')) return;
      button.disabled = true;
      try {
        if (ssAction === 'approve') {
          if (!hasApi('approveOrder')) throw new Error('Modo demonstração: conecte C360.api.approveOrder.');
          await safeCall('approveOrder', orderId);
        } else {
          if (!hasApi('rejectOrder')) throw new Error('Modo demonstração: conecte C360.api.rejectOrder.');
          await safeCall('rejectOrder', orderId);
        }
        await load();
        if (typeof onDone === 'function') onDone();
      } catch (error) {
        alert(error.message);
        button.disabled = false;
      }
    });

    paint();
    load();
    return { refresh: load };
  }

  window.C360.sellerStock = {
    renderMyStock,
    mountMyStock,
    sellFromOwnStock,
    renderGrantStock,
    mountGrantStock,
    renderApprovals,
    mountApprovals,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  // Módulo "Calculadora" (aba Calculadora).
  // Expõe window.C360.calculator = { render, mount }.
  //
  // CSS novo necessário (ainda não existe em styles/main.css — não editado por
  // este arquivo, apenas listado aqui e no relatório para o agente MOBILE/SEC):
  //   .calculator-card   — cartão que envolve a calculadora padrão (pode herdar de .panel-card)
  //   .calc-display      — moldura do visor (número grande, alinhado à direita)
  //   .calc-expression   — linha pequena acima do visor com a operação pendente
  //   .calc-value        — número grande do visor
  //   .calc-keypad       — grid 4 colunas para as teclas
  //   .calc-key          — tamanho/toque das teclas (usadas junto com .secondary/.ghost/.danger já existentes)
  //   .calc-key.span2    — tecla que ocupa 2 colunas (o "0")
  //   .calc-field        — rótulo + input empilhados nos mini-formulários de negócio

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  const OPERATORS = ['+', '-', '×', '÷'];

  function formatPercent(value) {
    return `${value.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}%`;
  }

  function placeholderResult() {
    return '<div class="cost-item"><span>Resultado</span><strong>—</strong></div>';
  }

  // ---------- HTML ----------

  function render() {
    return `
      <div class="calculator-page">
        ${renderStandardCalculator()}
        ${renderBusinessTools()}
      </div>
    `;
  }

  function renderStandardCalculator() {
    return `
      <div class="panel-card calculator-card" id="calcStandard" tabindex="0" aria-label="Calculadora. Use o teclado numérico ou toque nos botões.">
        <h3>Calculadora</h3>
        <div class="calc-display" id="calcDisplay" aria-live="polite">
          <div class="calc-expression" id="calcExpression">&nbsp;</div>
          <div class="calc-value" id="calcValue">0</div>
        </div>
        <div class="calc-keypad" id="calcKeypad" role="group" aria-label="Teclado da calculadora">
          <button type="button" class="calc-key ghost danger" data-calc="clear" aria-label="Limpar tudo">C</button>
          <button type="button" class="calc-key ghost" data-calc="backspace" aria-label="Apagar último dígito">⌫</button>
          <button type="button" class="calc-key ghost" data-calc="percent" aria-label="Porcentagem">%</button>
          <button type="button" class="calc-key secondary" data-calc="op" data-op="÷" aria-label="Dividir">÷</button>

          <button type="button" class="calc-key ghost" data-calc="digit" data-digit="7">7</button>
          <button type="button" class="calc-key ghost" data-calc="digit" data-digit="8">8</button>
          <button type="button" class="calc-key ghost" data-calc="digit" data-digit="9">9</button>

  // ---------- Wiring (escopado ao container, sem depender do delegador global) ----------

  function mount(container) {
    if (!container) return;
    wireStandardCalculator(container);
    wireMargemTool(container);
    wireMarkupTool(container);
    wireDescontoTool(container);
    wireMargemAlvoTool(container);
  }

  function wireStandardCalculator(container) {
    const card = container.querySelector('#calcStandard');
    const keypad = container.querySelector('#calcKeypad');
    const valueEl = container.querySelector('#calcValue');
    const exprEl = container.querySelector('#calcExpression');
    if (!card || !keypad || !valueEl || !exprEl) return;

    let current = '0'; // string bruta digitada: dígitos + no máximo uma vírgula
    let previous = null; // número (operando anterior)
    let operator = null; // '+' | '-' | '×' | '÷'
    let overwrite = false; // true logo após operador/igual/porcentagem: próximo dígito começa número novo
    let errorState = false;

    function parseCurrent() {
      const normalized = current.replace(',', '.');
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatNumber(value) {
      return value.toLocaleString('pt-BR', { maximumFractionDigits: 6 });
    }

    function formatRawForDisplay(raw) {
      const [intPart, decPart] = raw.split(',');
      const cleanInt = intPart.replace(/^0+(?=\d)/, '') || '0';
      const grouped = Number(cleanInt).toLocaleString('pt-BR');
      return decPart !== undefined ? `${grouped},${decPart}` : grouped;
    }

    function numberToRaw(value) {
      if (!Number.isFinite(value)) return '0';
      let text = value.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
      if (text === '' || text === '-0') text = '0';
      return text.replace('.', ',');
    }

    function round(value) {
      return Math.round(value * 1e10) / 1e10;
    }

    function calculate(a, op, b) {
      switch (op) {
        case '+': return round(a + b);
        case '-': return round(a - b);
        case '×': return round(a * b);
        case '÷': return b === 0 ? null : round(a / b);
        default: return b;
      }
    }

    function updateDisplay() {
      valueEl.textContent = errorState ? 'Erro' : formatRawForDisplay(current);
      exprEl.textContent = operator && previous !== null ? `${formatNumber(previous)} ${operator}` : ' ';
    }

    function showError() {
      errorState = true;
      current = '0';
      previous = null;
      operator = null;
      overwrite = true;
      updateDisplay();
    }

    function pressDigit(digit) {
      if (errorState) { current = '0'; errorState = false; overwrite = false; }
      if (overwrite) {
        current = digit;
        overwrite = false;
      } else if (current === '0') {
        current = digit;
      } else if (current.length < 15) {
        current += digit;
      }
      updateDisplay();
    }

    function pressDecimal() {
      if (errorState) { current = '0'; errorState = false; overwrite = false; }
      if (overwrite) {
        current = '0,';
        overwrite = false;
        updateDisplay();
        return;
      }
      if (!current.includes(',')) current += ',';
      updateDisplay();
    }

    function pressOperator(nextOperator) {
      if (errorState) return;
      const value = parseCurrent();
      if (operator && !overwrite) {
        const result = calculate(previous, operator, value);
        if (result === null) { showError(); return; }
        previous = result;
      } else {
        previous = value;
      }
      operator = nextOperator;
      overwrite = true;
      updateDisplay();
    }

    function pressEquals() {
      if (errorState) return;
      if (operator === null || previous === null) return;
      const value = parseCurrent();
      const result = calculate(previous, operator, value);
      if (result === null) { showError(); return; }
      current = numberToRaw(result);
      previous = null;
      operator = null;
      overwrite = true;
      updateDisplay();
    }

    function pressPercent() {
      if (errorState) return;
      const value = parseCurrent();
      const result = operator && previous !== null ? previous * (value / 100) : value / 100;
      current = numberToRaw(result);
      overwrite = true;
      updateDisplay();
    }

    function pressBackspace() {
      if (errorState) { current = '0'; errorState = false; updateDisplay(); return; }
      if (overwrite) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    function pressClear() {
      current = '0';
      previous = null;
      operator = null;
      overwrite = false;
      errorState = false;
      updateDisplay();
    }

    keypad.addEventListener('click', (event) => {
      const button = event.target.closest('[data-calc]');
      if (!button) return;
      const kind = button.dataset.calc;
      if (kind === 'digit') pressDigit(button.dataset.digit);
      else if (kind === 'decimal') pressDecimal();
      else if (kind === 'op') pressOperator(button.dataset.op);
      else if (kind === 'equals') pressEquals();
      else if (kind === 'percent') pressPercent();
      else if (kind === 'clear') pressClear();
      else if (kind === 'backspace') pressBackspace();
    });

    card.addEventListener('keydown', (event) => {
      const key = event.key;
      if (/^[0-9]$/.test(key)) { pressDigit(key); event.preventDefault(); }
      else if (key === ',' || key === '.') { pressDecimal(); event.preventDefault(); }
      else if (key === '+') { pressOperator('+'); event.preventDefault(); }
      else if (key === '-') { pressOperator('-'); event.preventDefault(); }
      else if (key === '*' || key.toLowerCase() === 'x') { pressOperator('×'); event.preventDefault(); }
      else if (key === '/') { pressOperator('÷'); event.preventDefault(); }
      else if (key === '%') { pressPercent(); event.preventDefault(); }
      else if (key === 'Enter' || key === '=') { pressEquals(); event.preventDefault(); }
      else if (key === 'Backspace') { pressBackspace(); event.preventDefault(); }
      else if (key === 'Escape') { pressClear(); event.preventDefault(); }
      else if (OPERATORS.includes(key)) { pressOperator(key); event.preventDefault(); }
    });

    updateDisplay();
  }

  function wireMargemTool(container) {
    const custoEl = container.querySelector('#calcMargemCusto');
    const precoEl = container.querySelector('#calcMargemPreco');
    const resultEl = container.querySelector('#calcMargemResultado');
    if (!custoEl || !precoEl || !resultEl) return;

    function recompute() {
      if (!custoEl.value.trim() && !precoEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const custo = U.number(custoEl.value);
      const preco = U.number(precoEl.value);
      if (preco <= 0) {
        resultEl.innerHTML = UI.formNotice('Informe um preço de venda maior que zero.', 'warning');
        return;
      }
      if (custo < 0) {
        resultEl.innerHTML = UI.formNotice('O custo não pode ser negativo.', 'warning');
        return;
      }
      const lucro = preco - custo;
      const margem = (lucro / preco) * 100;
      resultEl.innerHTML = `
        <div class="cost-item"><span>Margem</span><strong>${formatPercent(margem)}</strong></div>
        <div class="cost-item"><span>Lucro</span><strong>${U.money(lucro)}</strong></div>
      `;
    }

    custoEl.addEventListener('input', recompute);
    precoEl.addEventListener('input', recompute);
  }

  function wireMarkupTool(container) {
    const custoEl = container.querySelector('#calcMarkupCusto');
    const markupEl = container.querySelector('#calcMarkupPercent');
    const resultEl = container.querySelector('#calcMarkupResultado');
    if (!custoEl || !markupEl || !resultEl) return;

    function recompute() {
      if (!custoEl.value.trim() && !markupEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const custo = U.number(custoEl.value);
      const markup = U.number(markupEl.value);
      if (custo <= 0) {
        resultEl.innerHTML = UI.formNotice('Informe um custo maior que zero.', 'warning');
        return;
      }
      const preco = custo * (1 + markup / 100);
      if (!Number.isFinite(preco) || preco <= 0) {
        resultEl.innerHTML = UI.formNotice('Esse markup resulta em preço inválido. Use um percentual maior.', 'warning');
        return;
      }
      const lucro = preco - custo;
      resultEl.innerHTML = `
        <div class="cost-item"><span>Preço de venda</span><strong>${U.money(preco)}</strong></div>
        <div class="cost-item"><span>Lucro</span><strong>${U.money(lucro)}</strong></div>
      `;
    }

    custoEl.addEventListener('input', recompute);
    markupEl.addEventListener('input', recompute);
  }

  function wireDescontoTool(container) {
    const precoEl = container.querySelector('#calcDescontoPreco');
    const descontoEl = container.querySelector('#calcDescontoPercent');
    const resultEl = container.querySelector('#calcDescontoResultado');
    if (!precoEl || !descontoEl || !resultEl) return;

    function recompute() {
      if (!precoEl.value.trim() && !descontoEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const preco = U.number(precoEl.value);
      const desconto = U.number(descontoEl.value);
      if (preco <= 0) {
        resultEl.innerHTML = UI.formNotice('Informe um preço maior que zero.', 'warning');
        return;
      }
      if (desconto < 0 || desconto > 100) {
        resultEl.innerHTML = UI.formNotice('O desconto deve ficar entre 0% e 100%.', 'warning');
        return;
      }
      const valorDesconto = preco * (desconto / 100);
      const precoFinal = preco - valorDesconto;
      resultEl.innerHTML = `
        <div class="cost-item"><span>Preço final</span><strong>${U.money(precoFinal)}</strong></div>
        <div class="cost-item"><span>Desconto</span><strong>${U.money(valorDesconto)}</strong></div>
      `;
    }

    precoEl.addEventListener('input', recompute);
    descontoEl.addEventListener('input', recompute);
  }

  function wireMargemAlvoTool(container) {
    const custoEl = container.querySelector('#calcAlvoCusto');
    const margemEl = container.querySelector('#calcAlvoPercent');
    const resultEl = container.querySelector('#calcAlvoResultado');
    if (!custoEl || !margemEl || !resultEl) return;

    function recompute() {
      if (!custoEl.value.trim() && !margemEl.value.trim()) {
        resultEl.innerHTML = placeholderResult();
        return;
      }
      const custo = U.number(custoEl.value);
      const margemAlvo = U.number(margemEl.value);
      if (custo <= 0) {
        resultEl.innerHTML = UI.formNotice('Informe um custo maior que zero.', 'warning');
        return;
      }
      if (margemAlvo < 0 || margemAlvo >= 100) {
        resultEl.innerHTML = UI.formNotice('A margem alvo deve ficar entre 0% e 99,99%.', 'warning');
        return;
      }
      const preco = custo / (1 - margemAlvo / 100);
      if (!Number.isFinite(preco) || preco <= 0) {
        resultEl.innerHTML = UI.formNotice('Não foi possível calcular um preço válido com esses valores.', 'warning');
        return;
      }
      const lucro = preco - custo;
      resultEl.innerHTML = `
        <div class="cost-item"><span>Preço sugerido</span><strong>${U.money(preco)}</strong></div>
        <div class="cost-item"><span>Lucro</span><strong>${U.money(lucro)}</strong></div>
      `;
    }

    custoEl.addEventListener('input', recompute);
    margemEl.addEventListener('input', recompute);
  }

  window.C360.calculator = { render, mount };
})();
</script>

    if (!dateStr) return '';
