(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const { number, money } = window.C360.utils;

  function weightedAverageCost(currentStock, currentAvgCost, incomingQuantity, incomingTotalCost) {
    const stock = number(currentStock);
    const avg = number(currentAvgCost);
    const qty = number(incomingQuantity);
    const total = number(incomingTotalCost);
    const currentValue = Math.max(stock, 0) * avg;
    const newQuantity = Math.max(stock, 0) + qty;
    if (newQuantity <= 0) return 0;
    return (currentValue + total) / newQuantity;
  }

  function calculateRecipeCost(finalProductId, state) {
    const finalProduct = state.products.find((product) => product.id === finalProductId);
    const rows = state.recipes.filter((row) => row.finalProductId === finalProductId);

    const items = rows.map((row) => {
      const input = state.products.find((product) => product.id === row.inputProductId);
      const quantityPerUnit = number(row.quantityPerUnit);
      const avgCost = input ? number(input.avgCost) : 0;
      return {
        ...row,
        input,
        quantityPerUnit,
        avgCost,
        costPerUnit: quantityPerUnit * avgCost,
      };
    });

    const materialsCost = items.reduce((sum, item) => sum + item.costPerUnit, 0);
    const laborCost = number(finalProduct?.laborCostPerUnit);
    const overheadCost = number(finalProduct?.overheadCostPerUnit);
    const baseCost = materialsCost + laborCost + overheadCost;
    const lossPercent = number(finalProduct?.lossPercent) / 100;
    const lossCost = baseCost * Math.max(lossPercent, 0);
    const totalCostPerUnit = baseCost + lossCost;
    const targetMarginPercent = number(finalProduct?.targetMarginPercent) / 100;
    const taxFeePercent = number(finalProduct?.taxFeePercent) / 100;
    const denominator = 1 - targetMarginPercent - taxFeePercent;
    const suggestedSalePrice = denominator > 0.02 ? totalCostPerUnit / denominator : 0;
    const manualSalePrice = number(finalProduct?.salePrice);
    const selectedSalePrice = manualSalePrice > 0 ? manualSalePrice : suggestedSalePrice;
    const grossProfitAtSelectedPrice = selectedSalePrice - (selectedSalePrice * taxFeePercent) - totalCostPerUnit;
    const marginAtSelectedPrice = selectedSalePrice > 0 ? grossProfitAtSelectedPrice / selectedSalePrice : 0;

    return {
      finalProduct,
      items,
      materialsCost,
      laborCost,
      overheadCost,
      baseCost,
      lossCost,
      totalCostPerUnit,
      targetMarginPercent,
      taxFeePercent,
      suggestedSalePrice,
      manualSalePrice,
      selectedSalePrice,
      grossProfitAtSelectedPrice,
      marginAtSelectedPrice,
    };
  }

  function saleMath({ quantity, unitPrice, discount, fixedFees, feePercent, unitCost }) {
    const qty = number(quantity);
    const price = number(unitPrice);
    const grossRevenue = qty * price;
    const percentFees = grossRevenue * (number(feePercent) / 100);
    const netRevenue = grossRevenue - number(discount) - number(fixedFees) - percentFees;
    const cogs = qty * number(unitCost);
    const grossProfit = netRevenue - cogs;
    const margin = netRevenue > 0 ? grossProfit / netRevenue : 0;
    return { grossRevenue, percentFees, netRevenue, cogs, grossProfit, margin };
  }

  // Saldo do vendedor com o admin (Fase 3 — ledger dedicado, ver
  // docs/replication-v1/04-fase3-ledger-vendedor.md): sempre a soma dos
  // lançamentos, nunca um número sobrescrito. Positivo = vendedor deve.
  function sellerBalance(entries) {
    return (entries || []).reduce((sum, entry) => {
      const amount = number(entry.amount);
      return entry.direction === 'credit' ? sum - amount : sum + amount;
    }, 0);
  }

  function consignmentOpenAmount(consignment) {
    const soldValue = number(consignment.quantitySold) * number(consignment.unitPrice);
    return Math.max(soldValue - number(consignment.amountPaid), 0);
  }

  function consignmentAvailableWithClient(consignment) {
    return number(consignment.quantitySent) - number(consignment.quantitySold) - number(consignment.quantityReturned);
  }

  function businessMetrics(state) {
    const businessId = state.activeBusinessId;
    if (!businessId) {
      return {
        stockValue: 0,
        lowStockCount: 0,
        netRevenue: 0,
        grossProfit: 0,
        consignmentsOpen: 0,
        pendingOrders: 0,
      };
    }

    const products = state.products.filter((product) => product.businessId === businessId);
    const sales = state.sales.filter((sale) => sale.businessId === businessId);
    const consignments = state.consignments.filter((item) => item.businessId === businessId);
    const orders = state.orders.filter((order) => order.businessId === businessId);

    return {
      stockValue: products.reduce((sum, product) => sum + number(product.currentStock) * number(product.avgCost), 0),
      lowStockCount: products.filter((product) => number(product.minStock) > 0 && number(product.currentStock) <= number(product.minStock)).length,
      netRevenue: sales.reduce((sum, sale) => sum + number(sale.netRevenue), 0),
      grossProfit: sales.reduce((sum, sale) => sum + number(sale.grossProfit), 0),
      consignmentsOpen: consignments.reduce((sum, item) => sum + consignmentOpenAmount(item), 0),
      pendingOrders: orders.filter((order) => !['despachado', 'concluido'].includes(order.status)).length,
    };
  }

  // Resolve o preço sugerido e o piso efetivo para um vendedor + produto,
  // espelhando exatamente a prioridade usada pelo trigger de piso de preço
  // no banco (docs/backend.md §7, passos 1-3):
  //   preço: seller_prices.price (se > 0) -> product.salePrice (se > 0) -> product.defaultPrice -> 0
  //   piso:  seller_prices.floor (se não for null/undefined) -> product.priceFloor -> null (sem piso)
  function resolveSellerPrice({ product, sellerPrice } = {}) {
    const sellerOverridePrice = number(sellerPrice?.price);
    const productSalePrice = number(product?.salePrice);
    const price = sellerOverridePrice > 0
      ? sellerOverridePrice
      : (productSalePrice > 0 ? productSalePrice : number(product?.defaultPrice));

    const sellerFloorDefined = sellerPrice != null && sellerPrice.floor !== null && sellerPrice.floor !== undefined;
    const productFloorDefined = product != null && product.priceFloor !== null && product.priceFloor !== undefined;
    const floor = sellerFloorDefined
      ? number(sellerPrice.floor)
      : (productFloorDefined ? number(product.priceFloor) : null);

    return { price, floor };
  }

  // Valida um preço unitário contra o piso efetivo. `floor` nulo/undefined
  // significa "sem piso" (sempre válido) — mesma regra do trigger de banco.
  function validatePriceFloor({ unitPrice, floor } = {}) {
    if (floor === null || floor === undefined) return { ok: true, message: null };
    const price = number(unitPrice);
    const floorValue = number(floor);
    if (price < floorValue) {
      return { ok: false, message: `Preço mínimo para este produto: ${money(floorValue)}` };
    }
    return { ok: true, message: null };
  }

  window.C360.calc = {
    weightedAverageCost,
    calculateRecipeCost,
    saleMath,
    sellerBalance,
    consignmentOpenAmount,
    consignmentAvailableWithClient,
    businessMetrics,
    resolveSellerPrice,
    validatePriceFloor,
  };
})();
</script>

  }

    moneyCell,

    section,
    formNotice,
    costBox,
    kanban,

  };

  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Autenticação (login/logout/sessão) + tela de gestão de vendedores (admin).
  //
  // Depende de window.C360.api e window.C360.state, implementados em paralelo
  // por outro agente (ver docs/backend.md). Os métodos são acessados de forma
  // preguiçosa (api()/state() abaixo) em vez de capturados no topo do arquivo,
  // porque a ordem de carregamento dos <script> entre auth.js/api.js/state.js
  // é responsabilidade do integrador — não presumimos qual carrega primeiro.
  //
  // API consumida (contrato, ver docs/backend.md):
  //   C360.api.signInWithPassword(email, password) -> {accessToken, refreshToken, expiresAt, user}
  //   C360.api.refreshSession(refreshToken)         -> {accessToken, refreshToken, expiresAt, user}
  //   C360.api.signOut(accessToken)                 -> void
  //   C360.api.getAuthUser(accessToken)              -> {id, email}
  //   C360.api.getProfile(userId)                    -> {id, role, name, businessId, active}
  //   C360.api.createSeller({email, password, name}) -> {id, email, name, role, businessId}
  //   C360.api.listSellers()                         -> Array<{id, name, active}>
  //   (opcional, usado só se existir) C360.api.update('profiles', id, patch)
  //
  //   C360.state.getState() / C360.state.refresh() / C360.state.getCurrentUser()
  //   C360.state.isAdmin() / (opcional) C360.state.update('profiles', id, patch)
  //   (opcional) C360.state.reset()
  //
  // Premissa assumida (não coberta explicitamente pelo contrato): os métodos
  // de domínio do C360.api que não recebem accessToken como parâmetro (ex.:
  // listSellers, createSeller) presumem que o próprio C360.api guarda
  // internamente o token da sessão ativa a partir das chamadas a
  // signInWithPassword/refreshSession. Este módulo não expõe o token para
  // fora de si mesmo além de passá-lo explicitamente nas chamadas que o
  // contrato define com esse parâmetro (getAuthUser, signOut). Se essa
  // premissa estiver errada, o integrador precisa adicionar uma ponte entre
  // auth.js e api.js para compartilhar o token atual.
  // ==========================================================================

  const STORAGE_KEY = 'controle360_session_v1';

  // ---------------------------------------------------------------------
  // Acesso preguiçoso aos módulos vizinhos
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function state() {
    return window.C360.state || null;
  }

  // ---------------------------------------------------------------------
  // Armazenamento da sessão (accessToken / refreshToken / expiresAt)
  // ---------------------------------------------------------------------
  function persistSession(session) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        accessToken: session.accessToken,
        refreshToken: session.refreshToken,
        expiresAt: session.expiresAt,
      }));
    } catch (error) {
      console.error('C360.auth: erro ao salvar sessão local.', error);
    }
  }

  function readStoredSession() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object' || !parsed.refreshToken) return null;
      return parsed;
    } catch (error) {
      console.error('C360.auth: erro ao ler sessão local.', error);
      return null;
    }
  }

  function clearStoredSession() {
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (error) {
      console.error('C360.auth: erro ao limpar sessão local.', error);
    }
  }

  // ---------------------------------------------------------------------
  // Perfil + validação de conta ativa
  // ---------------------------------------------------------------------
  async function fetchProfile(accessToken) {
    const authUser = await api().getAuthUser(accessToken);
    if (!authUser || !authUser.id) throw new Error('Não foi possível identificar o usuário logado.');
    return api().getProfile(authUser.id);
  }

  async function safeSignOutToken(accessToken) {
    try {
      await api().signOut(accessToken);
    } catch (error) {
      console.error('C360.auth: erro ao encerrar sessão desativada no servidor.', error);
    }
  }

  // ---------------------------------------------------------------------
  // Mapeamento de erros -> mensagens amigáveis em PT-BR
  // ---------------------------------------------------------------------
  function mapSignInError(error) {
    const message = String((error && error.message) || '').trim();
    const lower = message.toLowerCase();
    if (lower.includes('invalid login credentials') || lower.includes('invalid_grant')) {
      return 'E-mail ou senha inválidos.';
    }
    if (lower.includes('email not confirmed')) {
      return 'Confirme seu e-mail antes de entrar.';
    }
    if (error && error.status === 429) {
      return 'Muitas tentativas. Aguarde um instante e tente novamente.';
    }
    if (message) return message;
    return 'Não foi possível entrar. Verifique sua conexão e tente novamente.';
  }

  function mapCreateSellerError(error) {
    const status = error && error.status;
    const message = String((error && error.message) || '').trim();
    const lower = message.toLowerCase();

    if (status === 403 || lower.includes('permiss')) {
      return 'Você não tem permissão para criar vendedores.';
    }
    if (status === 409 || lower.includes('já está em uso') || lower.includes('already') || lower.includes('duplicate')) {
      return 'Este e-mail já está em uso.';
    }
    if (status === 401) {
      return 'Sua sessão expirou. Faça login novamente.';
    }
    if (status === 400) {
      return message || 'Dados inválidos. Verifique nome, e-mail e senha (mínimo 6 caracteres).';
    }
    if (status === 500) {
      return message || 'Erro interno do servidor. Tente novamente em instantes.';
    }
    return message || 'Não foi possível criar o vendedor. Tente novamente.';
  }

  // ---------------------------------------------------------------------
  // API pública: signIn / signOut / restoreSession
  // ---------------------------------------------------------------------
  async function signIn(email, password) {
    const trimmedEmail = String(email || '').trim();
    const pwd = String(password || '');
    if (!trimmedEmail || !pwd) {
      return { ok: false, error: 'Informe e-mail e senha.' };
    }
    if (!api() || typeof api().signInWithPassword !== 'function') {
      return { ok: false, error: 'Serviço de autenticação indisponível no momento.' };
    }

    let session;
    try {
      session = await api().signInWithPassword(trimmedEmail, pwd);
    } catch (error) {
      return { ok: false, error: mapSignInError(error) };
    }

    persistSession(session);

    try {
      const profile = await fetchProfile(session.accessToken);
      if (!profile || profile.active === false) {
        await safeSignOutToken(session.accessToken);
        clearStoredSession();
        return { ok: false, error: 'Sua conta foi desativada. Fale com o administrador.' };
      }
    } catch (error) {
      clearStoredSession();
      console.error('C360.auth: erro ao carregar perfil após login.', error);
      return { ok: false, error: 'Login feito, mas não foi possível carregar seu perfil. Tente novamente.' };
    }

    try {
      if (state() && typeof state().refresh === 'function') {
        await state().refresh();
      }
    } catch (error) {
      // Sessão e perfil são válidos; não bloqueamos o login por uma falha ao
      // atualizar o cache de dados — o usuário pode tentar recarregar depois.
      console.error('C360.auth: erro ao atualizar estado após login.', error);
    }

    return { ok: true };
  }

  async function signOut() {
    const stored = readStoredSession();
    if (stored && stored.accessToken && api() && typeof api().signOut === 'function') {
      try {
        await api().signOut(stored.accessToken);
      } catch (error) {
        console.error('C360.auth: erro ao encerrar sessão no servidor.', error);
      }
    }
    clearStoredSession();
    if (state() && typeof state().reset === 'function') {
      try {
        state().reset();
      } catch (error) {
        console.error('C360.auth: erro ao limpar estado local.', error);
      }
    }
  }

  async function restoreSession() {
    const stored = readStoredSession();
    if (!stored || !stored.refreshToken) return false;
    if (!api() || typeof api().refreshSession !== 'function') return false;

    let session;
    try {
      session = await api().refreshSession(stored.refreshToken);
    } catch (error) {
      clearStoredSession();
      return false;
    }

    persistSession(session);

    try {
      const profile = await fetchProfile(session.accessToken);
      if (!profile || profile.active === false) {
        clearStoredSession();
        return false;
      }
    } catch (error) {
      clearStoredSession();
      return false;
    }

    try {
      if (state() && typeof state().refresh === 'function') {
        await state().refresh();
      }
    } catch (error) {
      console.error('C360.auth: erro ao atualizar estado ao restaurar sessão.', error);
    }

    return true;
  }

  function getCurrentUser() {
    return (state() && typeof state().getCurrentUser === 'function') ? state().getCurrentUser() : null;
  }

  function isAdmin() {
    return !!(state() && typeof state().isAdmin === 'function' && state().isAdmin());
  }

  // ---------------------------------------------------------------------
  // Tela de login (também serve como gate "não autenticado")
  // Classes novas: .auth-screen, .auth-title, .auth-subtitle (ver relatório).
  // Demais classes são reaproveitadas de styles/main.css (.grid-form,
  // .notice/.notice.error, botão padrão).
  // ---------------------------------------------------------------------
  function render() {
    return `
      <div class="auth-screen">
        <h1 class="auth-title">Controle360</h1>
        <p class="auth-subtitle">Entre com seu e-mail e senha para continuar.</p>
        <div id="authError"></div>
        <form id="authLoginForm" class="grid-form" novalidate>
          <label class="full">E-mail
            <input type="email" name="email" required autocomplete="username" inputmode="email" placeholder="voce@exemplo.com">
          </label>
          <label class="full">Senha
            <input type="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
          </label>
          <button type="submit">Entrar</button>
        </form>
      </div>
    `;
  }

  function mount(container, options = {}) {
    if (!container) return;
    const onSuccess = (options && typeof options.onSuccess === 'function') ? options.onSuccess : function () {};

    function errorHost() {
      return container.querySelector('#authError');
    }

    function showError(message) {
      const host = errorHost();
      if (host) host.innerHTML = UI.formNotice(message, 'error');
    }

    function clearError() {
      const host = errorHost();
      if (host) host.innerHTML = '';
    }

    async function handleSubmit(event) {
      const form = event.target.closest('#authLoginForm');
      if (!form || !container.contains(form)) return;
      event.preventDefault();
      clearError();

      const data = U.formData(form);
      const email = (data.email || '').trim();
      const password = data.password || '';
      if (!email || !password) {
        showError('Informe e-mail e senha.');
        return;
      }

      const submitButton = form.querySelector('button[type="submit"]');
      const originalLabel = submitButton ? submitButton.textContent : '';
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = 'Entrando...';
      }

      try {
        const result = await signIn(email, password);
        if (result.ok) {
          onSuccess();
        } else {
          showError(result.error || 'Não foi possível entrar.');
        }
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalLabel;
        }
      }
    }

    container.addEventListener('submit', handleSubmit);
  }

  // ---------------------------------------------------------------------
  // Tela de gestão de vendedores (admin) — lista de vendedores. O botão
  // "Abrir painel" leva ao cockpit de página inteira (src/sellerCockpit.js),
  // onde ficam saldo/pagamento, estoque, envio de consignado, vendas e
  // aprovação de pedidos daquele vendedor num só lugar — reaproveitando a
  // lógica de C360.sellerLedger e C360.salesCart, sem duplicá-la.
  // ---------------------------------------------------------------------
  function ledger() { return window.C360.sellerLedger || null; }

  function sellerRow(seller) {
    const isActive = seller.active !== false;
    const statusBadge = isActive ? UI.badge('Ativo', 'ok') : UI.badge('Inativo', 'warn');
    const toggleAction = isActive ? 'deactivate-seller' : 'activate-seller';
    const toggleLabel = isActive ? 'Desativar' : 'Reativar';
    const toggleClass = isActive ? 'danger' : 'secondary';
    const L = ledger();
    const balance = L ? L.balanceFor(seller.id) : 0;

    return `
      <article class="panel-card seller-manage-card" data-seller-card="${U.escapeHtml(seller.id)}">
        <div class="approval-card-head">
          <strong>${U.escapeHtml(seller.name || '—')}</strong>
          ${statusBadge}
        </div>
        <p class="ss-approval-detail">${U.escapeHtml(seller.email || '—')}${balance > 0 ? ` · ${UI.badge(`Deve ${U.money(balance)}`, 'danger')}` : ''}</p>
        <div class="actions">
          <button type="button" class="small" data-action="open-cockpit" data-id="${U.escapeHtml(seller.id)}">Abrir painel</button>
          ${UI.actionButton(toggleAction, seller.id, toggleLabel, toggleClass)}
        </div>
      </article>
    `;
  }

  function renderSellers(data = {}) {
    const sellers = Array.isArray(data.sellers) ? data.sellers : [];
    const loading = !!data.loading;
    const listHtml = loading
      ? UI.formNotice('Carregando vendedores...', 'info')
      : (sellers.length
        ? `<div class="seller-ledger-grid">${sellers.map((seller) => sellerRow(seller)).join('')}</div>`
        : '<div class="empty-state"><strong>Nenhum vendedor cadastrado ainda.</strong><span>Crie um vendedor abaixo.</span></div>');

    const L = ledger();
    const totalOpen = !loading && L
      ? sellers.filter((seller) => seller.active !== false).reduce((sum, seller) => sum + Math.max(L.balanceFor(seller.id), 0), 0)
      : 0;

    return UI.section(
      'Vendedores',
      'Crie contas e clique em "Abrir painel" para ver e gerenciar tudo de um vendedor num só lugar: vendas, estoque, saldo, pagamentos e pedidos.',
      `
        ${!loading ? UI.metric('Total em aberto (todos os vendedores)', U.money(totalOpen), null) : ''}
        <div id="authSellersError"></div>
        <form id="authCreateSellerForm" class="grid-form">
          <label class="full">Nome
            <input name="name" required placeholder="Nome do vendedor">
          </label>
          <label>E-mail
            <input type="email" name="email" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="vendedor@exemplo.com">
          </label>
          <label>Senha provisória
            <input type="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
          </label>
          <button type="submit">Criar vendedor</button>
        </form>
        ${listHtml}
      `
    );
  }

  function mountSellers(container) {
    if (!container) return null;

    let sellers = [];
    let loading = true;

    function paint() {
      container.innerHTML = renderSellers({ sellers, loading });
    }

    function errorHost() {
      return container.querySelector('#authSellersError');
    }

    function showError(message) {
      const host = errorHost();
      if (host) host.innerHTML = UI.formNotice(message, 'error');
    }

    function clearError() {
      const host = errorHost();
      if (host) host.innerHTML = '';
    }

    async function loadSellers() {
      loading = true;
      paint();
      let list = [];
      let loadError = '';
      try {
        if (!api() || typeof api().listSellers !== 'function') {
          throw new Error('Serviço de vendedores indisponível no momento.');
        }
        const result = await api().listSellers();
        list = Array.isArray(result) ? result : [];
      } catch (error) {
        loadError = (error && error.message) || 'Não foi possível carregar os vendedores.';
      }
      sellers = list;
      loading = false;
      paint();
      if (loadError) showError(loadError);
    }

    container.addEventListener('submit', async (event) => {
      const createForm = event.target.closest('#authCreateSellerForm');

      if (createForm && container.contains(createForm)) {
        event.preventDefault();
        clearError();

        const data = U.formData(createForm);
        const name = (data.name || '').trim();
        const email = (data.email || '').trim();
        const password = data.password || '';

        if (!name) { showError('Informe o nome do vendedor.'); return; }
        if (!email) { showError('Informe o e-mail do vendedor.'); return; }
        if (password.length < 6) { showError('A senha provisória precisa ter ao menos 6 caracteres.'); return; }

        const submitButton = createForm.querySelector('button[type="submit"]');
        const originalLabel = submitButton ? submitButton.textContent : '';
        if (submitButton) {
          submitButton.disabled = true;
          submitButton.textContent = 'Criando...';
        }

        try {
          if (!api() || typeof api().createSeller !== 'function') {
            throw new Error('Serviço de vendedores indisponível no momento.');
          }
          const created = await api().createSeller({ email, password, name });
          createForm.reset();
          await loadSellers();
          // Confirmação explícita do e-mail que ficou gravado: o navegador pode
          // ter alterado o que foi digitado (autopreenchimento/sugestão de
          // domínio), então mostramos de volta o valor que o servidor realmente
          // salvou, não o que o admin digitou.
          alert(`Vendedor criado. Login: ${(created && created.email) || email} / senha provisória informada.`);
        } catch (error) {
          showError(mapCreateSellerError(error));
        } finally {
          if (submitButton) {
            submitButton.disabled = false;
            submitButton.textContent = originalLabel;
          }
        }
        return;
      }
    });

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-action]');
      if (!button || !container.contains(button)) return;
      const { action, id } = button.dataset;

      if (action === 'open-cockpit') {
        if (window.C360.app && typeof window.C360.app.openSellerCockpit === 'function') {
          window.C360.app.openSellerCockpit(id);
        }
        return;
      }

      if (action !== 'deactivate-seller' && action !== 'activate-seller') return;

      const nextActive = action === 'activate-seller';
      if (action === 'deactivate-seller'
        && !confirm('Desativar este vendedor? Os dados dele são mantidos, só o acesso é bloqueado.')) {
        return;
      }

      clearError();
      button.disabled = true;
      try {
        if (state() && typeof state().update === 'function') {
          await state().update('profiles', id, { active: nextActive });
        } else if (api() && typeof api().update === 'function') {
          await api().update('profiles', id, { active: nextActive });
        } else {
          throw new Error('Não foi possível atualizar o status do vendedor: nenhuma API disponível.');
        }
        await loadSellers();
      } catch (error) {
        showError((error && error.message) || 'Não foi possível atualizar o status do vendedor.');
        button.disabled = false;
      }
    });

    paint();
    loadSellers();

    return { refresh: loadSellers };
  }

  window.C360.auth = {
    signIn,
    signOut,
    restoreSession,
    getCurrentUser,
    isAdmin,
    render,
    mount,
    renderSellers,
    mountSellers,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Preços por produto (padrão + piso) e preços específicos por vendedor.
  //
  // Camada de dados esperada em window.C360.api (implementada por outro
  // agente, em paralelo). Este módulo checa a existência de cada método
  // antes de chamar e cai em um placeholder inofensivo ("modo demonstração")
  // quando ela ainda não existe — mesmo padrão defensivo usado em
  // src/goals.js:
  //
  //   C360.api.list(table, query)                       -> Promise<Array<object>>
  //   C360.api.update(table, id, patch)                  -> Promise<object>
  //   C360.api.listSellerPrices(sellerId)                -> Promise<Array<{id, sellerId, productId, price, floor}>>
  //   C360.api.setSellerPrice({sellerId, productId, price, floor}) -> Promise<object> (upsert)
  //
  //   C360.state.getState()       -> objeto síncrono com cache; para ADMIN
  //                                   inclui `products` completo (com
  //                                   defaultPrice/priceFloor).
  //   C360.state.getCurrentUser() -> {id, role, name, businessId} | null
  //
  // Ver docs/backend.md §5 (products/seller_prices) e §7 (regra do piso de
  // preço) para o contrato completo destes campos.
  // ==========================================================================

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.api / C360.state
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function hasApi(method) {
    return !!(api() && typeof api()[method] === 'function');
  }

  async function safeCall(method, ...args) {
    if (!hasApi(method)) return null;
    try {
      return await api()[method](...args);
    } catch (error) {
      console.error(`C360.pricing: erro ao chamar C360.api.${method}`, error);
      return null;
    }
  }

  function currentUser() {
    try {
      if (window.C360.state && typeof window.C360.state.getCurrentUser === 'function') {
        return window.C360.state.getCurrentUser() || null;
      }
    } catch (error) {
      console.error('C360.pricing: erro ao ler usuário atual', error);
    }
    return null;
  }

  function readProductsFromState() {
    try {
      if (window.C360.state && typeof window.C360.state.getState === 'function') {
        const st = window.C360.state.getState();
        return Array.isArray(st?.products) ? st.products : [];
      }
    } catch (error) {
      console.error('C360.pricing: erro ao ler produtos do estado', error);
    }
    return [];
  }

  // ---------------------------------------------------------------------
  // Botão de ação escopado ao módulo (não usa o delegador global de
  // cliques da aplicação — os listeners abaixo ficam presos ao container).
  // ---------------------------------------------------------------------
  function pricingActionButton(action, id, label, extraClass = 'secondary') {
    return `<button type="button" class="small ${extraClass}" data-pricing-action="${U.escapeHtml(action)}" data-id="${U.escapeHtml(id)}">${U.escapeHtml(label)}</button>`;
  }

  // ---------------------------------------------------------------------
  // Render — admin
  // ---------------------------------------------------------------------
  function productDefaultsForm(products, editingProduct) {
    const defaults = editingProduct || {};
    return `
      <form id="pricingProductForm" class="grid-form">
        <label>Produto
          <select name="productId" required ${editingProduct ? 'disabled' : ''}>
            ${UI.optionList(products, defaults.id || '', products.length ? 'Selecione' : 'Nenhum produto cadastrado')}
          </select>
        </label>
        <label>Preço padrão sugerido (R$)
          <input name="defaultPrice" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.defaultPrice ?? '')}">
        </label>
        <label>Piso mínimo de venda (R$)
          <input name="priceFloor" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.priceFloor ?? '')}">
          <span>Deixe vazio para este produto não ter piso mínimo.</span>
        </label>
        <button type="submit">${editingProduct ? 'Salvar preço padrão' : 'Definir preço padrão'}</button>
        ${editingProduct ? '<button type="button" class="ghost" data-pricing-action="cancel-edit-product">Cancelar edição</button>' : ''}
      </form>
    `;
  }

  function sellerOverrideForm(sellers, products) {
    return `
      <form id="pricingSellerForm" class="grid-form">
        <label>Vendedor
          <select name="sellerId" required>
            ${UI.optionList(sellers, '', sellers.length ? 'Selecione' : 'Nenhum vendedor disponível')}
          </select>
        </label>
        <label>Produto
          <select name="productId" required>
            ${UI.optionList(products, '', products.length ? 'Selecione' : 'Nenhum produto cadastrado')}
          </select>
        </label>
        <label>Preço deste vendedor (R$)
          <input name="price" type="number" step="0.01" min="0" placeholder="Vazio = usa o preço padrão do produto">
        </label>
        <label>Piso deste vendedor (R$)
          <input name="floor" type="number" step="0.01" min="0" placeholder="Vazio = usa o piso padrão do produto">
        </label>
        <button type="submit">Salvar preço do vendedor</button>
      </form>
    `;
  }

  function productsTable(products) {
    const rows = products.map((product) => [
      U.escapeHtml(product.name),
      U.escapeHtml(product.unit || '—'),
      UI.moneyCell(product.defaultPrice),
      product.priceFloor === null || product.priceFloor === undefined ? '—' : UI.moneyCell(product.priceFloor),
      pricingActionButton('edit-product', product.id, 'Editar'),
    ]);
    return UI.table(['Produto', 'Un.', 'Preço padrão', 'Piso mínimo', 'Ações'], rows, 'Nenhum produto cadastrado ainda.');
  }

  function overridesTable(sellerPrices, sellersById, productsById) {
    const rows = sellerPrices.map((row) => [
      U.escapeHtml(sellersById.get(String(row.sellerId))?.name || 'Vendedor removido'),
      U.escapeHtml(productsById.get(String(row.productId))?.name || 'Produto removido'),
      row.price === null || row.price === undefined ? '—' : UI.moneyCell(row.price),
      row.floor === null || row.floor === undefined ? '—' : UI.moneyCell(row.floor),
    ]);
    return UI.table(['Vendedor', 'Produto', 'Preço', 'Piso'], rows, 'Nenhum preço específico de vendedor cadastrado ainda.');
  }

  function renderAdmin(data = {}) {
    const products = data.products || [];
    const sellers = data.sellers || [];
    const sellerPrices = data.sellerPrices || [];
    const editingProduct = data.editingProductId
      ? products.find((product) => String(product.id) === String(data.editingProductId)) || null
      : null;
    const apiAvailable = data.apiAvailable !== false;
    const loading = !!data.loading;

    const sellersById = new Map(sellers.map((seller) => [String(seller.id), seller]));
    const productsById = new Map(products.map((product) => [String(product.id), product]));

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (update, listSellerPrices, setSellerPrice) e C360.state.getState para gerenciar preços reais.', 'warning');
    const loadingNotice = loading ? UI.formNotice('Carregando preços...', 'info') : '';

    return UI.section(
      'Preços e piso mínimo',
      'Defina o preço padrão e o piso mínimo de venda de cada produto, e ajuste preços específicos por vendedor quando necessário.',
      `
        ${notice}${loadingNotice}
        <div class="two-columns">
          <div class="panel-card">
            <h3>Preço padrão do produto</h3>
            ${productDefaultsForm(products, editingProduct)}
          </div>
          <div class="panel-card">
            <h3>Preço específico por vendedor</h3>
            ${sellerOverrideForm(sellers, products)}
          </div>
        </div>
        <h3>Produtos</h3>
        ${productsTable(products)}
        <h3>Preços por vendedor cadastrados</h3>
        ${overridesTable(sellerPrices, sellersById, productsById)}
      `
    );
  }

  // ---------------------------------------------------------------------
  // Mount — admin (listeners escopados ao container, sem depender do
  // delegador global de cliques da aplicação)
  // ---------------------------------------------------------------------
  function mountAdmin(container, options = {}) {
    if (!container) return null;

    let products = options.products || readProductsFromState();
    let sellers = options.sellers || [];
    let sellerPrices = [];
    let editingProductId = null;
    let loading = true;

    function paint() {
      container.innerHTML = renderAdmin({
        products,
        sellers,
        sellerPrices,
        editingProductId,
        loading,
        apiAvailable: hasApi('update') || hasApi('setSellerPrice') || hasApi('listSellerPrices') || hasApi('list'),
      });
    }

    // Estratégia de busca:
    // - produtos: lidos de C360.state.getState().products (o contrato diz
    //   que a visão do admin já inclui defaultPrice/priceFloor), sem round-trip
    //   de rede extra;
    // - vendedores: C360.api.list('profiles', { role: 'vendedor', businessId })
    //   — método genérico documentado no contrato (não há um listSellers
    //   dedicado nesta entrega);
    // - preços por vendedor: C360.api.listSellerPrices(sellerId) chamado uma
    //   vez por vendedor encontrado e agregado em uma lista só, com sellerId
    //   preenchido defensivamente caso a linha não venha com o campo.
    async function fetchSellers() {
      if (!hasApi('list')) return [];
      const user = currentUser();
      try {
        const rows = await api().list('profiles', { role: 'vendedor', businessId: user?.businessId });
        return Array.isArray(rows) ? rows : [];
      } catch (error) {
        console.error('C360.pricing: erro ao listar vendedores', error);
        return [];
      }
    }

    async function fetchSellerPrices(sellerList) {
      if (!hasApi('listSellerPrices') || !sellerList.length) return [];
      try {
        const perSeller = await Promise.all(sellerList.map((seller) => safeCall('listSellerPrices', seller.id)));
        return perSeller.flatMap((rows, index) => {
          if (!Array.isArray(rows)) return [];
          return rows.map((row) => ({ ...row, sellerId: row.sellerId ?? sellerList[index].id }));
        });
      } catch (error) {
        console.error('C360.pricing: erro ao listar preços por vendedor', error);
        return [];
      }
    }

    async function loadAll() {
      loading = true;
      paint();
      products = readProductsFromState();
      sellers = await fetchSellers();
      sellerPrices = await fetchSellerPrices(sellers);
      loading = false;
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const productForm = event.target.closest('#pricingProductForm');
      const sellerForm = event.target.closest('#pricingSellerForm');

      if (productForm) {
        event.preventDefault();
        try {
          const data = U.formData(productForm);
          const productId = editingProductId || data.productId;
          if (!productId) throw new Error('Selecione um produto.');
          const patch = {
            default_price: data.defaultPrice === '' ? 0 : U.number(data.defaultPrice),
            price_floor: data.priceFloor === '' ? null : U.number(data.priceFloor),
          };
          if (hasApi('update')) {
            await api().update('products', productId, patch);
          } else {
            alert('Modo demonstração: conecte C360.api.update para salvar preços reais.');
          }
          editingProductId = null;
          await loadAll();
        } catch (error) {
          alert(error.message);
        }
        return;
      }

      if (sellerForm) {
        event.preventDefault();
        try {
          const data = U.formData(sellerForm);
          if (!data.sellerId) throw new Error('Selecione um vendedor.');
          if (!data.productId) throw new Error('Selecione um produto.');
          const payload = {
            sellerId: data.sellerId,
            productId: data.productId,
            price: data.price === '' ? null : U.number(data.price),
            floor: data.floor === '' ? null : U.number(data.floor),
          };
          if (hasApi('setSellerPrice')) {
            await api().setSellerPrice(payload);
          } else {
            alert('Modo demonstração: conecte C360.api.setSellerPrice para salvar preços reais.');
          }
          await loadAll();
        } catch (error) {
          alert(error.message);
        }
      }
    });

    container.addEventListener('click', (event) => {
      const button = event.target.closest('[data-pricing-action]');
      if (!button) return;
      const { pricingAction, id } = button.dataset;
      if (pricingAction === 'edit-product') {
        editingProductId = id;
        paint();
      } else if (pricingAction === 'cancel-edit-product') {
        editingProductId = null;
        paint();
      }
    });

    paint();
    loadAll();

    return { refresh: loadAll };
  }

  // ---------------------------------------------------------------------
  // Vendedor — hint de preço sugerido/mínimo e validação reutilizável
  //
  // Ponto de integração para a tela de VENDAS/DEVOLUÇÕES (dono: outro
  // agente): antes de enviar o formulário de venda, chamar
  //
  //   const result = C360.pricing.validateSalePriceInput(inputValue, { product, sellerPrice });
  //   if (!result.ok) { mostrar result.message e bloquear o envio; }
  //   // caso contrário, usar result.parsedPrice como unitPrice numérico.
  //
  // `product` é o item vindo de seller_products/products (precisa apenas de
  // salePrice/defaultPrice/priceFloor). `sellerPrice` é a linha de
  // seller_prices do vendedor logado para este produto, ou null/undefined
  // se ele não tiver override. Quem monta o formulário de venda decide como
  // obter esses dois objetos (ex.: via C360.api.listSellerPrices(currentUser.id)
  // filtrado pelo productId) — esta função não faz a busca sozinha para não
  // acoplar ao layout do formulário de vendas.
  // ---------------------------------------------------------------------
  function renderSellerFloorHint(product, sellerPrice) {
    const Calc = window.C360.calc;
    if (!Calc || typeof Calc.resolveSellerPrice !== 'function') return '';
    const resolved = Calc.resolveSellerPrice({ product, sellerPrice });
    const suggestedText = `Preço sugerido: ${U.money(resolved.price)}`;
    const floorText = resolved.floor === null || resolved.floor === undefined
      ? 'sem piso mínimo definido'
      : `Mínimo: ${U.money(resolved.floor)}`;
    return `<p class="pricing-hint">${suggestedText} · ${floorText}</p>`;
  }

  function validateSalePriceInput(unitPriceString, context = {}) {
    const parsedPrice = U.number(unitPriceString);
    const Calc = window.C360.calc;
    if (!Calc || typeof Calc.resolveSellerPrice !== 'function' || typeof Calc.validatePriceFloor !== 'function') {
      // Camadas de cálculo indisponíveis: não bloqueia o vendedor, o servidor
      // (trigger de piso de preço) continua sendo a garantia final.
      return { ok: true, message: null, parsedPrice };
    }
    const { floor } = Calc.resolveSellerPrice({ product: context.product, sellerPrice: context.sellerPrice });
    const result = Calc.validatePriceFloor({ unitPrice: parsedPrice, floor });
    return { ok: result.ok, message: result.message, parsedPrice };
  }

  window.C360.pricing = {
    renderAdmin,
    mountAdmin,
    renderSellerFloorHint,
    validateSalePriceInput,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Devoluções e desperdícios — lançáveis para QUALQUER venda, independente
  // de `origin` (manual | pedido | consignado | ...). Módulo autocontido.
  //
  // Contrato remoto esperado (implementado por outro agente em paralelo em
  // window.C360.api / window.C360.state — ver docs/backend.md §5 e §7):
  //
  //   C360.api.list(table, query)      -> Promise<Array<object>>
  //   C360.api.insert(table, payload)  -> Promise<object>
  //   C360.api.update(table, id, patch)-> Promise<object>
  //
  //   C360.state.getState()            -> object
  //   C360.state.getCurrentUser()      -> { id, role, name, businessId } | null
  //   C360.state.isAdmin()             -> boolean
  //   C360.state.add(collectionName, payload)    -> Promise<object>
  //   C360.state.recordMovement(payload)         -> Promise<object>
  //
  // Como em src/goals.js, cada chamada a C360.state é feita de forma
  // defensiva: se o método ainda não existir (módulo de dados não montado
  // nesta tela/teste), a função retorna { ok: false, error } em vez de
  // quebrar a UI.
  //
  // sale (camelCase) esperado por este módulo:
  //   { id, productId, clientId, quantity, unitPrice, unitCost, sellerId,
  //     businessId, origin, date }
  // ==========================================================================

  const FALLBACK_ERROR_DEVOLUCAO = 'Não foi possível registrar a devolução. Tente novamente.';
  const FALLBACK_ERROR_DESPERDICIO = 'Não foi possível registrar o desperdício. Tente novamente.';

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.state (mesmo padrão de src/goals.js)
  // ---------------------------------------------------------------------
  function stateApi() {
    return window.C360.state || null;
  }

  function hasState(method) {
    return !!(stateApi() && typeof stateApi()[method] === 'function');
  }

  function calc() {
    return window.C360.calc || null;
  }

  // ---------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------
  function panelDomId(sale, suffix) {
    return `returns-${U.escapeHtml(sale.id)}-${suffix}`;
  }

  function render(sale) {
    if (!sale || !sale.id) {
      return UI.formNotice('Venda não encontrada para lançar devolução/desperdício.', 'warning');
    }

    const maxQty = U.number(sale.quantity) > 0 ? U.number(sale.quantity) : '';
    const devQtyId = panelDomId(sale, 'dev-qtd');
    const devNotesId = panelDomId(sale, 'dev-notes');
    const despQtyId = panelDomId(sale, 'desp-qtd');
    const despNotesId = panelDomId(sale, 'desp-notes');

    return `
      <div class="returns-panel" data-returns-panel data-sale-id="${U.escapeHtml(sale.id)}">
        <div class="returns-panel-head">
          <h3>Devolução / Desperdício</h3>
          <button type="button" class="small ghost" data-role="close-returns">Fechar</button>
        </div>
        <div class="returns-panel-grid">
          <form class="stack-form returns-form" data-role="devolucao-form" novalidate>
            <h4>Registrar devolução</h4>
            <p class="returns-hint">O cliente devolveu parte ou toda a quantidade: o dinheiro e o estoque voltam.</p>
            <label>
              <span class="field-label">Quantidade devolvida</span>
              <input id="${devQtyId}" name="quantity" type="number" step="any" min="0" ${maxQty !== '' ? `max="${U.escapeHtml(maxQty)}"` : ''} required>
            </label>
            <label>
              <span class="field-label">Motivo (opcional)</span>
              <textarea id="${devNotesId}" name="notes" rows="2" maxlength="500" placeholder="Ex.: cliente desistiu de parte do pedido"></textarea>
            </label>
            <button type="submit">Registrar devolução</button>
            <div class="notice" data-role="feedback" hidden></div>
          </form>

          <form class="stack-form returns-form" data-role="desperdicio-form" novalidate>
            <h4>Registrar desperdício</h4>
            <p class="returns-hint">Produto perdido/estragado/quebrado: só o estoque sai, sem envolver dinheiro.</p>
            <label>
              <span class="field-label">Quantidade perdida</span>
              <input id="${despQtyId}" name="quantity" type="number" step="any" min="0" required>
            </label>
            <label>
              <span class="field-label">Motivo (opcional)</span>
              <textarea id="${despNotesId}" name="notes" rows="2" maxlength="500" placeholder="Ex.: caiu no chão, validade vencida"></textarea>
            </label>
            <button type="submit" class="secondary">Registrar desperdício</button>
            <div class="notice" data-role="feedback" hidden></div>
          </form>
        </div>
      </div>
    `;
  }

  // ---------------------------------------------------------------------
  // Feedback inline (dentro do próprio mini-form, sem alert())
  // ---------------------------------------------------------------------
  function showFeedback(form, message, type) {
    const box = form.querySelector('[data-role="feedback"]');
    if (!box) return;
    box.hidden = false;
    box.className = `notice ${type}`;
    box.innerHTML = U.escapeHtml(message);
  }

  function setFormBusy(form, busy) {
    const button = form.querySelector('button[type="submit"]');
    if (button) button.disabled = busy;
    form.querySelectorAll('input, textarea').forEach((field) => {
      field.disabled = busy;
    });
  }

  // ---------------------------------------------------------------------
  // Mount — wiring escopado ao container (mesmo padrão de src/goals.js:
  // listeners presos ao container recebido, não ao documento inteiro)
  // ---------------------------------------------------------------------
  function mount(container, sale, options = {}) {
    if (!container || !sale || !sale.id) return null;
    const onDone = typeof options.onDone === 'function' ? options.onDone : null;
    const onClose = typeof options.onClose === 'function' ? options.onClose : null;

    const isFreshOpen = container.getAttribute('data-returns-sale-id') !== String(sale.id) || !container.querySelector('[data-returns-panel]');
    if (isFreshOpen) {
      container.innerHTML = render(sale);
      container.setAttribute('data-returns-sale-id', String(sale.id));
      // O botão que abre este painel (na linha da venda) pode estar longe -
      // topo de uma tabela longa - e o painel sempre renderiza no fim da
      // seção Vendas. Sem isto, o painel "aparece em outro lugar da tela"
      // sem o usuário perceber onde foi parar.
      container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    if (container.dataset.c360ReturnsWired === '1') return { container, sale };
    container.dataset.c360ReturnsWired = '1';

    container.addEventListener('click', (event) => {
      if (event.target.closest('[data-role="close-returns"]') && onClose) onClose();
    });

    container.addEventListener('submit', async (event) => {
      const devForm = event.target.closest('[data-role="devolucao-form"]');
      const despForm = event.target.closest('[data-role="desperdicio-form"]');
      if (!devForm && !despForm) return;
      event.preventDefault();

      const form = devForm || despForm;
      const data = U.formData(form);
      const quantity = U.number(data.quantity);
      const notes = (data.notes || '').trim();

      setFormBusy(form, true);
      try {
        const result = devForm
          ? await recordDevolucao({ sale, quantity, notes })
          : await recordDesperdicio({ sale, quantity, notes });

        if (result.ok) {
          const label = devForm ? 'Devolução registrada com sucesso.' : 'Desperdício registrado com sucesso.';
          showFeedback(form, notes ? `${label} (${notes})` : label, 'success');
          form.reset();
          if (onDone) onDone();
        } else {
          showFeedback(form, result.error, 'error');
        }
      } finally {
        setFormBusy(form, false);
      }
    });

    return { container, sale };
  }

  // ---------------------------------------------------------------------
  // recordDevolucao
  // ---------------------------------------------------------------------
  async function recordDevolucao({ sale, quantity, notes } = {}) {
    try {
      const qty = U.number(quantity);
      const maxQty = U.number(sale?.quantity);

      if (!sale || !sale.id) return { ok: false, error: 'Venda inválida.' };
      if (qty <= 0) return { ok: false, error: 'Informe uma quantidade maior que zero.' };
      if (maxQty > 0 && qty > maxQty) {
        return { ok: false, error: `Quantidade não pode ser maior que a vendida (${maxQty}).` };
      }
      if (!hasState('add')) return { ok: false, error: FALLBACK_ERROR_DEVOLUCAO };

      let money = { grossRevenue: -qty * U.number(sale.unitPrice), netRevenue: -qty * U.number(sale.unitPrice), cogs: -qty * U.number(sale.unitCost), grossProfit: 0, percentFees: 0, margin: 0 };
      if (calc() && typeof calc().saleMath === 'function') {
        money = calc().saleMath({
          quantity: -qty,
          unitPrice: sale.unitPrice,
          discount: 0,
          fixedFees: 0,
          feePercent: 0,
          unitCost: sale.unitCost,
        });
      }

      const salePayload = {
        businessId: sale.businessId,
        productId: sale.productId,
        clientId: sale.clientId,
        sellerId: sale.sellerId,
        quantity: -qty,
        unitPrice: sale.unitPrice,
        unitCost: sale.unitCost,
        discount: 0,
        fixedFees: 0,
        feePercent: 0,
        percentFees: money.percentFees,
        grossRevenue: money.grossRevenue,
        netRevenue: money.netRevenue,
        cogs: money.cogs,
        grossProfit: money.grossProfit,
        margin: money.margin,
        parentSaleId: sale.id,
        origin: 'devolucao',
        date: U.today(),
        notes: notes || '',
      };

      const saleRecord = await stateApi().add('sales', salePayload);

      let movement = null;
      if (hasState('recordMovement')) {
        movement = await stateApi().recordMovement({
          type: 'entrada_devolucao_venda',
          productId: sale.productId,
          quantity: qty,
          unitCost: sale.unitCost,
          refType: 'sale',
          refId: sale.id,
          notes: notes || '',
          date: U.today(),
        });
      }

      return { ok: true, saleRecord, movement };
    } catch (error) {
      console.error('C360.returns: erro em recordDevolucao', error);
      return { ok: false, error: error?.message || FALLBACK_ERROR_DEVOLUCAO };
    }
  }

  // ---------------------------------------------------------------------
  // recordDesperdicio
  // ---------------------------------------------------------------------
  async function recordDesperdicio({ sale, quantity, notes } = {}) {
    try {
      const qty = U.number(quantity);
      if (!sale || !sale.id) return { ok: false, error: 'Venda inválida.' };
      if (qty <= 0) return { ok: false, error: 'Informe uma quantidade maior que zero.' };
      if (!hasState('recordMovement')) return { ok: false, error: FALLBACK_ERROR_DESPERDICIO };

      const movement = await stateApi().recordMovement({
        type: 'saida_desperdicio',
        productId: sale.productId,
        quantity: -qty,
        unitCost: sale.unitCost,
        refType: 'sale',
        refId: sale.id,
        notes: notes || '',
        date: U.today(),
      });

      return { ok: true, movement };
    } catch (error) {
      console.error('C360.returns: erro em recordDesperdicio', error);
      return { ok: false, error: error?.message || FALLBACK_ERROR_DESPERDICIO };
    }
  }

  window.C360.returns = {
    render,
    mount,
    recordDevolucao,
    recordDesperdicio,
  };
})();
</script>

(function () {

  const U = window.C360.utils;

  const Calc = window.C360.calc;

  // API remota esperada (implementada por outro agente em window.C360.api,

  // src/goals.js:
  //
  //   C360.api.list(table, query)                        -> Promise<Array<object>>
  //   C360.api.insert(table, payload)                     -> Promise<object>
  //   C360.api.update(table, id, patch)                   -> Promise<object>
  //   C360.api.listSellerStock(sellerId)                  -> Promise<Array<{id, sellerId, productId, quantity}>>
  //   C360.api.setSellerStock({sellerId, productId, quantity}) -> Promise<object>
  //   C360.api.approveOrder(id)                           -> Promise<object>
  //   C360.api.rejectOrder(id)                            -> Promise<object>
  //
  //   C360.state.getState()        -> object (products, clients, orders, profiles...)
  //   C360.state.getCurrentUser()  -> { id, role, name, businessId } | null
  //   C360.state.isAdmin()         -> boolean
  //   C360.state.add(collectionName, payload)   -> Promise<object>
  //   C360.state.update(collectionName, id, patch) -> Promise<object>
  //
  // IMPORTANTE — interpretação de produto (flagged para o dono do negócio
  // confirmar): "vendedor vende do estoque próprio -> vira consignado devido
  // ao admin" foi modelado aqui como uma consignação já 100% vendida na hora
  // da venda: quantitySent = quantitySold = quantidade vendida,
  // quantityReturned = 0, amountPaid = 0. O saldo em aberto dessa consignação
  // (quantitySold * unitPrice - amountPaid, ver Calc.consignmentOpenAmount em
  // src/calculations.js) passa a representar exatamente o valor que o
  // vendedor deve repassar ao administrador por essa venda. Confirmar se essa
  // leitura ("saldo em aberto = dívida do vendedor com o admin") é a
  // semântica desejada, ou se o produto quer um conceito de "consignado
  // reverso" separado.
  // ==========================================================================

  // ---------------------------------------------------------------------
  // Acesso defensivo a C360.api / C360.state
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function hasApi(method) {
    return !!(api() && typeof api()[method] === 'function');
  }

  async function safeCall(method, ...args) {
    if (!hasApi(method)) return null;
    return api()[method](...args);
  }

  function stateApi() {
    return window.C360.state || null;
  }

  function currentUser() {
    try {
      const s = stateApi();
      return s && typeof s.getCurrentUser === 'function' ? s.getCurrentUser() || null : null;
    } catch (error) {
      console.error('C360.sellerStock: erro ao ler usuário atual', error);
      return null;
    }
  }

  function isAdmin() {
    try {
      const s = stateApi();
      return !!(s && typeof s.isAdmin === 'function' && s.isAdmin());
    } catch (error) {
      console.error('C360.sellerStock: erro ao checar admin', error);
      return false;
    }
  }

  function fullState() {
    try {
      const s = stateApi();
      return (s && typeof s.getState === 'function' && s.getState()) || {};
    } catch (error) {
      console.error('C360.sellerStock: erro ao ler estado', error);
      return {};
    }
  }

  function productsList() {
    const st = fullState();
    return Array.isArray(st.products) ? st.products : [];
  }

  function productById(id) {
    return productsList().find((product) => String(product.id) === String(id)) || null;
  }

  async function addRecord(collectionName, payload) {
    const s = stateApi();
    if (s && typeof s.add === 'function') return s.add(collectionName, payload);
    if (hasApi('insert')) return safeCall('insert', collectionName, payload);
    throw new Error('Não foi possível salvar: camada de dados indisponível.');
  }

  async function loadSellers() {
    const st = fullState();
    if (Array.isArray(st.profiles) && st.profiles.length) {
      return st.profiles
        .filter((profile) => profile.role === 'vendedor' && profile.active !== false)
        .map((profile) => ({ id: profile.id, name: profile.name }));
    }
    if (hasApi('list')) {
      try {
        const rows = await safeCall('list', 'profiles', { role: 'vendedor' });
        if (Array.isArray(rows)) {
          return rows.filter((profile) => profile.active !== false).map((profile) => ({ id: profile.id, name: profile.name }));
        }
      } catch (error) {
        console.error('C360.sellerStock: erro ao listar vendedores', error);
      }
    }
    return [];
  }

  // ---------------------------------------------------------------------
  // Estilos (injetados uma única vez; o módulo não edita styles/main.css).
  // Segue o mesmo padrão de src/goals.js: variáveis --accent-gold* com
  // fallback inline, para funcionar mesmo se o tema ainda não as define.
  // ---------------------------------------------------------------------
  const STYLE_ID = 'c360-sellerstock-inline-styles';

  function ensureStyles() {
    if (document.getElementById(STYLE_ID)) return;
    const style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = `
      .ss-stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.85rem; }
      .ss-stock-card {
        background: var(--surface, #fff);
        border: 1px solid var(--line, #d8e1df);
        border-radius: var(--radius, 14px);
        padding: 1rem;
        display: flex;
        flex-direction: column;

      }
      .ss-stock-card-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
      .ss-inline-form { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px dashed var(--line, #d8e1df); }
      .ss-inline-form label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.85rem; }
      .ss-hint { font-size: 0.82rem; color: var(--muted, #5d6f6d); margin-top: 0.5rem; }
      .ss-approvals-head { display: flex; justify-content: flex-end; margin-bottom: 0.6rem; }
      .ss-approvals-list { display: flex; flex-direction: column; gap: 0.8rem; }
      .ss-approval-card {

        border-radius: var(--radius, 14px);
        padding: 1rem;
        display: flex;

      }

      .ss-approval-detail { font-size: 0.88rem; color: var(--muted, #5d6f6d); margin: 0; }
      .ss-badge-urgent {

        color: var(--accent-gold-deep, #8a6f14);

        animation: c360SsPulse 1.8s ease-in-out infinite;
      }
      @keyframes c360SsPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(201, 162, 39, 0.35); }
        50% { box-shadow: 0 0 0 6px rgba(201, 162, 39, 0); }
      }

        .ss-badge-urgent { animation: none; }
      }
