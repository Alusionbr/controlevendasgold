    if (!hasApi(method)) return null;
    try {
      return await api()[method](...args);
    } catch (error) {
      console.error(`C360.goals: erro ao chamar C360.api.${method}`, error);
      return null;
    }
  }

  function currentUser() {
    try {
      if (window.C360.state && typeof window.C360.state.getCurrentUser === 'function') {
        return window.C360.state.getCurrentUser() || null;
      }
    } catch (error) {
      console.error('C360.goals: erro ao ler usuário atual', error);
    }
    return null;
  }

  // ---------------------------------------------------------------------
  // Render — admin
  // ---------------------------------------------------------------------
  function adminForm(sellers, editingGoal) {
    const defaults = editingGoal || {};
    const periodType = defaults.period_type || 'semana';
    const start = defaults.period_start || U.today();
    const end = defaults.period_end || suggestPeriodEnd(periodType, start);

    return `
      <form id="goalsAdminForm" class="grid-form">
        <label>Vendedor
          <select name="sellerId" required ${editingGoal ? 'disabled' : ''}>
            ${UI.optionList(sellers, defaults.seller_id || '', sellers.length ? 'Selecione' : 'Nenhum vendedor disponível')}
          </select>
        </label>
        <label>Tipo de período
          <select name="periodType" required>
            ${UI.optionList(PERIOD_TYPES, periodType, '')}
          </select>
        </label>
        <label>Início do período
          <input name="periodStart" type="date" required value="${U.escapeHtml(start)}">
        </label>
        <label>Fim do período
          <input name="periodEnd" type="date" required value="${U.escapeHtml(end)}">
        </label>
        <label>Meta de vendas (R$)
          <input name="targetAmount" type="number" step="0.01" min="0.01" required value="${U.escapeHtml(defaults.target_amount ?? '')}">
        </label>
        <label>Premiação (descrição)
          <input name="rewardDescription" placeholder="Ex.: R$50 de bônus, dia de folga..." value="${U.escapeHtml(defaults.reward_description || '')}">
        </label>
        <label>Valor da premiação (R$, opcional)
          <input name="rewardValue" type="number" step="0.01" min="0" value="${U.escapeHtml(defaults.reward_value ?? '')}">
        </label>
        <button type="submit">${editingGoal ? 'Salvar alterações' : 'Criar meta'}</button>
        ${editingGoal ? '<button type="button" class="ghost" data-goal-action="cancel-edit">Cancelar edição</button>' : ''}
      </form>
    `;
  }

  function adminGoalCard(goal, progressRow) {
    const pct = progressRow ? U.number(progressRow.progress_pct) : 0;
    const achievedAmount = progressRow ? U.number(progressRow.achieved_amount) : 0;
    const isAchieved = !!(progressRow ? progressRow.is_achieved : goal.achieved);
    const clampedPct = Math.max(0, Math.min(100, pct));
    const periodLabel = goal.period_type === 'mes' ? 'Mensal' : 'Semanal';

    return `
      <article class="goal-card ${isAchieved ? 'goal-card--achieved' : ''}">
        <div class="goal-card-head">
          <span class="badge">${U.escapeHtml(periodLabel)}</span>
          ${isAchieved ? '<span class="badge goal-badge-gold">🏆 Meta batida</span>' : ''}
        </div>
        <p class="goal-period">${U.escapeHtml(goal.period_start)} — ${U.escapeHtml(goal.period_end)}</p>
        <div class="goal-progress">
          <div class="goal-progress-bar"><div class="goal-progress-fill ${isAchieved ? 'goal-progress-fill--gold' : ''}" style="width:${clampedPct}%"></div></div>
          <span class="goal-progress-label">${U.money(achievedAmount)} de ${U.money(goal.target_amount)} (${clampedPct.toFixed(0)}%)</span>
        </div>
        ${goal.reward_description ? `<p class="goal-reward">Prêmio: <strong>${U.escapeHtml(goal.reward_description)}</strong>${goal.reward_value ? ` (${U.money(goal.reward_value)})` : ''}</p>` : ''}
        <div class="actions">
          <button type="button" class="small secondary" data-goal-action="edit" data-goal-id="${U.escapeHtml(goal.id)}">Editar</button>
          <button type="button" class="small danger" data-goal-action="delete" data-goal-id="${U.escapeHtml(goal.id)}">Excluir</button>
        </div>
      </article>
    `;
  }

  function renderAdmin(data = {}) {
    ensureStyles();
    const sellers = data.sellers || [];
    const goals = data.goals || [];
    const progress = data.progress || [];
    const editingGoal = data.editingGoal || null;
    const apiAvailable = data.apiAvailable !== false;
    const loading = !!data.loading;

    const progressByGoal = new Map(progress.map((row) => [row.goal_id, row]));
    const sellersById = new Map(sellers.map((seller) => [String(seller.id), seller]));

    const grouped = new Map();
    goals.forEach((goal) => {
      const key = String(goal.seller_id);
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(goal);
    });

    let listHtml;
    if (loading) {
      listHtml = UI.formNotice('Carregando metas...', 'info');
    } else if (!goals.length) {
      listHtml = '<div class="empty-state"><strong>Nenhuma meta cadastrada ainda.</strong><span>Crie a primeira meta usando o formulário acima.</span></div>';
    } else {
      listHtml = [...grouped.entries()].map(([sellerId, sellerGoals]) => {
        const seller = sellersById.get(sellerId);
        const name = seller ? seller.name : 'Vendedor';
        const cards = sellerGoals.map((goal) => adminGoalCard(goal, progressByGoal.get(goal.id))).join('');
        return `
          <div class="goals-seller-group">
            <h3 class="goals-seller-name">${U.escapeHtml(name)}</h3>
            <div class="goals-grid">${cards}</div>
          </div>
        `;
      }).join('');
    }

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api (listSellers, listSalesGoals, listGoalsProgress, createSalesGoal, updateSalesGoal, deleteSalesGoal) para salvar e carregar metas reais.', 'warning');

    return UI.section(
      'Metas de vendas',
      'Defina metas semanais e mensais por vendedor, com premiação, para incentivar as vendas.',
      `${notice}${adminForm(sellers, editingGoal)}${listHtml}`
    );
  }

  // ---------------------------------------------------------------------
  // Render — vendedor (gamificado)
  // ---------------------------------------------------------------------
  function sellerGoalCard(row) {
    const pct = U.number(row.progress_pct);
    const achievedAmount = U.number(row.achieved_amount);
    const target = U.number(row.target_amount);
    const remaining = Math.max(0, target - achievedAmount);
    const isAchieved = !!row.is_achieved;
    const clampedPct = Math.max(0, Math.min(100, pct));
    const periodLabel = row.period_type === 'mes' ? 'Meta mensal' : 'Meta semanal';

    const statusHtml = isAchieved
      ? `
        <div class="goal-celebrate">
          <span class="goal-trophy" aria-hidden="true">🏆</span>
          <strong>Meta batida! Parabéns!</strong>
          ${row.reward_description ? `<p class="goal-reward-highlight">Seu prêmio: <strong>${U.escapeHtml(row.reward_description)}</strong>${row.reward_value ? ` — ${U.money(row.reward_value)}` : ''}</p>` : ''}
        </div>
      `
      : `<p class="goal-incentive">Faltam <strong>${U.money(remaining)}</strong> para bater a meta!</p>`;

    return `
      <article class="goal-card goal-card-seller ${isAchieved ? 'goal-card--achieved' : ''}">
        <div class="goal-card-head">
          <span class="badge">${U.escapeHtml(periodLabel)}</span>
          <span class="goal-period">${U.escapeHtml(row.period_start)} – ${U.escapeHtml(row.period_end)}</span>
        </div>
        <div class="goal-progress">
          <div class="goal-progress-bar goal-progress-bar--lg">
            <div class="goal-progress-fill ${isAchieved ? 'goal-progress-fill--gold' : ''}" style="width:${clampedPct}%"></div>
          </div>
          <span class="goal-progress-label">${clampedPct.toFixed(0)}% • ${U.money(achievedAmount)} de ${U.money(target)}</span>
        </div>
        ${statusHtml}
      </article>
    `;
  }

  function renderSeller(data = {}) {
    ensureStyles();
    const rows = data.goals || [];
    const sellerName = data.sellerName || '';
    const loading = !!data.loading;
    const apiAvailable = data.apiAvailable !== false;

    const title = sellerName ? `Minhas metas — ${sellerName}` : 'Minhas metas';

    if (loading) {
      return UI.section(title, 'Acompanhe sua meta semanal e mensal.', UI.formNotice('Carregando suas metas...', 'info'));
    }

    const weekly = rows.find((row) => row.period_type === 'semana') || null;
    const monthly = rows.find((row) => row.period_type === 'mes') || null;
    const cards = [weekly, monthly].filter(Boolean);

    const notice = apiAvailable
      ? ''
      : UI.formNotice('Modo demonstração: conecte C360.api.listGoalsProgress para ver suas metas reais.', 'warning');

    const body = cards.length
      ? `<div class="goals-seller-cards">${cards.map(sellerGoalCard).join('')}</div>`
      : '<div class="empty-state"><strong>Nenhuma meta ativa no momento.</strong><span>Assim que o administrador definir uma meta para você, ela aparece aqui.</span></div>';

    return UI.section(
      title,
      'Bata sua meta semanal e mensal e garanta sua premiação!',
      `${notice}${body}`
    );
  }

  // ---------------------------------------------------------------------
  // Mount — admin (listeners escopados ao container, sem depender do
  // delegador global de cliques da aplicação)
  // ---------------------------------------------------------------------
  function mountAdmin(container, options = {}) {
    if (!container) return null;

    let sellers = options.sellers || [];
    let goals = [];
    let progress = [];
    let editingId = null;
    let loading = true;

    function paint() {
      container.innerHTML = renderAdmin({
        sellers,
        goals,
        progress,
        editingGoal: editingId ? goals.find((goal) => goal.id === editingId) || null : null,
        loading,
        apiAvailable: hasApi('listSalesGoals') || hasApi('createSalesGoal'),
      });
    }

    async function loadAll() {
      loading = true;
      paint();
      const [sellersRes, goalsRes, progressRes] = await Promise.all([
        hasApi('listSellers') ? safeCall('listSellers') : Promise.resolve(null),
        safeCall('listSalesGoals'),
        safeCall('listGoalsProgress'),
      ]);
      if (Array.isArray(sellersRes)) sellers = sellersRes;
      goals = Array.isArray(goalsRes) ? goalsRes : [];
      progress = Array.isArray(progressRes) ? progressRes : [];
      loading = false;
      paint();
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('#goalsAdminForm');
      if (!form) return;
      event.preventDefault();
      try {
        const data = U.formData(form);
        const payload = {
          period_type: data.periodType,
          period_start: data.periodStart,
          period_end: data.periodEnd,
          target_amount: U.number(data.targetAmount),
          reward_description: (data.rewardDescription || '').trim(),
          reward_value: data.rewardValue ? U.number(data.rewardValue) : null,
        };
        U.assertPositive(payload.target_amount, 'Meta de vendas');

        if (editingId) {
          if (hasApi('updateSalesGoal')) {
            await api().updateSalesGoal(editingId, payload);
          } else {
            alert('Modo demonstração: conecte C360.api.updateSalesGoal para salvar alterações de verdade.');
          }
          editingId = null;
        } else {
          if (!data.sellerId) throw new Error('Selecione um vendedor.');
          payload.seller_id = data.sellerId;
          if (hasApi('createSalesGoal')) {
            await api().createSalesGoal(payload);
          } else {
            alert('Modo demonstração: conecte C360.api.createSalesGoal para criar metas de verdade.');
          }
        }
        await loadAll();
      } catch (error) {
        alert(error.message);
      }
    });

    container.addEventListener('change', (event) => {
      const trigger = event.target.closest('[name="periodType"], [name="periodStart"]');
      if (!trigger) return;
      const form = event.target.closest('#goalsAdminForm');
      if (!form) return;
      const periodType = form.elements.periodType.value;
      const start = form.elements.periodStart.value;
      if (periodType && start) {
        form.elements.periodEnd.value = suggestPeriodEnd(periodType, start);
      }
    });

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-goal-action]');
      if (!button) return;
      const { goalAction, goalId } = button.dataset;
      try {
        if (goalAction === 'edit') {
          editingId = goalId;
          paint();
        } else if (goalAction === 'cancel-edit') {
          editingId = null;
          paint();
        } else if (goalAction === 'delete') {
          if (!confirm('Excluir esta meta?')) return;
          if (hasApi('deleteSalesGoal')) {
            await api().deleteSalesGoal(goalId);
          } else {
            alert('Modo demonstração: conecte C360.api.deleteSalesGoal para excluir de verdade.');
          }
          if (editingId === goalId) editingId = null;
          await loadAll();
        }
      } catch (error) {
        alert(error.message);
      }
    });

    paint();
    if (hasApi('listSalesGoals') || hasApi('listGoalsProgress') || hasApi('listSellers')) {
      loadAll();
    } else {
      loading = false;
      paint();
    }

    return { refresh: loadAll };
  }

  // ---------------------------------------------------------------------
  // Mount — vendedor
  // ---------------------------------------------------------------------
  function mountSeller(container, options = {}) {
    if (!container) return null;

    const user = currentUser();
    const sellerId = options.sellerId || (user && user.id) || null;
    const sellerName = options.sellerName || (user && user.name) || '';
    let goalsRows = [];
    let loading = true;

    function paint() {
      container.innerHTML = renderSeller({
        goals: goalsRows,
        sellerName,
        loading,
        apiAvailable: hasApi('listGoalsProgress'),
      });
    }

    async function loadAll() {
      loading = true;
      paint();
      const rows = await safeCall('listGoalsProgress', sellerId ? { sellerId } : {});
      goalsRows = Array.isArray(rows) ? rows : [];
      loading = false;
      paint();
    }

    paint();
    if (hasApi('listGoalsProgress')) {
      loadAll();
    } else {
      loading = false;
      paint();
    }

    return { refresh: loadAll };
  }

  window.C360.goals = {
    renderAdmin,
    renderSeller,
    mountAdmin,
    mountSeller,
  };
})();
</script>

          <div class="accordion" id="sellerHelpFaqList" data-faq-list>
            ${renderFaqs()}
          </div>
          <div class="empty-state" data-faq-empty hidden></div>
        </div>
      </section>
    `;
  }

  function filterFaqs(root, rawQuery) {
    const query = String(rawQuery ?? '').trim().toLowerCase();
    const items = root.querySelectorAll('[data-faq-item]');
    let visibleCount = 0;

    items.forEach((item) => {
      const haystack = item.getAttribute('data-keywords') || '';
      const matches = !query || haystack.includes(query);
      item.hidden = !matches;
      if (matches) visibleCount += 1;
    });

    const emptyState = root.querySelector('[data-faq-empty]');
    if (!emptyState) return;

    if (visibleCount === 0 && query) {
      emptyState.hidden = false;
      emptyState.innerHTML = `
        <strong>Nenhuma pergunta encontrada para "${escapeHtml(rawQuery.trim())}"</strong>
        <span>Tente outra palavra, como "preço", "pedido" ou "meta".</span>
      `;
    } else {
      emptyState.hidden = true;
      emptyState.innerHTML = '';
    }
  }

  function toggleFaq(trigger) {
    const item = trigger.closest('[data-faq-item]');
    if (!item) return;
    const panel = item.querySelector('.accordion-panel');
    const expanded = trigger.getAttribute('aria-expanded') === 'true';
    trigger.setAttribute('aria-expanded', String(!expanded));
    if (panel) panel.hidden = expanded;
    item.classList.toggle('open', !expanded);
  }

  function mount(container) {
    if (!container) return;

    let root = container.querySelector('#sellerHelpCenter');
    if (!root) {
      container.innerHTML = render();
      root = container.querySelector('#sellerHelpCenter');
    }
    if (!root) return;

    const searchInput = root.querySelector('[data-help-search]');
    if (searchInput) {
      searchInput.addEventListener('input', (event) => {
        filterFaqs(root, event.target.value);
      });
    }

    root.addEventListener('click', (event) => {
      const trigger = event.target.closest('[data-action="toggle-faq"]');
      if (!trigger || !root.contains(trigger)) return;
      toggleFaq(trigger);
    });
  }

  window.C360.sellerHelp = {
    render,
    mount,
  };
})();

    const table = new Uint32Array(256);
    for (let n = 0; n < 256; n += 1) {
      let c = n;
      for (let k = 0; k < 8; k += 1) {

      }

    let crc = 0xffffffff;
    for (let i = 0; i < bytes.length; i += 1) {

    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function pushU16(arr, value) {
    arr.push(value & 0xff, (value >>> 8) & 0xff);
  }
  function pushU32(arr, value) {
    arr.push(value & 0xff, (value >>> 8) & 0xff, (value >>> 16) & 0xff, (value >>> 24) & 0xff);
  }
  function pushBytes(arr, bytes) {
    for (let i = 0; i < bytes.length; i += 1) arr.push(bytes[i]);
  }

  function xmlEscape(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&apos;');
  }

  function colLetter(index) {
    let n = index;
    let letters = '';
    do {
      letters = String.fromCharCode(65 + (n % 26)) + letters;
      n = Math.floor(n / 26) - 1;
    } while (n >= 0);
    return letters;
  }

  function sanitizeSheetName(name, fallback) {
    let clean = String(name || fallback || 'Planilha').replace(/[:\\/?*\[\]]/g, ' ').trim();
    if (!clean) clean = fallback || 'Planilha';
    if (clean.length > 31) clean = clean.slice(0, 31);
    return clean;
  }

  // ----- Geração do XML de uma planilha -----
  function sheetXml(rows) {
    const body = rows.map((cells, rowIndex) => {
      const r = rowIndex + 1;
      const cellsXml = cells.map((value, colIndex) => {
        const ref = `${colLetter(colIndex)}${r}`;
        if (value === null || value === undefined || value === '') {
          return '';
        }
        if (typeof value === 'number' && Number.isFinite(value)) {
          return `<c r="${ref}"><v>${value}</v></c>`;
        }
        if (typeof value === 'boolean') {
          return `<c r="${ref}" t="b"><v>${value ? 1 : 0}</v></c>`;
        }
        return `<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xmlEscape(value)}</t></is></c>`;
      }).join('');
      return `<row r="${r}">${cellsXml}</row>`;

  // ----- Monta o arquivo .xlsx (Blob) a partir de [{name, rows}] -----
  function buildXlsx(sheets) {
    const usedNames = new Set();
    const prepared = sheets.map((sheet, i) => {
      let name = sanitizeSheetName(sheet.name, `Planilha${i + 1}`);
      let unique = name;
      let suffix = 2;
      while (usedNames.has(unique.toLowerCase())) {
        unique = `${name.slice(0, 28)} ${suffix}`;
        suffix += 1;
      }
      usedNames.add(unique.toLowerCase());
      return { name: unique, rows: sheet.rows || [] };
    });

    const files = [];

    const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">` +
      `<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>` +
      `<Default Extension="xml" ContentType="application/xml"/>` +
      `<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>` +
      prepared.map((_, i) => `<Override PartName="/xl/worksheets/sheet${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('') +
      `</Types>`;
    files.push({ path: '[Content_Types].xml', data: ENC.encode(contentTypes) });

    const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">` +
      `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>` +
      `</Relationships>`;
    files.push({ path: '_rels/.rels', data: ENC.encode(rootRels) });

    const workbook = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">` +
      `<sheets>` +
      prepared.map((sheet, i) => `<sheet name="${xmlEscape(sheet.name)}" sheetId="${i + 1}" r:id="rId${i + 1}"/>`).join('') +
      `</sheets></workbook>`;
    files.push({ path: 'xl/workbook.xml', data: ENC.encode(workbook) });

    const workbookRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
      `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">` +
      prepared.map((_, i) => `<Relationship Id="rId${i + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i + 1}.xml"/>`).join('') +
      `</Relationships>`;
    files.push({ path: 'xl/_rels/workbook.xml.rels', data: ENC.encode(workbookRels) });

    prepared.forEach((sheet, i) => {
      files.push({ path: `xl/worksheets/sheet${i + 1}.xml`, data: ENC.encode(sheetXml(sheet.rows)) });
    });

    return zipStored(files);
  }

  // ----- Empacota arquivos em um ZIP sem compressão -----
  function zipStored(files) {
    const out = [];
    const central = [];
    let offset = 0;

    files.forEach((file) => {
      const nameBytes = ENC.encode(file.path);
      const crc = crc32(file.data);
      const size = file.data.length;

      // Cabeçalho local
      pushU32(out, 0x04034b50);
      pushU16(out, 20); // versão necessária
      pushU16(out, 0); // flags
      pushU16(out, 0); // método: 0 = stored
      pushU16(out, 0); // hora
      pushU16(out, 0x21); // data (1980-01-01)
      pushU32(out, crc);
      pushU32(out, size);
      pushU32(out, size);
      pushU16(out, nameBytes.length);
      pushU16(out, 0); // extra
      pushBytes(out, nameBytes);
      pushBytes(out, file.data);

      pushU32(central, 0x02014b50);
      pushU16(central, 20); // versão criadora
      pushU16(central, 20); // versão necessária
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0x21);
      pushU32(central, crc);
      pushU32(central, size);
      pushU32(central, size);
      pushU16(central, nameBytes.length);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU16(central, 0);
      pushU32(central, 0);
      pushU32(central, offset);
      pushBytes(central, nameBytes);

      offset += 30 + nameBytes.length + size;
    });

    const centralOffset = offset;
    const centralSize = central.length;

    const eocd = [];
    pushU32(eocd, 0x06054b50);
    pushU16(eocd, 0);
    pushU16(eocd, 0);
    pushU16(eocd, files.length);
    pushU16(eocd, files.length);
    pushU32(eocd, centralSize);
    pushU32(eocd, centralOffset);
    pushU16(eocd, 0);

    const total = new Uint8Array(out.length + central.length + eocd.length);
    total.set(out, 0);
    total.set(central, out.length);
    total.set(eocd, out.length + central.length);

      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    });

  // ----- Leitura -----
  async function inflateRaw(bytes) {
    if (typeof DecompressionStream === 'undefined') {
      throw new Error('Este navegador não consegue ler planilhas compactadas. Atualize o navegador ou use o backup JSON.');
    }
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    const buffer = await new Response(stream).arrayBuffer();
    return new Uint8Array(buffer);
  }

  function findEocd(view, length) {
    for (let i = length - 22; i >= 0; i -= 1) {
      if (view.getUint32(i, true) === 0x06054b50) return i;
    }
    return -1;
  }

  async function unzip(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    const view = new DataView(arrayBuffer);
    const eocd = findEocd(view, bytes.length);
    if (eocd === -1) throw new Error('Arquivo não é um .xlsx válido.');

    const count = view.getUint16(eocd + 10, true);
    let pointer = view.getUint32(eocd + 16, true);
    const entries = {};

    for (let n = 0; n < count; n += 1) {
      if (view.getUint32(pointer, true) !== 0x02014b50) break;
      const method = view.getUint16(pointer + 10, true);
      const compSize = view.getUint32(pointer + 20, true);
      const nameLen = view.getUint16(pointer + 28, true);
      const extraLen = view.getUint16(pointer + 30, true);
      const commentLen = view.getUint16(pointer + 32, true);
      const localOffset = view.getUint32(pointer + 42, true);
      const name = DEC.decode(bytes.subarray(pointer + 46, pointer + 46 + nameLen));

      const localNameLen = view.getUint16(localOffset + 26, true);
      const localExtraLen = view.getUint16(localOffset + 28, true);
      const dataStart = localOffset + 30 + localNameLen + localExtraLen;
      const raw = bytes.subarray(dataStart, dataStart + compSize);

      // eslint-disable-next-line no-await-in-loop
      entries[name] = method === 0 ? raw : await inflateRaw(raw);
      pointer += 46 + nameLen + extraLen + commentLen;
    }

    return entries;
  }

    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) {
      throw new Error('Não foi possível ler o conteúdo da planilha.');
    }
    return doc;
  }

  function readSharedStrings(entries) {
    const file = entries['xl/sharedStrings.xml'];
    if (!file) return [];
    const doc = parseXml(DEC.decode(file));
    return [...doc.getElementsByTagName('si')].map((si) => {
      return [...si.getElementsByTagName('t')].map((t) => t.textContent).join('');

  function colRefToIndex(ref) {
    const letters = String(ref || '').replace(/[0-9]/g, '');
    let index = 0;
    for (let i = 0; i < letters.length; i += 1) {
      index = index * 26 + (letters.charCodeAt(i) - 64);
    }
    return Math.max(index - 1, 0);
  }

  function readSheetRows(xml, shared) {
    const doc = parseXml(xml);
    const rows = [];
    [...doc.getElementsByTagName('row')].forEach((rowEl) => {
      const cells = [];
      [...rowEl.getElementsByTagName('c')].forEach((cellEl) => {
        const colIndex = colRefToIndex(cellEl.getAttribute('r'));
        const type = cellEl.getAttribute('t');
        let value = '';
        if (type === 'inlineStr') {
          value = [...cellEl.getElementsByTagName('t')].map((t) => t.textContent).join('');
        } else {
          const vEl = cellEl.getElementsByTagName('v')[0];
          const raw = vEl ? vEl.textContent : '';
          if (type === 's') {
            value = shared[Number(raw)] ?? '';
          } else if (type === 'str') {
            value = raw;
          } else if (type === 'b') {

    });

  }

  async function parseXlsx(arrayBuffer) {
    const entries = await unzip(arrayBuffer);
    const shared = readSharedStrings(entries);

    const relsFile = entries['xl/_rels/workbook.xml.rels'];
    const rels = {};
    if (relsFile) {
      const relsDoc = parseXml(DEC.decode(relsFile));
      [...relsDoc.getElementsByTagName('Relationship')].forEach((rel) => {
        rels[rel.getAttribute('Id')] = rel.getAttribute('Target');
      });
    }

    const workbookFile = entries['xl/workbook.xml'];
    if (!workbookFile) throw new Error('Planilha sem workbook.xml.');
    const workbookDoc = parseXml(DEC.decode(workbookFile));

    const result = [];
    [...workbookDoc.getElementsByTagName('sheet')].forEach((sheetEl, i) => {
      const name = sheetEl.getAttribute('name') || `Planilha${i + 1}`;
      const rid = sheetEl.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'id') ||
        sheetEl.getAttribute('r:id');
      let target = rels[rid];
      if (!target) target = `worksheets/sheet${i + 1}.xml`;
      target = target.replace(/^\//, '').replace(/^xl\//, '');
      const path = `xl/${target}`;
      const file = entries[path];
      const rows = file ? readSheetRows(DEC.decode(file), shared) : [];
      result.push({ name, rows });
    });

    return result;
  }

  window.C360.xlsx = {
    buildXlsx,
    parseXlsx,
  };
})();

  // com a regra de negócio quando o papel existir.
  //
  // Nota sobre injeção de fórmula (ver csvField() abaixo, seção CSV): este
  // motor .xlsx (src/xlsx-lite.js, função sheetXml) escreve toda string como
  // célula tipada `t="inlineStr"` (texto explícito no XML da planilha), nunca
  // como fórmula (`<f>`). Excel/Sheets respeitam esse tipo ao abrir um .xlsx
  // de verdade e não reinterpretam o conteúdo como fórmula — diferente de CSV
  // puro, que não carrega tipo de célula. Por isso o backup Excel não precisa
  // do mesmo prefixo de apóstrofo aplicado no CSV.
  // ---------- Exportar Excel (backup completo) ----------
  function exportXlsx() {
    const state = S.getState();
    const sheets = [];

    const summary = [
      ['Controle360 Multi — backup completo'],
      ['Gerado em', new Date().toLocaleString('pt-BR')],
      [''],
      ['Aba', 'Registros'],
    ];
    COLLECTIONS.forEach((collection) => {
      summary.push([collection.sheet, (state[collection.key] || []).length]);
    });
    summary.push(['']);
    summary.push(['Como reimportar: use "Importar Excel" na aba Dados.']);
    summary.push(['Pode editar as abas de dados. Não apague a aba ' + BACKUP_SHEET + '.']);
    sheets.push({ name: 'Resumo', rows: summary });

    COLLECTIONS.forEach((collection) => {
      const records = state[collection.key] || [];
      const fields = fieldsFor(collection, records);
      const rows = [fields.map(label)];
      records.forEach((record) => {
        rows.push(fields.map((key) => cellValue(key, record[key])));
      });
      sheets.push({ name: collection.sheet, rows });
    });

    const config = {
      marker: BACKUP_MARKER,
      schemaVersion: state.meta?.schemaVersion,
      activeBusinessId: state.activeBusinessId,
      settings: state.settings,
      meta: state.meta,
    };
    sheets.push({
      name: BACKUP_SHEET,
      rows: [
        ['Não edite esta aba. Ela guarda configurações para restaurar o backup.'],
        [BACKUP_MARKER, JSON.stringify(config)],
      ],
    });

    const blob = XLSX.buildXlsx(sheets);
    U.downloadBlob(`controle360-completo-${U.today()}.xlsx`, blob);
    notify('Backup Excel exportado.', 'success');
  }

  // ---------- Importar Excel ----------
  function buildReverseMap(collection) {
    const map = {};
    collection.fields.forEach((key) => {
      map[deburr(label(key))] = key;
      map[deburr(key)] = key;
    });
    // Também aceita rótulos de chaves que não estão na ordem padrão.
    Object.keys(LABELS).forEach((key) => {
      if (!(deburr(label(key)) in map)) map[deburr(label(key))] = key;
    });
    return map;
  }

  function rowToRecord(headerKeys, cells) {
    const record = {};
    let hasValue = false;
    headerKeys.forEach((key, index) => {
      if (!key) return;
      let value = cells[index];
      if (value === undefined || value === '') return;
      hasValue = true;
      if (NUMERIC_KEYS.has(key)) {
        const num = Number(value);
        value = Number.isFinite(num) ? num : 0;
      } else if (DATE_KEYS.has(key) && typeof value === 'number') {
        value = excelSerialToDate(value);
      } else {
        value = String(value);
      }
      record[key] = value;
    });
    return hasValue ? record : null;
  }

  function collectionsFromSheets(sheetMap) {
    const result = {};
    COLLECTIONS.forEach((collection) => {
      const sheet = sheetMap[deburr(collection.sheet)] || sheetMap[deburr(collection.key)];
      result[collection.key] = [];
      if (!sheet || !sheet.rows.length) return;
      const reverse = buildReverseMap(collection);
      const headerKeys = sheet.rows[0].map((cell) => reverse[deburr(cell)] || null);
      for (let i = 1; i < sheet.rows.length; i += 1) {
        const record = rowToRecord(headerKeys, sheet.rows[i]);
        if (!record) continue;
        if (!record.id) record.id = U.uid(collection.key);
        result[collection.key].push(record);
      }
    });
    return result;
  }

  async function importXlsx(file) {
    try {
      const buffer = await file.arrayBuffer();
      const sheets = await XLSX.parseXlsx(buffer);
      const sheetMap = {};
      sheets.forEach((sheet) => { sheetMap[deburr(sheet.name)] = sheet; });

      const collections = collectionsFromSheets(sheetMap);

      const current = S.getState();
      const next = {
        meta: current.meta,
        settings: current.settings,
        activeBusinessId: current.activeBusinessId,
        ...collections,
      };

      const backupSheet = sheetMap[deburr(BACKUP_SHEET)];
      if (backupSheet) {
        const configCell = backupSheet.rows.find((row) => row[0] === BACKUP_MARKER);
        if (configCell && configCell[1]) {
          try {
            const config = JSON.parse(configCell[1]);
            if (config.settings) next.settings = config.settings;
            if (config.meta) next.meta = config.meta;
            if (config.activeBusinessId) next.activeBusinessId = config.activeBusinessId;
          } catch (error) {
            /* configuração ilegível: mantém a atual */
          }
        }
      }

      const validBusiness = next.businesses.some((b) => b.id === next.activeBusinessId);
      if (!validBusiness) next.activeBusinessId = next.businesses[0]?.id || null;

      const total = COLLECTIONS.reduce((sum, c) => sum + (next[c.key] || []).length, 0);
      if (!window.confirm(`Importar esta planilha vai substituir os dados locais atuais por ${total} registro(s). Continuar?`)) {
        return;
      }

      S.replaceState(next);
      refresh();
      notify('Planilha importada com sucesso.', 'success');
    } catch (error) {
      notify('Não foi possível importar: ' + error.message, 'error');
      window.alert('Não foi possível importar: ' + error.message);
    }
  }

  // ---------- CSV por módulo ----------
  // Proteção contra injeção de fórmula (CSV/Excel formula injection): um
  // cliente chamado "=HYPERLINK(...)" ou "+SUM(...)" pode virar fórmula viva
  // quando o CSV é aberto no Excel/Sheets, porque CSV não tem tipo de célula
  // — o programa decide na hora se o texto "parece" fórmula. Mitigação padrão
  // (OWASP): se o campo (depois de tirar espaços nas pontas) começa com
  // = + - @, prefixar com um apóstrofo antes de aplicar a citação normal.
  // Só se aplica a valores de TEXTO: campos numéricos de verdade (NUMERIC_KEYS,
  // já convertidos para Number em cellValue) não passam por aqui — um custo
  // negativo como -45.5 continua sendo número, não texto, então não corre
  // risco de virar fórmula e não deve ganhar apóstrofo.
  function csvField(value) {
    const isRealNumber = typeof value === 'number';
    let text = String(value ?? '');
    if (!isRealNumber && /^[=+\-@]/.test(text.trim())) {
      text = `'${text}`;
    }
    if (/[;"\n\r]/.test(text)) return `"${text.replaceAll('"', '""')}"`;
    return text;
  }

  // TODO(integrador): este CSV por módulo já filtra por negócio ativo
  // (activeBusinessId), mas não por vendedor. Quando currentUser.role ===
  // 'vendedor' existir, adicionar aqui um segundo filtro — depois do filtro
  // de activeBusinessId e antes de montar `fields`/`lines` — restringindo
  // `records` a `record.seller_id === currentUser.id` para as coleções que
  // pertencem a um vendedor específico: clients, sales, orders, consignments
  // (e consignmentEvents, que é filho de consignments). Um vendedor não pode
  // exportar CSV de clientes/vendas/pedidos/consignados de outro vendedor.
  function exportCsv(collectionKey) {
    const collection = COLLECTIONS.find((item) => item.key === collectionKey);
    if (!collection) return;
    const state = S.getState();
    let records = state[collectionKey] || [];
    if (collectionKey !== 'businesses' && state.activeBusinessId) {
      records = records.filter((record) => record.businessId === state.activeBusinessId);
    }
    const fields = fieldsFor(collection, records);
    const lines = [fields.map((key) => csvField(label(key))).join(';')];
    records.forEach((record) => {
      lines.push(fields.map((key) => csvField(cellValue(key, record[key]))).join(';'));
    });
    const content = '\ufeff' + lines.join('\r\n');
    U.downloadText(`controle360-${deburr(collection.sheet).replaceAll(' ', '-')}-${U.today()}.csv`, content, 'text/csv;charset=utf-8');
    notify(`CSV de ${collection.sheet} exportado.`, 'success');
  }

  // TODO(integrador): exportJson() serializa S.getState() inteiro — todas as
  // coleções, de todos os negócios, sem filtro nenhum (é o backup bruto).
  // Quando currentUser.role === 'vendedor' existir, este backup completo
  // provavelmente deve ficar bloqueado para vendedor (ou passar por um clone
  // do estado com clients/sales/orders/consignments/consignmentEvents
  // filtrados por seller_id === currentUser.id antes do JSON.stringify) —
  // decidir com a regra de negócio se vendedor tem acesso a este botão.
  // ---------- JSON ----------
  function exportJson() {
    U.downloadText(`controle360-backup-${U.today()}.json`, JSON.stringify(S.getState(), null, 2));
    notify('Backup JSON exportado.', 'success');
  }

  function importJson(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!window.confirm('Importar este backup JSON vai substituir os dados locais atuais. Continuar?')) return;
        S.replaceState(parsed);
        refresh();
        notify('Backup JSON importado.', 'success');
      } catch (error) {
        notify('Backup inválido: ' + error.message, 'error');
        window.alert('Backup inválido: ' + error.message);
      }
    };
    reader.readAsText(file);
  }

  window.C360.io = {
    COLLECTIONS,
    exportXlsx,
    importXlsx,
    exportCsv,
    exportJson,
    importJson,
  };
})();
</script>

    const user = S.getCurrentUser();
    return user ? user.role : 'admin';

  function currentProductions() { return businessScoped('productions'); }
  function currentSales() { return businessScoped('sales'); }

  }

    renderDashboard();
    renderTab();

  // Abas "clássicas": a função devolve uma string HTML, que é jogada em

  const LEGACY_RENDERERS = {

    produtos: renderProducts,
    clientes: renderClients,
    fornecedores: renderSuppliers,
    compras: renderPurchases,
    fichas: renderRecipes,
    producao: renderProduction,
    vendas: renderSales,
    pedidos: renderOrders,
    consignado: renderConsignments,
    tarefas: renderTasks,
    relatorios: renderReports,
    dados: renderData,

  // Abas "modulares": vêm de src/auth.js, src/pricing.js, src/sellerStock.js,

  function renderTab() {
    if (!tabAllowed(activeTab)) {
      activeTab = firstAllowedTab();
      els.tabs.forEach((button) => button.classList.toggle('active', button.dataset.tab === activeTab));

    mountModuleTab(activeTab);

        break;
      case 'aprovacoes':

          }
          if (typeof window.C360.sellerStock.mountGrantStock === 'function') {

  // Painel de devolução/desperdício (src/returns.js) para a venda cujo id está

      <form id="productForm" class="grid-form">
        <label>Nome
          <input name="name" required placeholder="Ex.: Vidro âmbar 100 ml / Rótulo / Essência pronta">

      name: data.name.trim(),

  async function addProduct(data) {
    const business = S.activeBusiness();
    await S.add('products', {
      name: data.name.trim(),

      unit: data.unit,
      currentStock: U.number(data.currentStock),
      avgCost: U.number(data.avgCost),

  async function addPurchase(data) {
    U.assertPositive(data.quantity, 'Quantidade');
    U.assertPositive(data.totalCost, 'Valor total');
    const product = productById(data.productId);
    if (!product) throw new Error('Produto não encontrado.');
    const quantity = U.number(data.quantity);
    const totalCost = U.number(data.totalCost);
    const unitCost = totalCost / quantity;
    const nextAvg = Calc.weightedAverageCost(product.currentStock, product.avgCost, quantity, totalCost);
    await S.update('products', product.id, {
      currentStock: U.number(product.currentStock) + quantity,
      avgCost: nextAvg,
    });
    await S.add('purchases', {
      date: data.date,
      supplierId: data.supplierId || '',
      productId: product.id,
      quantity,
      totalCost,
      unitCost,
      notes: data.notes || '',
    });
    await S.recordMovement({
      date: data.date,
      type: 'entrada_compra',
      productId: product.id,
      quantity,
      unitCost,
      totalCost,
      notes: data.notes || '',
    });
  }

  async function addRecipe(data) {
    U.assertPositive(data.quantityPerUnit, 'Quantidade por unidade');
    if (data.finalProductId === data.inputProductId) throw new Error('Produto final não pode consumir ele mesmo.');
    const duplicate = currentRecipes().find((row) => row.finalProductId === data.finalProductId && row.inputProductId === data.inputProductId);
    if (duplicate) throw new Error('Este item já existe na ficha técnica. Exclua o anterior antes de lançar novo valor.');
    await S.add('recipes', {
      finalProductId: data.finalProductId,
      inputProductId: data.inputProductId,
      quantityPerUnit: U.number(data.quantityPerUnit),
    });
  }

  async function addProduction(data) {
    U.assertPositive(data.quantity, 'Quantidade produzida');
    const finalProduct = productById(data.finalProductId);
    if (!finalProduct) throw new Error('Produto final não encontrado.');
    const recipe = Calc.calculateRecipeCost(finalProduct.id, state());
    if (!recipe.items.length) throw new Error('Produto final sem ficha técnica.');
    const quantity = U.number(data.quantity);

    const shortages = recipe.items.filter((item) => U.number(item.input?.currentStock) < item.quantityPerUnit * quantity);
    if (shortages.length) {
      const names = shortages.map((item) => item.input?.name || 'item removido').join(', ');
      throw new Error(`Estoque insuficiente para: ${names}.`);
    }

    let totalCost = 0;
    for (const item of recipe.items) {
      const consumedQty = item.quantityPerUnit * quantity;
      const cost = consumedQty * U.number(item.input.avgCost);
      totalCost += cost;
      // eslint-disable-next-line no-await-in-loop
      await S.update('products', item.input.id, { currentStock: U.number(item.input.currentStock) - consumedQty });
      // eslint-disable-next-line no-await-in-loop
      await S.recordMovement({
        date: data.date,
        type: 'saida_producao_insumo',
        productId: item.input.id,
        quantity: -consumedQty,
        unitCost: U.number(item.input.avgCost),
        totalCost: -cost,
        notes: `Produção de ${finalProduct.name}`,
      });
    }

    const extraCosts = (U.number(finalProduct.laborCostPerUnit) + U.number(finalProduct.overheadCostPerUnit)) * quantity;
    const lossCost = (totalCost + extraCosts) * (U.number(finalProduct.lossPercent) / 100);
    totalCost += extraCosts + lossCost;
    const unitCost = totalCost / quantity;
    const nextAvg = Calc.weightedAverageCost(finalProduct.currentStock, finalProduct.avgCost, quantity, totalCost);

    await S.update('products', finalProduct.id, {
      currentStock: U.number(finalProduct.currentStock) + quantity,
      avgCost: nextAvg,
    });
    await S.add('productions', {
      date: data.date,
      finalProductId: finalProduct.id,
      quantity,
      totalCost,
      unitCost,
      notes: data.notes || '',
    });
    await S.recordMovement({
      date: data.date,
      type: 'entrada_producao_produto_final',
      productId: finalProduct.id,
      quantity,
      unitCost,
      totalCost,
      notes: data.notes || '',
    });
  }

  // Vendedor logado tem um preço/piso específico para este produto? (linha de
  // seller_prices já carregada no cache pelo refresh — ver src/state.js).
  function sellerPriceForProduct(productId) {
    return (state().sellerPrices || []).find((row) => String(row.productId) === String(productId)) || null;
  }

  // Bloqueio client-side do piso de preço (UX): o trigger do banco (ver
  // docs/backend.md §7) é a garantia final, isto só evita uma viagem ao
  // servidor para descobrir que o preço está abaixo do piso.
  function validateSaleFloor(data) {
    const user = S.getCurrentUser();
    if (!user || user.role !== 'vendedor') return;
    if (!Calc.resolveSellerPrice || !Calc.validatePriceFloor) return;
    const product = productById(data.productId);
    if (!product) return;
    const sellerPrice = sellerPriceForProduct(data.productId);
    const { floor } = Calc.resolveSellerPrice({ product, sellerPrice });
    const result = Calc.validatePriceFloor({ unitPrice: data.unitPrice, floor });
    if (!result.ok) throw new Error(result.message);
  }

  async function addSale(data, options = {}) {
    U.assertPositive(data.quantity, 'Quantidade');
    U.assertPositive(data.unitPrice, 'Preço unitário');
    const product = productById(data.productId);
    if (!product) throw new Error('Produto não encontrado.');
    const quantity = U.number(data.quantity);
    if (product.type !== 'servico' && U.number(product.currentStock) < quantity && !options.skipStockCheck) {
      throw new Error(`Estoque insuficiente. Disponível: ${U.qty(product.currentStock, product.unit)}.`);
    }
    const unitCost = options.unitCostOverride ?? U.number(product.avgCost);
    const math = Calc.saleMath({
      quantity,
      unitPrice: data.unitPrice,
      discount: data.discount,
      fixedFees: data.fixedFees,
      feePercent: data.feePercent,
      unitCost,
    });
    const sale = await S.add('sales', {
      date: data.date,
      channel: data.channel || 'Direto',
      clientId: data.clientId || '',
      productId: product.id,
      quantity,
      unitPrice: U.number(data.unitPrice),
      discount: U.number(data.discount),
      fixedFees: U.number(data.fixedFees),
      feePercent: U.number(data.feePercent),
      unitCost,
      ...math,
      notes: data.notes || '',
      origin: options.origin || 'manual',
      originId: options.originId || '',
    });

    if (product.type !== 'servico' && !options.skipStockMovement) {
      await S.update('products', product.id, { currentStock: U.number(product.currentStock) - quantity });
      await S.recordMovement({
        date: data.date,
        type: 'saida_venda',
        productId: product.id,
        quantity: -quantity,
        unitCost,
        totalCost: -(quantity * unitCost),
        notes: data.notes || '',
      });
    }
    return sale;
  }

  // Wrapper usado pelo #saleForm (lançamento manual de venda): valida o piso
  // de preço do vendedor antes de chamar addSale. Fluxos internos (conversão
  // de pedido, baixa de consignado) chamam addSale diretamente, sem esta
  // validação extra, porque o preço já vem combinado/aprovado antes.
  async function submitSale(data) {
    validateSaleFloor(data);
    return addSale(data);
  }

  async function addConsignment(data) {
    U.assertPositive(data.quantitySent, 'Quantidade enviada');
    U.assertPositive(data.unitPrice, 'Preço unitário');
    const product = productById(data.productId);
    if (!product) throw new Error('Produto não encontrado.');
    const quantitySent = U.number(data.quantitySent);
    if (U.number(product.currentStock) < quantitySent) throw new Error(`Estoque insuficiente. Disponível: ${U.qty(product.currentStock, product.unit)}.`);
    const costAtSend = U.number(product.avgCost);
    await S.update('products', product.id, { currentStock: U.number(product.currentStock) - quantitySent });
    const record = await S.add('consignments', {
      date: data.date,
      clientId: data.clientId,
      productId: product.id,
      quantitySent,
      quantitySold: 0,
      quantityReturned: 0,
      amountPaid: 0,
      unitPrice: U.number(data.unitPrice),
      costAtSend,
      notes: data.notes || '',
      status: 'com_cliente',
    });
    await S.recordMovement({
      date: data.date,
      type: 'saida_envio_consignado',
      productId: product.id,
      quantity: -quantitySent,
      unitCost: costAtSend,
      totalCost: -(quantitySent * costAtSend),
      notes: `Envio consignado ${record.id}`,
    });
  }

  async function handleSubmit(event) {
    const form = event.target.closest('form');
    if (!form) return;
    event.preventDefault();
    try {
      const data = U.formData(form);
      const handlers = {
        businessForm: addBusiness,
        productForm: addProduct,
        clientForm: (d) => S.add('clients', { name: d.name.trim(), phone: d.phone || '', type: d.type || 'cliente', notes: d.notes || '' }),
        supplierForm: (d) => S.add('suppliers', { name: d.name.trim(), phone: d.phone || '', notes: d.notes || '' }),
        purchaseForm: addPurchase,
        recipeForm: addRecipe,
        productionForm: addProduction,
        saleForm: submitSale,
        orderForm: addOrder,
        consignmentForm: addConsignment,
        taskForm: (d) => S.add('tasks', { title: d.title.trim(), dueDate: d.dueDate || '', status: d.status || 'a_fazer', notes: d.notes || '' }),
      };
      const handler = handlers[form.id];
      if (!handler) return;
      await handler(data);
      form.reset();
      renderAll();
    } catch (error) {
      alert(error.message);
    }
  }

  async function handleClick(event) {
    const button = event.target.closest('[data-action]');
    if (!button) return;
    const { action, id } = button.dataset;
    try {
      switch (action) {
        case 'select-business':
          S.setActiveBusiness(id);
          break;
        case 'delete-business':
          if (confirm('Excluir este negócio e todos os dados vinculados a ele?')) await deleteBusinessCascade(id);
          break;
        case 'delete-product':
          if (confirm('Excluir produto? As movimentações antigas ficam no histórico com item removido.')) await deleteRecord('products', id);
          break;
        case 'delete-client': await deleteRecord('clients', id); break;
        case 'delete-supplier': await deleteRecord('suppliers', id); break;
        case 'delete-recipe': await deleteRecord('recipes', id); break;
        case 'delete-order': await deleteRecord('orders', id); break;
        case 'delete-task': await deleteRecord('tasks', id); break;
        case 'delete-consignment':
          if (confirm('Excluir consignação? Isso não desfaz estoque automaticamente. Use apenas para correção manual/revisão.')) await deleteRecord('consignments', id);
          break;
        case 'convert-order-sale':
          await convertOrderToSale(id);
          break;
        case 'consign-sell':
          await consignmentSell(id);
          break;
        case 'consign-return':
          await consignmentReturn(id);
          break;
        case 'consign-pay':
          await consignmentPay(id);
          break;
        case 'toggle-returns':
          openReturnsSaleId = openReturnsSaleId === id ? null : id;
          break;
        default:
          return;
      }
      renderAll();
    } catch (error) {
      alert(error.message);
    }
  }

  // ATENÇÃO (gap conhecido, ver docs/backend.md §8 e resumo do integrador):
  // `supabase/migrations/0001_init.sql` não tem policy de DELETE/INSERT para
  // `businesses` (bootstrap é manual, via service role) — por isso esta
  // função só limpa o espelho local (cache), sem chamar a API. O registro
  // volta a aparecer no próximo `S.refresh()`, porque o servidor continua
  // sendo dono da verdade. Não chamamos `S.remove('businesses', ...)` aqui de
  // propósito: chamaria a API e sempre retornaria 403/permissão negada.
  async function deleteBusinessCascade(businessId) {
    const keys = ['products', 'clients', 'suppliers', 'purchases', 'stockMovements', 'recipes', 'productions', 'sales', 'orders', 'consignments', 'consignmentEvents', 'tasks'];
    const next = state();
    keys.forEach((key) => {
      next[key] = next[key].filter((item) => item.businessId !== businessId);
    });
    next.businesses = next.businesses.filter((business) => business.id !== businessId);
    if (next.activeBusinessId === businessId) next.activeBusinessId = next.businesses[0]?.id || null;
    S.replaceState(next);
  }

  async function convertOrderToSale(orderId) {
    const order = state().orders.find((item) => item.id === orderId);
    if (!order) throw new Error('Pedido não encontrado.');
    if (order.convertedSaleId) throw new Error('Pedido já foi convertido em venda.');
    const sale = await addSale({
      date: U.today(),
      channel: 'Pedido',
      clientId: order.clientId,
      productId: order.productId,
      quantity: order.quantity,
      unitPrice: order.unitPrice,
      discount: 0,
      fixedFees: 0,
      feePercent: 0,
      notes: `Baixa automática do pedido ${order.id}`,
    }, { origin: 'pedido', originId: order.id });
    await S.update('orders', order.id, { convertedSaleId: sale.id, status: 'despachado' });
  }

  async function consignmentSell(id) {
    const item = state().consignments.find((record) => record.id === id);
    if (!item) throw new Error('Consignação não encontrada.');
    const product = productById(item.productId);
    if (!product) throw new Error('Produto da consignação não encontrado.');
    const available = Calc.consignmentAvailableWithClient(item);
    const qtyText = prompt(`Quantidade vendida pelo cliente? Disponível com cliente: ${U.qty(available, product?.unit)}`);
    if (qtyText === null) return;
    const quantity = U.number(qtyText);
    U.assertPositive(quantity, 'Quantidade vendida');
    if (quantity > available) throw new Error('Quantidade maior que o disponível com o cliente.');
    await addSale({
      date: U.today(),
      channel: 'Consignado',
      clientId: item.clientId,
      productId: item.productId,
      quantity,
      unitPrice: item.unitPrice,
      discount: 0,
      fixedFees: 0,
      feePercent: 0,
      notes: `Venda informada na consignação ${item.id}`,
    }, { skipStockMovement: true, skipStockCheck: true, unitCostOverride: item.costAtSend, origin: 'consignado', originId: item.id });
    await S.update('consignments', item.id, { quantitySold: U.number(item.quantitySold) + quantity });
    await S.add('consignmentEvents', { consignmentId: item.id, type: 'venda_cliente', date: U.today(), quantity, amount: quantity * U.number(item.unitPrice) });
  }

  async function consignmentReturn(id) {
    const item = state().consignments.find((record) => record.id === id);
    if (!item) throw new Error('Consignação não encontrada.');
    const product = productById(item.productId);
    if (!product) throw new Error('Produto da consignação não encontrado.');
    const available = Calc.consignmentAvailableWithClient(item);
    const qtyText = prompt(`Quantidade devolvida? Disponível com cliente: ${U.qty(available, product?.unit)}`);
    if (qtyText === null) return;
    const quantity = U.number(qtyText);
    U.assertPositive(quantity, 'Quantidade devolvida');
    if (quantity > available) throw new Error('Quantidade maior que o disponível com o cliente.');
    await S.update('products', product.id, { currentStock: U.number(product.currentStock) + quantity });
    await S.update('consignments', item.id, { quantityReturned: U.number(item.quantityReturned) + quantity });
    await S.recordMovement({
      date: U.today(),
      type: 'entrada_devolucao_consignado',
      productId: product.id,
      quantity,
      unitCost: U.number(item.costAtSend),
      totalCost: quantity * U.number(item.costAtSend),
      notes: `Devolução consignado ${item.id}`,
    });
    await S.add('consignmentEvents', { consignmentId: item.id, type: 'devolucao', date: U.today(), quantity, amount: 0 });
  }

  async function consignmentPay(id) {
    const item = state().consignments.find((record) => record.id === id);
    if (!item) throw new Error('Consignação não encontrada.');
    const open = Calc.consignmentOpenAmount(item);
    if (open <= 0) throw new Error('Não há valor em aberto nesta consignação.');
    const amountText = prompt(`Valor pago pelo cliente? Em aberto: ${U.money(open)}`);
    if (amountText === null) return;
    const amount = U.number(amountText);
    U.assertPositive(amount, 'Valor pago');
    if (amount > open) throw new Error('Valor pago maior que o valor em aberto.');
    await S.update('consignments', item.id, { amountPaid: U.number(item.amountPaid) + amount });
    await S.add('consignmentEvents', { consignmentId: item.id, type: 'pagamento', date: U.today(), quantity: 0, amount });
  }

  // ---------- Ajuda contextual (balão do ícone "ⓘ") ----------
  let tipEl = null;
  function ensureTip() {
    if (tipEl) return tipEl;
    tipEl = document.createElement('div');
    tipEl.className = 'help-tip';
    tipEl.setAttribute('role', 'tooltip');
    document.body.appendChild(tipEl);
    return tipEl;
  }
  function showTip(target) {
    const text = target.getAttribute('data-tip');
    if (!text) return;
    const tip = ensureTip();
    tip.textContent = text;
    tip.classList.add('show');
    const margin = 10;
    const r = target.getBoundingClientRect();
    const tr = tip.getBoundingClientRect();
    let left = r.left + r.width / 2 - tr.width / 2;
    left = Math.max(margin, Math.min(left, window.innerWidth - tr.width - margin));
    let top = r.top - tr.height - 8;
    if (top < margin) top = r.bottom + 8; // sem espaço acima: mostra abaixo
    tip.style.left = `${Math.round(left)}px`;
    tip.style.top = `${Math.round(top)}px`;
  }
  function hideTip() {
    if (tipEl) tipEl.classList.remove('show');
  }
  function bindHelpTips() {
    document.addEventListener('mouseover', (event) => {
      const target = event.target.closest('[data-tip]');
      if (target) showTip(target);
    });
    document.addEventListener('mouseout', (event) => {
      if (event.target.closest('[data-tip]')) hideTip();
    });
    document.addEventListener('focusin', (event) => {
      const target = event.target.closest('[data-tip]');
      if (target) showTip(target);
    });
    document.addEventListener('focusout', hideTip);
    // Toque fora do ícone fecha o balão no celular.
    document.addEventListener('click', (event) => {
      if (!event.target.closest('[data-tip]')) hideTip();
    });
    window.addEventListener('scroll', hideTip, true);
    window.addEventListener('resize', hideTip);
  }

  // Sugestão/piso de preço no formulário de venda (vendedor): ao escolher o
  // produto, prefixa o preço unitário com C360.calc.resolveSellerPrice(...) e
  // mostra o piso efetivo. Não bloqueia digitação livre — a validação real
  // acontece em validateSaleFloor() no submit (ver submitSale).
  function updateSalePriceHint(form) {
    const hint = form.querySelector('#salePriceHint');
    if (!hint) return;
    const user = S.getCurrentUser();
    const productId = form.elements.productId ? form.elements.productId.value : '';
    const product = productId ? productById(productId) : null;
    if (!product || !user || user.role !== 'vendedor' || !Calc.resolveSellerPrice) {
      hint.innerHTML = '';
      return;
    }
    const sellerPrice = sellerPriceForProduct(productId);
    const resolved = Calc.resolveSellerPrice({ product, sellerPrice });
    const unitPriceInput = form.elements.unitPrice;
    if (unitPriceInput && !unitPriceInput.dataset.touched && resolved.price > 0) {
      unitPriceInput.value = resolved.price;
    }
    const floorText = resolved.floor === null || resolved.floor === undefined
      ? 'sem piso mínimo definido'
      : `mínimo permitido: ${U.money(resolved.floor)}`;
    hint.innerHTML = UI.formNotice(`Preço sugerido: ${U.money(resolved.price)} · ${floorText}`, 'info');
  }

  function handleSalePriceHint(event) {
    const form = event.target.closest('#saleForm');
    if (!form) return;
    if (event.target.name === 'productId') updateSalePriceHint(form);
    if (event.target.name === 'unitPrice') event.target.dataset.touched = '1';
  }

  function bindEvents() {
    bindHelpTips();
    els.tabs.forEach((button) => button.addEventListener('click', () => setTab(button.dataset.tab)));
    els.activeBusiness.addEventListener('change', (event) => { S.setActiveBusiness(event.target.value); renderAll(); });
    els.btnNewBusiness.addEventListener('click', () => setTab('negocios'));
    els.btnExport.addEventListener('click', () => window.C360.io.exportXlsx());
    els.btnDataTab.addEventListener('click', () => setTab('dados'));
    els.btnReset.addEventListener('click', () => {
      if (confirm('Zerar todos os dados locais deste navegador? Faça um backup antes.')) {
        S.reset();
        renderAll();
        toast('Dados locais zerados.', 'success');
      }
    });
    if (els.btnLogout) {
      els.btnLogout.addEventListener('click', async () => {
        if (!confirm('Sair da sua conta?')) return;
        try {
          if (window.C360.auth && typeof window.C360.auth.signOut === 'function') {
            await window.C360.auth.signOut();
          }
        } catch (error) {
          console.error('C360.app: erro ao sair', error);
        }
        showLogin();
      });
    }
    document.addEventListener('submit', handleSubmit);
    document.addEventListener('click', handleClick);
    document.addEventListener('click', handleDataActions);
    document.addEventListener('change', handleFileInputs);
    document.addEventListener('change', handleSalePriceHint);
    document.addEventListener('submit', handleCostPreview, true);
    document.addEventListener('dragstart', handleKanbanDragStart);
    document.addEventListener('dragover', handleKanbanDragOver);
    document.addEventListener('dragleave', handleKanbanDragLeave);
    document.addEventListener('drop', handleKanbanDrop);
    document.addEventListener('change', handleKanbanMove);
  }

  function handleDataActions(event) {
    const trigger = event.target.closest('[data-io]');
    if (!trigger) return;
    const action = trigger.dataset.io;
    const io = window.C360.io;
    if (action === 'export-xlsx') io.exportXlsx();
    else if (action === 'export-json') io.exportJson();
    else if (action === 'export-csv') io.exportCsv(trigger.dataset.collection);
  }

  function handleFileInputs(event) {
    const input = event.target.closest('[data-io-import]');
    if (!input || !input.files || !input.files[0]) return;
    const kind = input.dataset.ioImport;
    const file = input.files[0];
    if (kind === 'xlsx') window.C360.io.importXlsx(file);
    else if (kind === 'json') window.C360.io.importJson(file);
    input.value = '';
  }

  function toast(message, type = '') {
    if (!els.toastHost) return;
    const node = document.createElement('div');
    node.className = `toast ${type}`;
    node.textContent = message;
    els.toastHost.appendChild(node);
    requestAnimationFrame(() => node.classList.add('show'));
    setTimeout(() => {
      node.classList.remove('show');
      setTimeout(() => node.remove(), 250);
    }, 3200);
  }

  window.C360.app = { refresh: renderAll, toast };

  // ---------------------------------------------------------------------
  // Bootstrap com portão de autenticação (src/auth.js): a tela de login é
  // mostrada enquanto não houver sessão válida; o dashboard/abas só montam
  // depois que C360.auth confirma o perfil (via restoreSession() ou o
  // onSuccess do formulário de login). `bindEvents()` é chamado só uma vez,
  // na primeira entrada — logout/login de novo não rebinda os listeners
  // globais (eles não dependem de sessão para existir, só a renderização
  // muda com applyRoleVisibility()).
  // ---------------------------------------------------------------------
  let eventsBound = false;

  function showAppShell() {
    if (els.authRoot) els.authRoot.innerHTML = '';
    if (els.appShell) els.appShell.hidden = false;
    if (els.headerActions) els.headerActions.hidden = false;
  }

  function showLogin() {
    if (els.appShell) els.appShell.hidden = true;
    if (els.headerActions) els.headerActions.hidden = true;
    if (els.authRoot && window.C360.auth) {
      els.authRoot.innerHTML = window.C360.auth.render();
      window.C360.auth.mount(els.authRoot, { onSuccess: boot });
    }
  }

  function boot() {
    showAppShell();
    activeTab = firstAllowedTab();
    els.tabs.forEach((button) => button.classList.toggle('active', button.dataset.tab === activeTab));
    if (!eventsBound) {
      bindEvents();
      eventsBound = true;
    }
    applyRoleVisibility();
    renderAll();
  }

  async function init() {
    let authenticated = false;
    try {
      if (window.C360.auth && typeof window.C360.auth.restoreSession === 'function') {
        authenticated = await window.C360.auth.restoreSession();
      }
    } catch (error) {
      console.error('C360.app: erro ao restaurar sessão', error);
    }
    if (authenticated) {
      boot();
    } else {
      showLogin();
    }
  }

  init();
})();
</script>
</body>
</html>
