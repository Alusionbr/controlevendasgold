  <style>
/* Controle360 Multi — interface operacional.
   Direção: ferramenta de trabalho calma e legível, mobile-first (a maioria dos
   vendedores usa no celular). Um único acento de cor para ação e dinheiro,
   números tabulares alinhados como assinatura (estoque e valores sempre
   "batem" coluna a coluna). Paleta configurável por tema — ver seção
   "Temas" logo abaixo do :root. */

:root {
  /* ---- Valores fixos (não variam por tema) ---- */
  --danger: #b3261e;
  --danger-soft: #fbe7e6;
  --danger-deep: #8f1e17;
  --success: #1f7a45;
  --success-soft: #e3f3ea;
  --warning: #9a5a08;
  --radius: 14px;
  --radius-sm: 10px;
  --num: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
}

/* ---------- Temas ----------
   Contrato para quem for ligar o seletor de tema (ver nota no relatório):
   - atributo: data-theme="ouro" | data-theme="classico" no <html> (ou <body>).
   - sem o atributo, o tema padrão é "ouro" (direção atual do produto).
   - trocar o atributo repinta o app inteiro: botões, badges, aba ativa,
     anéis de foco, cabeçalhos de coluna do kanban e barras de destaque
     usam só variáveis, não cores fixas. */

:root,
:root[data-theme="ouro"] {
  --bg: #f5efe1;
  --surface: #ffffff;
  --surface-soft: #faf5e8;
  --ink: #241d10;
  --text: #2b2417;
  --muted: #79705d;
  --line: #e7dec7;
  --line-strong: #d8c9a2;

  /* estrutura/"chrome": ouro pede tinta escura (quase preto/marrom) para contraste */
  --brand: #241d10;
  --brand-deep: #140f09;
  --brand-soft: #efe3c5;
  --brand-border-soft: #e2d3a4;
  --brand-soft-hover: #e8dcae;

  /* acento principal: ouro/dourado — botões, aba ativa, foco, destaques */
  --accent: #c9a227;
  --accent-deep: #8a6a12;
  --accent-soft: #f7ecc9;
  --accent-ink: #7a5e0a;
  --accent-border-soft: #ecd9a0;
  --accent-contrast: #241d10;

  --header-eyebrow: #e7cf8f;
  --header-subtitle: #ddc998;
  --ink-contrast: #f7f0df;
  --ink-contrast-soft: #ecdfb8;
  --bg-glow: rgba(120, 94, 20, 0.14);

  --focus-ring: rgba(184, 138, 20, 0.5);
  --focus-ring-soft: rgba(184, 138, 20, 0.18);

  --shadow: 0 12px 30px rgba(30, 22, 6, 0.16);
  --shadow-sm: 0 4px 14px rgba(30, 22, 6, 0.12);
}

:root[data-theme="classico"] {
  --bg: #eef2f1;
  --surface: #ffffff;
  --surface-soft: #f6f8f7;
  --ink: #14302f;
  --text: #1f2d2c;
  --muted: #5d6f6d;
  --line: #d8e1df;
  --line-strong: #c2cfcc;

  --brand: #0f6b62;
  --brand-deep: #0c4f49;
  --brand-soft: #e4efed;
  --brand-border-soft: #bfe0db;
  --brand-soft-hover: #d2e8e4;

  --accent: #c9610c;
  --accent-deep: #b3550a;
  --accent-soft: #fbeede;
  --accent-ink: #7a4406;
  --accent-border-soft: #f0d4b3;
  --accent-contrast: #ffffff;

  --header-eyebrow: #a9dcd5;
  --header-subtitle: #c4e7e2;
  --ink-contrast: #eafaf7;
  --ink-contrast-soft: #d8efea;
  --bg-glow: rgba(15, 107, 98, 0.1);

  --focus-ring: rgba(201, 97, 12, 0.45);
  --focus-ring-soft: rgba(201, 97, 12, 0.16);

  --shadow: 0 12px 30px rgba(12, 60, 56, 0.1);
  --shadow-sm: 0 4px 14px rgba(12, 60, 56, 0.07);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background:
    radial-gradient(1200px 480px at 100% -10%, var(--bg-glow), transparent 60%),
    var(--bg);
  color: var(--text);
  line-height: 1.5;
}

h1, h2, h3 { line-height: 1.18; margin: 0; color: var(--ink); letter-spacing: -0.01em; }
p { margin: 0; }

button, input, select, textarea { font: inherit; color: inherit; }

/* ---------- Botões ---------- */
/* min-height ~44px em qualquer largura: alvo de toque confortável no celular. */
button {
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-contrast);
  padding: 0.7rem 1.05rem;
  min-height: 44px;
  cursor: pointer;
  font-weight: 650;
  letter-spacing: 0.005em;
  transition: transform 0.04s ease, background-color 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}
button:hover { background: var(--accent-deep); }
button:active { transform: translateY(1px); }
button:disabled { opacity: 0.45; cursor: not-allowed; }

button.secondary {
  background: var(--brand);
  color: #fff;
}
button.secondary:hover { background: var(--brand-deep); }

button.ghost {
  background: transparent;
  color: var(--brand-deep);
  border-color: var(--line-strong);
}
button.ghost:hover { background: var(--brand-soft); border-color: var(--brand); }

button.danger { background: var(--danger); color: #fff; }
button.danger:hover { background: var(--danger-deep); }
button.danger.ghost { background: transparent; color: var(--danger); border-color: var(--danger-soft); }
button.danger.ghost:hover { background: var(--danger-soft); }

button.small { padding: 0.4rem 0.7rem; font-size: 0.85rem; border-radius: 8px; min-height: 36px; }

:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: 6px;
}

/* ---------- Cabeçalho ---------- */
/* Sticky só a partir do desktop (ver media query abaixo): no celular o
   cabeçalho fica alto (marca empilhada + botões de ação em largura total —
   Baixar Excel/Backup e exportação/Sair), e travá-lo no topo cobriria boa
   parte da tela o tempo todo durante a rolagem. */
.app-header {
  position: static;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.9rem;
  padding: 1.1rem clamp(1rem, 4vw, 2.4rem);
  background: linear-gradient(180deg, var(--brand-deep), var(--brand));
  color: var(--ink-contrast);
  box-shadow: var(--shadow-sm);
}
.app-header .brand p { color: var(--header-subtitle); max-width: 60ch; }
.app-header h1 {
  color: #ffffff;
  font-size: clamp(1.4rem, 3.4vw, 2rem);
  font-weight: 760;
  margin: 0.15rem 0 0.25rem;
}
.app-header h1 span { color: var(--accent-soft); font-weight: 760; }
.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 0.66rem;
  font-weight: 700;
  color: var(--header-eyebrow) !important;
}
.header-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; width: 100%; }
.header-actions[hidden] { display: none; }
.header-actions button { flex: 1 1 160px; }
.app-header button.secondary { background: var(--accent); color: var(--accent-contrast); }
.app-header button.secondary:hover { background: var(--accent-deep); }
.app-header button.ghost { color: var(--ink-contrast); border-color: rgba(255, 255, 255, 0.35); }
.app-header button.ghost:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255,255,255,0.6); }

/* Desktop: cabeçalho volta a ser uma única linha, texto à esquerda e ações à
   direita, e cabe travado no topo (sticky) sem atrapalhar o conteúdo. */
@media (min-width: 721px) {
  .app-header { position: sticky; top: 0; flex-direction: row; align-items: flex-end; justify-content: space-between; gap: 1.5rem; }
  .header-actions { width: auto; flex-wrap: nowrap; }
  .header-actions button { flex: 0 0 auto; }
}

/* ---------- Estrutura ---------- */
.app-shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(1rem, 3vw, 1.8rem) clamp(0.8rem, 4vw, 2.4rem) 4rem;
}

.business-bar {
  display: flex;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 0.85rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  box-shadow: var(--shadow-sm);
}
.business-bar[hidden] { display: none; }
.business-bar > div { display: flex; flex-direction: column; gap: 0.3rem; flex: 1 1 240px; min-width: 0; }
.business-bar label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
.business-bar select { min-width: 200px; }
.business-bar button { flex: 1 1 auto; }

@media (max-width: 480px) {
  .business-bar select { min-width: 0; width: 100%; }
  .business-bar button { width: 100%; }
}

/* ---------- Dashboard ---------- */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0.7rem;
  margin: 1.1rem 0;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0.95rem 1.05rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--accent);
}
.metric-card span { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; }
.metric-card strong { font-size: 1.5rem; font-weight: 720; font-variant-numeric: tabular-nums; font-family: var(--num); color: var(--ink); }

@media (max-width: 400px) {
  /* 2 colunas em vez de empilhar tudo: no celular a rolagem até o conteúdo
     das abas fica bem mais curta com 6 métricas em 3 linhas em vez de 6. */
  .dashboard { grid-template-columns: repeat(2, 1fr); gap: 0.55rem; }
  .metric-card { padding: 0.8rem 0.85rem; }
  .metric-card strong { font-size: 1.15rem; }
}

/* ---------- Abas ---------- */
/* Nota de correção: .tabs NÃO fica sticky (era `position: sticky; top: 0`
   igual ao .app-header, que também é sticky top:0 — dois elementos presos
   no mesmo topo se sobrepõem, e o cabeçalho (z-index maior) acaba cobrindo
   as abas assim que a rolagem prende os dois ao mesmo tempo). Sem medir a
   altura real do cabeçalho (variável: 1 ou 2 linhas conforme a largura) não
   dá para travar as abas exatamente abaixo dele só com CSS, então a rolagem
   normal é o comportamento seguro. Mais abas virão (Vendedores, Aprovações,
   Metas, Ajuda, Calculadora...), por isso a barra rola horizontalmente e
   nunca quebra o layout. */
.tabs {
  display: flex;
  gap: 0.3rem;
  margin: 1.1rem 0 1.2rem;
  padding: 0.35rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  box-shadow: var(--shadow-sm);
}
.tabs::-webkit-scrollbar { height: 6px; }
.tabs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
.tab-button {
  background: transparent;
  color: var(--muted);
  border: 0;
  padding: 0.6rem 1rem;
  min-height: 44px;
  border-radius: 999px;
  font-weight: 650;
  white-space: nowrap;
  flex: 0 0 auto;
}
.tab-button:hover { background: var(--brand-soft); color: var(--brand-deep); }
.tab-button.active { background: var(--accent); color: var(--accent-contrast); }

/* Sub-barra (#subTabsBar): abas do grupo escolhido em .tabs (#tabsBar).
   Mesma base visual, só um pouco mais discreta/compacta. */
.subtabs {
  margin-top: -0.6rem;
  background: transparent;
  border-color: transparent;
  box-shadow: none;
  padding-left: 0.1rem;
}
.subtabs .tab-button {
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 0.45rem 0.85rem;
  min-height: 38px;
  font-size: 0.88rem;
}
.subtabs .tab-button.active { background: var(--accent); border-color: transparent; color: var(--accent-contrast); }
.subtabs[hidden] { display: none; }

/* ---------- Navegação mobile (bottom-nav + menu "Mais") ----------
   No celular a barra de abas do desktop (.tabs) some e esta navegação fixa
   no rodapé assume: 4 destinos principais por perfil + "Mais" para o
   restante (gerados em src/app.js a partir do mesmo TAB_ORDER/TAB_LABELS
   que alimenta .tabs, então não há lista duplicada). Acima de 720px volta
   a valer a barra de abas horizontal de sempre. */
.bottom-nav {
  display: none;
}
@media (max-width: 720px) {
  .bottom-nav {
    display: block;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    background: var(--surface);
    border-top: 1px solid var(--line);
    box-shadow: 0 -6px 18px rgba(0, 0, 0, 0.08);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-nav[hidden] { display: none; }
  .tabs { display: none; }
  #dashboard { display: none; }
  /* Folga inferior = bottom-nav (~64px) + a calculadora flutuante (56px, no
     canto inferior direito) + respiro, para o ultimo item de qualquer tela
     (ex.: botao de acao de um card da esteira) nunca ficar escondido embaixo
     do FAB. */
  .app-shell { padding-bottom: calc(9rem + env(safe-area-inset-bottom, 0)); }
}
.bottom-nav-set {
  display: flex;
}
.bottom-nav-set[hidden] { display: none; }
.bottom-nav-item {
  flex: 1 1 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.2rem;
  background: transparent;
  border: 0;
  border-radius: 0;
  min-height: 56px;
  padding: 0.4rem 0.2rem;
  color: var(--muted);
  font-weight: 650;
  font-size: 0.76rem;
}
.bottom-nav-item.active { color: var(--accent-deep); background: var(--accent-soft); }
.bottom-nav-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ---------- Menu "Mais" (sheet mobile) ---------- */
.more-menu[hidden] { display: none; }
.more-menu {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: flex-end;
}
.more-menu-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}
.more-menu-sheet {
  position: relative;
  width: 100%;
  max-height: 75vh;
  overflow-y: auto;
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  padding: 1rem 1rem calc(1rem + env(safe-area-inset-bottom, 0));
  box-shadow: var(--shadow);
}
.more-menu-sheet header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.more-menu-role[hidden] { display: none; }
.more-menu-role {
  display: grid;
  gap: 0.7rem;
}
.more-menu-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
}
.more-menu-group-label {
  grid-column: 1 / -1;
  margin: 0.2rem 0 0;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 800;
}
.more-menu-item {
  text-align: left;
  padding: 0.75rem 0.9rem;
  min-height: 44px;
  border-radius: var(--radius-sm);
  background: var(--surface-soft);
  border: 1px solid var(--line);
  color: var(--ink);
  font-weight: 600;
}
.more-menu-item.active { background: var(--accent); color: var(--accent-contrast); border-color: transparent; }

@media (min-width: 721px) {
  .more-menu { display: none !important; }
}

/* ---------- Tela "Hoje" ---------- */
.today-screen { display: flex; flex-direction: column; gap: 1.2rem; }
.today-section {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  box-shadow: var(--shadow-sm);
}
.today-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.7rem; }
.quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.6rem; }
@media (max-width: 720px) {
  /* A calculadora flutuante (.calc-fab) e' position:fixed no canto inferior
     direito, na mesma faixa vertical onde a tela "Hoje" costuma renderizar
     a ultima linha de "Acoes rapidas" (ex.: "Meus pedidos"/"Metas") -
     reserva-se uma folga a direita so' aqui, onde o problema foi reproduzido,
     em vez de mexer em .app-shell (afetaria toda tela). */
  .quick-actions { padding-right: 70px; }
}
.quick-action {
  min-height: 48px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-contrast);
  font-weight: 700;
}
.today-list { display: flex; flex-direction: column; gap: 0.55rem; }
.today-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  padding: 0.55rem 0;
  border-bottom: 1px solid var(--line);
  font-size: 0.9rem;
}
.today-list li:last-child { border-bottom: 0; }

/* ---------- Seções ---------- */
.view { display: block; }
.section-head {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}
.section-head h2 { font-size: 1.3rem; font-weight: 720; }
.section-head p { color: var(--muted); margin-top: 0.25rem; max-width: 72ch; }

@media (min-width: 721px) {
  .section-head { flex-direction: row; justify-content: space-between; align-items: flex-start; gap: 1rem; }
}

/* ---------- Formulários ---------- */
.grid-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.85rem 1rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.15rem;
  margin-bottom: 1.4rem;
  box-shadow: var(--shadow-sm);
}
.grid-form label {
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  font-weight: 650;
  font-size: 0.86rem;
  color: var(--ink);
}
.grid-form label.full,
.grid-form label.wide,
.grid-form .full,
.grid-form .wide { grid-column: 1 / -1; }
.sale-more-options {
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.85rem;
}
.sale-more-options summary {
  cursor: pointer;
  font-weight: 650;
  font-size: 0.84rem;
  color: var(--brand-deep);
}
.sale-more-options[open] summary { margin-bottom: 0.7rem; }
.sale-more-options .grid-form {
  margin-bottom: 0;
  padding: 0;
  border: none;
  box-shadow: none;
  background: none;
}
.grid-form label span {
  font-weight: 500;
  font-size: 0.76rem;
  color: var(--muted);
}
.grid-form button[type="submit"] {
  grid-column: 1 / -1;
  justify-self: start;
  padding: 0.78rem 1.5rem;
  width: 100%;
}

@media (min-width: 481px) {
  .grid-form button[type="submit"] { width: auto; }
}

/* Formulário empilhado (uma coluna): usado em painéis menores (ficha
   técnica, simulador de custo, devolução/desperdício) em vez do grid de
   múltiplas colunas do .grid-form. */
.stack-form {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.stack-form label {
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  font-weight: 650;
  font-size: 0.86rem;
  color: var(--ink);
}
.stack-form button[type="submit"] { width: 100%; }
@media (min-width: 481px) {
  .stack-form button[type="submit"] { width: auto; align-self: flex-start; }
}

/* Duas colunas lado a lado (Fichas técnicas, Preços) — empilha em telas
   estreitas, igual ao .three-columns já usado em Relatórios. */
.two-columns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
  margin-bottom: 1.1rem;
  align-items: start;
}
.two-columns .panel-card { margin-top: 0; }

input, select, textarea {
  width: 100%;
  background: var(--surface-soft);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.7rem;
  min-height: 44px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--focus-ring-soft);
}
textarea { min-height: 76px; resize: vertical; }
input[type="number"] { font-variant-numeric: tabular-nums; font-family: var(--num); }

/* ---------- Tabelas ---------- */
/* Estratégia mobile: rolagem horizontal dentro de .table-wrap (sem exigir
   mudança de marcação em src/ui.js) + primeira coluna fixada (sticky) para
   manter a identificação da linha (nome/id) visível enquanto o resto da
   tabela rola por baixo. Sombras de rolagem (gradiente) sinalizam que há
   mais colunas fora da tela. */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  background-image:
    linear-gradient(to right, var(--surface) 0%, rgba(255, 255, 255, 0) 100%),
    linear-gradient(to left, var(--surface) 0%, rgba(255, 255, 255, 0) 100%),
    linear-gradient(to right, rgba(20, 16, 8, 0.12), rgba(20, 16, 8, 0) 100%),
    linear-gradient(to left, rgba(20, 16, 8, 0.12), rgba(20, 16, 8, 0) 100%);
  background-repeat: no-repeat;
  background-size: 24px 100%, 24px 100%, 10px 100%, 10px 100%;
  background-position: left, right, left, right;
  background-attachment: local, local, scroll, scroll;
}
table { width: 100%; border-collapse: collapse; min-width: 540px; }
thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  text-align: left;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  background: var(--surface-soft);
  padding: 0.7rem 0.85rem;
  border-bottom: 2px solid var(--line);
  white-space: nowrap;
}
tbody td {
  padding: 0.65rem 0.85rem;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  font-size: 0.92rem;
}
tbody tr:nth-child(even) td { background: rgba(15, 107, 98, 0.025); }
tbody tr:hover td { background: var(--brand-soft); }
tbody td strong { font-variant-numeric: tabular-nums; font-family: var(--num); font-weight: 650; }
table .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

/* Primeira coluna fixa (nome/id) ao rolar na horizontal — só entra em jogo
   em telas estreitas, onde a tabela realmente precisa rolar. */
@media (max-width: 720px) {
  .table-wrap table th:first-child,
  .table-wrap table td:first-child {
    position: sticky;
    left: 0;
    z-index: 1;
    background: var(--surface);
    box-shadow: 1px 0 0 var(--line);
  }
  .table-wrap table thead th:first-child { z-index: 3; }
}

/* ---------- Badges ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.12rem 0.5rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  background: var(--brand-soft);
  color: var(--brand-deep);
  white-space: nowrap;
}
.badge.ok { background: var(--success-soft); color: var(--success); }
.badge.warn { background: var(--accent-soft); color: var(--accent-ink); }

/* ---------- Avisos ---------- */
.notice {
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  font-size: 0.9rem;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  margin-bottom: 1rem;
}
.notice.warning { background: var(--accent-soft); border-color: var(--accent-border-soft); color: var(--accent-ink); }
.notice.info { background: var(--brand-soft); border-color: var(--brand-border-soft); color: var(--brand-deep); }
.notice.success { background: var(--success-soft); border-color: #c2e4cf; color: var(--success); }
.notice.error { background: var(--danger-soft); border-color: #f0c5c2; color: var(--danger); }

/* ---------- Estado vazio ---------- */
.empty-state {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  align-items: flex-start;
  padding: 2rem 1.4rem;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface-soft);
  color: var(--muted);
}
.empty-state strong { color: var(--ink); font-size: 1.02rem; }

/* ---------- Cartões e colunas ---------- */
.panel-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.1rem;
  box-shadow: var(--shadow-sm);
  margin-top: 1.1rem;
}
.panel-card h3 { font-size: 1rem; margin-bottom: 0.75rem; }
.three-columns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}
.three-columns .panel-card { margin-top: 0; }

/* ---------- Caixa de custo ---------- */
.cost-box {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.7rem;
  margin-top: 1rem;
}
.cost-item {
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 0.75rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.cost-item span { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
.cost-item strong { font-size: 1.15rem; font-variant-numeric: tabular-nums; font-family: var(--num); color: var(--ink); }

/* ---------- Kanban ---------- */
.kanban {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(230px, 1fr);
  gap: 0.8rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 0.5rem;
}
.kanban-column {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-top: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 0.7rem;
  min-height: 120px;
}
.kanban-column h3 { font-size: 0.86rem; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.kanban-dropzone { display: flex; flex-direction: column; gap: 0.55rem; min-height: 40px; border-radius: var(--radius-sm); }
.kanban-column.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; background: var(--accent-soft); }
.kanban-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.8rem;
  box-shadow: var(--shadow-sm);
  cursor: grab;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.kanban-card:active { cursor: grabbing; }
.kanban-card strong { font-size: 0.95rem; color: var(--ink); }
.kanban-card p { font-size: 0.82rem; color: var(--muted); }
.kanban-card .actions { margin-top: 0.3rem; display: flex; gap: 0.35rem; flex-wrap: wrap; }

/* Alternativa ao arrastar-e-soltar: toque/arrastar HTML5 não funciona em
   telas touch, então todo cartão também tem um select para mudar de coluna
   (ver ui.js kanban() e app.js handleKanbanMove). */
.kanban-move {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  color: var(--muted);
}
.kanban-move select {
  min-height: 38px;
  padding: 0.35rem 0.55rem;
  font-size: 0.82rem;
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text);
}

@media (max-width: 480px) {
  .kanban { grid-auto-columns: minmax(78vw, 1fr); }
}

/* ---------- Devolução/Desperdício (src/returns.js) ---------- */
.returns-panel {
  margin-top: 1rem;
  padding: 1rem;
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.returns-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  margin-bottom: 0.75rem;
}
.returns-panel-head h3 { font-size: 1rem; }
.returns-panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
}
.returns-form {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0.9rem;
  box-shadow: var(--shadow-sm);
}
.returns-form h4 { font-size: 0.92rem; color: var(--ink); margin: 0; }
.returns-hint { font-size: 0.82rem; color: var(--muted); margin: 0; }

/* ---------- Preços (src/pricing.js) ---------- */
.pricing-hint { font-size: 0.85rem; color: var(--muted); margin: 0.4rem 0 0; }

/* ---------- Central de ajuda do vendedor (src/sellerHelp.js) ---------- */
.help-onboarding, .help-tips-panel, .help-faq-panel { margin-top: 1.1rem; }

.help-steps {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.help-step { display: flex; gap: 0.75rem; align-items: flex-start; }
.help-step-number {
  flex: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent-ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85rem;
}
.help-step-body strong { display: block; color: var(--ink); margin-bottom: 0.15rem; }
.help-step-body p { color: var(--muted); font-size: 0.9rem; }

.tip-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.7rem;
}
.tip-card {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 0.75rem 0.9rem;
}
.tip-card strong { display: block; color: var(--ink); margin-bottom: 0.2rem; }
.tip-card p { color: var(--muted); font-size: 0.88rem; margin: 0; }

.help-search { margin-bottom: 0.9rem; }
.help-search input { max-width: 420px; }

.accordion { display: flex; flex-direction: column; gap: 0.5rem; }
.accordion-item {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--surface);
}
.accordion-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  background: var(--surface-soft);
  border: 0;
  border-radius: 0;
  color: var(--ink);
  text-align: left;
  padding: 0.8rem 1rem;
  font-weight: 650;
}
.accordion-trigger:hover { background: var(--brand-soft); }
.accordion-icon {
  flex: none;
  font-size: 1.1rem;
  line-height: 1;
  color: var(--accent-deep);
  transition: transform 0.15s ease;
}
.accordion-item.open .accordion-icon { transform: rotate(45deg); }
.accordion-panel { padding: 0.2rem 1rem 0.9rem; color: var(--muted); font-size: 0.92rem; }
@media (prefers-reduced-motion: reduce) {
  .accordion-icon { transition: none; }
}

/* ---------- Hub de backup / exportação ---------- */
.export-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 1.2rem;
}
.export-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.1rem;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}
.export-card.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-sm); }
.export-card-head { display: flex; align-items: center; gap: 0.5rem; }
.export-card-head h3 { font-size: 1.05rem; }
.export-card p { font-size: 0.88rem; color: var(--muted); }
.export-tag {
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 800;
  color: var(--brand-deep);
  background: var(--brand-soft);
  padding: 0.16rem 0.5rem;
  border-radius: 999px;
}
.export-actions { display: flex; gap: 0.55rem; flex-wrap: wrap; align-items: center; margin-top: auto; }
.export-actions.wrap { gap: 0.45rem; }
.hint-inline { font-size: 0.68rem; font-weight: 600; color: var(--muted); opacity: 0.85; }

/* Botão de arquivo (input file estilizado) */
.file-button {
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: var(--brand-deep);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1.05rem;
  min-height: 44px;
  font-weight: 650;
  cursor: pointer;
  transition: background-color 0.15s ease, border-color 0.15s ease;
}
.file-button:hover { background: var(--brand-soft); border-color: var(--brand); }
.file-button input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

/* ---------- Toasts ---------- */
.toast-host {
  position: fixed;
  left: 50%;
  bottom: 1.3rem;
  transform: translateX(-50%);
  z-index: 60;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  align-items: center;
  pointer-events: none;
  width: min(92vw, 460px);
}
.toast {
  pointer-events: auto;
  background: var(--ink);
  color: var(--ink-contrast);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  font-size: 0.9rem;
  font-weight: 600;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.22s ease, transform 0.22s ease;
  max-width: 100%;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }

pre {
  background: var(--ink);
  color: var(--ink-contrast-soft);
  padding: 1rem;
  border-radius: var(--radius);
  overflow: auto;
  font-size: 0.8rem;
  max-height: 360px;
}

/* ---------- Ajuda contextual (ícone ⓘ + balão explicativo) ---------- */
/* Linha de rótulo: texto do campo + ícone de ajuda na mesma linha. */
.grid-form label > .field-label,
.stack-form label > .field-label {
  display: flex;
  align-items: center;
  gap: 0.34rem;
  font-weight: 650;
  font-size: 0.86rem;
  color: var(--ink);
}

/* Ícone "ⓘ" clicável/hover. tabindex torna acessível ao toque no celular.
   O seletor [data-tip] eleva a especificidade para vencer regras de span
   herdadas (ex.: .metric-card span em maiúsculas, hints esmaecidos). */
.help[data-tip] {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1px solid var(--brand-border-soft);
  background: var(--brand-soft);
  color: var(--brand-deep);
  font-size: 0.66rem;
  font-weight: 800;
  font-style: normal;
  line-height: 1;
  letter-spacing: 0;
  text-transform: none;
  cursor: help;
  user-select: none;
  vertical-align: middle;
}
.help[data-tip]:hover { background: var(--brand-soft-hover); }
.help[data-tip]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
/* Ajuda usada dentro de um título de métrica do painel. */
.metric-card .help[data-tip] { margin-left: 0.35rem; }

/* Balão único, posicionado por JS em coordenadas fixas (não é cortado por
   nenhum contêiner e fica sempre dentro da tela). */
.help-tip {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 9999;
  max-width: 280px;
  background: var(--ink);
  color: var(--ink-contrast);
  font-size: 0.78rem;
  font-weight: 500;
  font-style: normal;
  line-height: 1.45;
  letter-spacing: 0;
  text-align: left;
  text-transform: none;
  padding: 0.6rem 0.75rem;
  border-radius: 10px;
  box-shadow: var(--shadow);
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transform: translateY(3px);
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.help-tip.show { opacity: 1; visibility: visible; transform: translateY(0); }

/* ---------- Responsivo (telas ~360px+) ---------- */
/* Base do arquivo já é mobile-first nas seções acima (dashboard, tabs,
   grid-form, tabelas, kanban, business-bar); os blocos abaixo cobrem ajustes
   finos que só fazem sentido em telas bem estreitas ou bem largas. */
@media (max-width: 720px) {
  table { min-width: 460px; }
  .help-tip { max-width: min(280px, calc(100vw - 24px)); }
}

@media (max-width: 360px) {
  .app-shell { padding-left: 0.7rem; padding-right: 0.7rem; }
  .metric-card strong { font-size: 1.05rem; }
  table { min-width: 400px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* ---------- Tela de login (src/auth.js) ---------- */
.auth-screen {
  max-width: 380px;
  margin: 3rem auto;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.6rem 1.4rem;
  box-shadow: var(--shadow-sm);
}
.auth-title { color: var(--accent-deep); font-size: 1.5rem; margin-bottom: 0.3rem; }
.auth-subtitle { color: var(--muted); margin: 0 0 1.1rem; font-size: 0.92rem; }

/* ---------- Calculadora (src/calculator.js) ---------- */
.calculator-page { display: flex; flex-direction: column; gap: 1rem; }
.calculator-card { max-width: 340px; margin-left: auto; margin-right: auto; }
.calc-display {
  background: var(--ink);
  color: var(--ink-contrast);
  border-radius: var(--radius-sm);
  padding: 0.75rem 0.9rem;
  margin-bottom: 0.75rem;
  text-align: right;
}
.calc-expression { font-size: 0.8rem; color: var(--ink-contrast-soft); min-height: 1.1em; }
.calc-value { font-size: 2rem; font-family: var(--num); font-variant-numeric: tabular-nums; font-weight: 700; }
.calc-keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
.calc-key {
  padding: 0.75rem 0;
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-family: var(--num);
}
.calc-key.span2 { grid-column: span 2; }
.calc-field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.7rem; font-size: 0.9rem; }
.calc-field label { color: var(--muted); font-size: 0.8rem; }
.calc-field input {
  padding: 0.55rem 0.7rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--surface-soft);
  color: var(--ink);
}
.calc-tool h3 { display: flex; align-items: center; gap: 0.4rem; }

/* ---------- Carrinho de vendas ---------- */
.sales-cart-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
  gap: 1rem;
  align-items: start;
}
.sales-cart-builder,
.sales-cart-summary { min-width: 0; }
.compact-form { margin-bottom: 0.9rem; }
.cart-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin: 0.9rem 0;
  padding: 0.8rem 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.cart-total span { color: var(--muted); font-weight: 700; }
.cart-total strong { font-size: 1.35rem; font-family: var(--num); color: var(--ink); }
.approval-cart-list, .om-admin-list { display: grid; gap: 0.9rem; }
.approval-cart-card {
  background: var(--surface);
  border: 1px solid var(--accent-border-soft);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: var(--shadow-sm);
}
.approval-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.approval-items { display: grid; gap: 0.55rem; margin: 0.8rem 0; }
.approval-line {
  display: grid;

/* ---------- Calculadora flutuante ---------- */
.calc-fab {
  position: fixed;
  right: clamp(1rem, 4vw, 1.4rem);
  bottom: clamp(1rem, 4vw, 1.4rem);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  z-index: 80;
  box-shadow: var(--shadow);
  padding: 0;
  font-size: 1.35rem;
}
.calc-floating-panel {
  position: fixed;
  right: clamp(1rem, 4vw, 1.4rem);
  bottom: calc(clamp(1rem, 4vw, 1.4rem) + 68px);
  width: min(380px, calc(100vw - 2rem));
  max-height: min(680px, calc(100vh - 7rem));
  overflow: auto;
  z-index: 79;
  background: var(--surface);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 0.9rem;
}
.calc-floating-panel[hidden] { display: none; }
.calc-floating-panel .calculator-page { display: block; }
.calc-floating-panel .three-columns { grid-template-columns: 1fr; }

/* No celular a bottom-nav ocupa a faixa inferior da tela: empurra a
   calculadora flutuante para cima dela, senão o botão redondo cobre o
   último item da barra (ex.: "Mais") e bloqueia o toque. */
@media (max-width: 720px) {
  .calc-fab {
    bottom: calc(64px + env(safe-area-inset-bottom, 0) + clamp(0.6rem, 3vw, 1rem));
  }
  .calc-floating-panel {
    bottom: calc(64px + env(safe-area-inset-bottom, 0) + clamp(0.6rem, 3vw, 1rem) + 68px);
  }
}
/* O sheet "Mais" (#moreMenu) e a calculadora flutuante disputam o mesmo
   canto inferior direito - com o sheet aberto, o botao redondo ficava por
   cima de itens do menu (ex.: "Metas"), competindo pelo toque. Escondida
   enquanto o sheet estiver aberto. */
body:has(#moreMenu:not([hidden])) .calc-fab,
body:has(#moreMenu:not([hidden])) .calc-floating-panel {
  display: none;
}
.calc-floating-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.65rem;
}
.calc-floating-head h2 { font-size: 1rem; }
.calc-floating-head button { min-height: 36px; }
.seller-permission-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 0.85rem;
}
.seller-ledger-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 0.85rem;
  margin-top: 0.9rem;
}
.seller-manage-panel {

  gap: 0.7rem;
  margin-top: 0.75rem;
  padding-top: 0.75rem;

}

.seller-manage-grid {

}

.order-draft-grid {

  gap: 0.85rem;

}
.order-draft-card { display: grid; gap: 0.4rem; }
.od-summary { margin: 0; font-weight: 650; }

.seller-permission-card {

}
.seller-permission-card label {

}

}

/* ---------- Ajustes operacionais compactos ---------- */

.app-header h1 { font-size: clamp(1.15rem, 2.6vw, 1.55rem); margin: 0; }
.header-actions button { min-height: 38px; padding: 0.55rem 0.75rem; }

.sales-cart-layout-modern { grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr); }
.cart-panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.cart-panel-head h3 { margin: 0; font-size: 1.05rem; }
.cart-panel-head p { margin: 0.18rem 0 0; color: var(--muted); font-size: 0.86rem; }
.cart-config-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0.55rem;
  margin-bottom: 0.8rem;
}
.cart-config-grid label { display: grid; gap: 0.25rem; font-size: 0.82rem; color: var(--muted); }
.cart-config-grid .wide { grid-column: 1 / -1; }
.cart-product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}
.cart-product-pick {
  min-height: 86px;
  display: grid;
  align-content: center;

}
.cart-product-pick:hover { border-color: var(--accent); background: #fff; transform: translateY(-1px); }
.cart-product-pick strong { font-size: 0.9rem; line-height: 1.15; }
.cart-product-pick span { color: var(--accent-deep); font-family: var(--num); font-weight: 800; }
.cart-product-pick small { color: var(--muted); font-size: 0.72rem; }
.cart-manual-add {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) 86px 104px auto;
  gap: 0.45rem;
  align-items: center;
}
.cart-draft-list { display: grid; gap: 0.5rem; }
.cart-draft-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto auto;
  gap: 0.55rem;
  align-items: center;
  padding: 0.6rem;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-soft);
}
.cart-draft-item span { display: block; color: var(--muted); font-size: 0.78rem; }
.cart-stepper { display: grid; grid-template-columns: 34px 72px 34px; gap: 0.25rem; align-items: center; }
.cart-stepper input { text-align: center; padding: 0.45rem 0.25rem; }
.cart-primary-actions { margin-top: 0.8rem; }
.sales-cart-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0.55rem;
  margin-bottom: 0.75rem;
}
.cart-saved-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 0.75rem; }
.cart-saved-card {
  display: grid;
  gap: 0.65rem;
  padding: 0.85rem;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}
.cart-saved-card header,
.cart-saved-card footer {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
}
.cart-saved-card header span { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 0.1rem; }
.cart-saved-card ul { list-style: none; display: grid; gap: 0.35rem; margin: 0; padding: 0; }
.cart-saved-card li { display: flex; justify-content: space-between; gap: 0.5rem; color: var(--muted); font-size: 0.86rem; }
.help-report-panel { display: grid; gap: 0.7rem; }
.help-report-panel label { display: grid; gap: 0.3rem; }
.help-report-panel textarea { min-height: 110px; }

/* Tipo de venda (segmented control) — topo do carrinho unificado */
.sale-type-switch {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem;
  margin-bottom: 0.85rem;
}
.sale-type-option {

}

.sale-type-option.active {
  border-color: var(--accent);

/* Esteira de pedidos (board) — cards agrupados por caixa */
.board-kanban { margin-top: 0.4rem; }
.board-card { display: grid; gap: 0.5rem; }
.board-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
.board-card-head strong { font-size: 0.92rem; }
.board-card-items { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.3rem; }
.board-card-items li { display: flex; justify-content: space-between; gap: 0.5rem; color: var(--muted); font-size: 0.84rem; }
.board-card-foot { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--line); padding-top: 0.4rem; }

.board-edit-line { display: grid; grid-template-columns: minmax(0, 1fr) 70px 84px; gap: 0.35rem; align-items: center; }

@media (max-width: 820px) {

/* ---------- Resumo operacional e edição rápida do carrinho ---------- */
.operations-snapshot {
  grid-column: 1 / -1;
  display: grid;
  gap: 0.8rem;
  padding: 1rem;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--surface) 0%, var(--accent-soft) 100%);
  box-shadow: var(--shadow-sm);
}
.operations-snapshot-head { display: flex; align-items: start; justify-content: space-between; gap: 0.75rem; }
.operations-snapshot-head span { color: var(--accent-deep); font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
.operations-snapshot-head h2 { margin: 0.18rem 0 0; font-size: 1.15rem; }
.operations-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.65rem; }
.operations-kpis article { display: grid; gap: 0.32rem; padding: 0.75rem; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface); }
.operations-kpis article.needs-attention { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.operations-kpis span { color: var(--muted); font-size: 0.72rem; font-weight: 750; letter-spacing: 0.05em; text-transform: uppercase; }
.operations-kpis strong { font-family: var(--num); font-size: 1.2rem; }
.operations-kpis small { color: var(--muted); min-height: 2.4em; }
.link-button { justify-self: start; padding: 0; min-height: 0; border: 0; color: var(--accent-deep); background: transparent; font-weight: 750; }
.link-button:hover { text-decoration: underline; background: transparent; }
.sales-trend-card { display: grid; grid-template-columns: minmax(180px, 0.7fr) minmax(240px, 1.3fr); gap: 1rem; align-items: end; padding: 0.8rem; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--line); }
.sales-trend-card h3, .sales-trend-card p { margin: 0; }
.sales-trend-card p { color: var(--muted); font-size: 0.84rem; margin-top: 0.25rem; }
.sales-bars { display: grid; grid-template-columns: repeat(7, 1fr); align-items: end; gap: 0.45rem; height: 118px; }
.sales-bar { display: grid; grid-template-rows: 1fr auto; gap: 0.25rem; height: 100%; align-items: end; text-align: center; }
.sales-bar i { width: 100%; min-height: 4px; border-radius: 6px 6px 2px 2px; background: var(--accent); }
.sales-bar span { color: var(--muted); font-size: 0.7rem; text-transform: capitalize; }
.cart-price-editor { display: grid; gap: 0.15rem; color: var(--muted); font-size: 0.72rem; font-weight: 700; }
.cart-price-editor input { width: 96px; padding: 0.38rem; text-align: right; }

@media (max-width: 820px) {
  .operations-kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }

}

}

  flex-wrap: wrap;
  gap: 0.4rem;
  border-bottom: 1px solid var(--line);
  padding-bottom: 0.6rem;
}
.cockpit-tab {
  padding: 0.5rem 0.85rem;

  border-radius: 999px;
  background: var(--surface-soft);

  font-weight: 700;
  font-size: 0.86rem;
  cursor: pointer;

  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};

  function uid(prefix) {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function today() {
    const date = new Date();
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function nowIso() {
    return new Date().toISOString();
  }

  function number(value, fallback = 0) {
    if (typeof value === 'number') return Number.isFinite(value) ? value : fallback;
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const normalized = text.includes(',')
      ? text.replace(/\s/g, '').replace(/\./g, '').replace(',', '.')
      : text.replace(/\s/g, '');
    const parsed = Number(normalized);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function percent(value) {
    return number(value) / 100;
  }

  function money(value) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(number(value));
  }

  function qty(value, unit) {
    const formatted = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 3 }).format(number(value));
    return unit ? `${formatted} ${unit}` : formatted;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function downloadBlob(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function downloadText(filename, text, mime = 'application/json') {
    downloadBlob(filename, new Blob([text], { type: mime }));
  }

  function formData(form) {
    return Object.fromEntries(new FormData(form).entries());
  }

  function sortByDateDesc(items, key = 'date') {
    return [...items].sort((a, b) => String(b[key] || '').localeCompare(String(a[key] || '')));
  }

  function findById(items, id) {
    return items.find((item) => item.id === id) || null;
  }

  function compact(value, fallback = '—') {
    return value === undefined || value === null || value === '' ? fallback : value;
  }

  function assertPositive(value, label) {
    if (number(value) <= 0) throw new Error(`${label} precisa ser maior que zero.`);
  }

  window.C360.utils = {
    uid,
    today,
    nowIso,
    number,
    percent,
    money,
    qty,
    escapeHtml,
    downloadBlob,
    downloadText,
    formData,
    sortByDateDesc,
    findById,
    compact,
    assertPositive,
  };
})();
</script>

  function camelToSnakeKey(key) {
    return String(key).replace(/[A-Z]/g, (letter) => `_${letter.toLowerCase()}`);
  }

  function snakeToCamelKey(key) {

  async function parseBodySafe(res) {
    const text = await res.text();

  function messageFromBody(body, status) {
    if (body && typeof body === 'object') {
      if (body.message) return body.message;
      if (body.error_description) return body.error_description;
      if (body.error) return body.error;
      if (body.msg) return body.msg;
    }
    if (typeof body === 'string' && body.trim()) return body;
    return `Erro ${status} ao comunicar com o servidor.`;
  }

  function buildError(body, status) {
    const error = new Error(messageFromBody(body, status));

    const headers = { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json', ...extra };
    if (session.accessToken) headers.Authorization = `Bearer ${session.accessToken}`;

    try {

  async function restRequest(path, { method = 'GET', headers = {}, body, allowRetry = true } = {}) {
    const res = await fetch(`${SUPABASE_URL}${path}`, {
      method,
      headers: baseHeaders(headers),
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });

    if (res.status === 401 && allowRetry) {
      const refreshed = await tryRefreshOnce();
      if (refreshed) return restRequest(path, { method, headers, body, allowRetry: false });
    }

    if (!res.ok) {
      const parsedBody = await parseBodySafe(res);
      throw buildError(parsedBody, res.status);

    const params = new URLSearchParams();
    Object.entries(query).forEach(([key, value]) => {

      if (key === '_order') {
        params.set('order', value);

      }
      if (key === '_select') {

      body: patch,
    });

  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const { uid, nowIso } = window.C360.utils;

  // ==========================================================================
  // C360.state — cache em memória alimentado por C360.api (Supabase), com
  // espelho em localStorage só para pintura instantânea no reload (a rede é
  // sempre a fonte de verdade assim que `refresh()` resolve).
  //
  // MIGRAÇÃO IMPORTANTE para quem integra com src/app.js: `add`, `addGlobal`,
  // `update` e `remove` agora são ASSÍNCRONOS (retornam Promise). Todo
  // call-site em app.js que hoje faz `const rec = C360.state.add(...)` de
  // forma síncrona precisa virar `async function renderX/addX() { ... const
  // rec = await C360.state.add(...); ... }`, e todo handler de formulário
  // (`form.addEventListener('submit', ...)`) precisa ser `async`. Ver
  // relatório do agente para a lista completa de pontos identificados em
  // src/app.js.
  //
  // Chaves do cache (getState()): igual ao shape antigo (schemaVersion 2)
  // MAIS: sellerPrices, sellerStock, salesGoals, goalsProgress, profile
  // (perfil do usuário logado, singular), profiles (array — todos os perfis
  // visíveis ao usuário atual: para admin, todo mundo do negócio; para
  // vendedor, só a própria linha) e sellers (alias de profiles filtrado por
  // role === 'vendedor' — src/sellerStock.js lê `getState().profiles`
  // diretamente, então os dois nomes precisam existir).
  // ==========================================================================

  const CACHE_KEY = 'controle360_cache_v1'; // novo espelho pós-refresh (fonte: rede)
  const LEGACY_STORAGE_KEY = 'controle360_multi_v2'; // formato antigo (100% localStorage, pré multi-usuário)

  const DEFAULT_SETTINGS = {
    productTypes: [
      { value: 'materia_prima', label: 'Matéria-prima' },
      { value: 'embalagem', label: 'Embalagem / vidro / rótulo / caixa' },
      { value: 'produto_final', label: 'Produto final produzido' },
      { value: 'mercadoria', label: 'Mercadoria comprada pronta' },
      { value: 'kit', label: 'Kit / composição' },
      { value: 'servico', label: 'Serviço sem estoque físico' },
    ],
    units: ['un', 'kg', 'g', 'l', 'ml', 'pct', 'cx', 'm', 'cm'],
    businessSegments: [
      'Essências aromáticas',
      'Alimentos / marmitas',
      'Revenda de mercadorias',
      'Consignado',
      'Serviços com materiais',
      'Outro',
    ],
    channels: ['Direto', 'WhatsApp', 'Instagram', 'Site', 'Marketplace', 'Consignado', 'Outro'],
    orderStatuses: [
      { value: 'pendente', label: 'Pendente' },
      { value: 'em_preparo', label: 'Em montagem' },
      { value: 'pronto', label: 'Pronto (caixa montada)' },
      { value: 'despachado', label: 'Despachado' },
      { value: 'concluido', label: 'Concluído' },
    ],
    taskStatuses: [
      { value: 'a_fazer', label: 'A fazer' },
      { value: 'fazendo', label: 'Fazendo' },
      { value: 'aguardando', label: 'Aguardando' },
      { value: 'feito', label: 'Feito' },
    ],
  };

  function emptyState() {
    return {
      meta: {
        schemaVersion: 2,
        createdAt: nowIso(),
        updatedAt: nowIso(),
      },
      activeBusinessId: null,
      settings: structuredClone(DEFAULT_SETTINGS),
      businesses: [],
      products: [],
      clients: [],
      suppliers: [],
      purchases: [],
      stockMovements: [],
      recipes: [],
      productions: [],
      sales: [],
      orders: [],
      consignments: [],
      consignmentEvents: [],
      tasks: [],
      // Novo (multi-usuário):
      sellerPrices: [],
      sellerStock: [],
      salesGoals: [],
      goalsProgress: [],
      sellerSettings: [],
      saleCarts: [],
      saleCartItems: [],
      // Fase 3 (conta corrente do vendedor):
      sellerAccountEntries: [],
      sellerPayments: [],
      financialEntries: [],
      // Fase 4 (devolução com status, desperdício, brinde):
      operationalMovements: [],
      // Rascunho de pedidos (bloco de notas, não mexe em estoque/financeiro):
      orderDrafts: [],
      profile: null,
      profiles: [],
      sellers: [],

  }

  function normalize(raw) {
    const base = emptyState();
    const state = { ...base, ...(raw || {}) };
    state.meta = { ...base.meta, ...(state.meta || {}) };
    state.settings = { ...base.settings, ...(state.settings || {}) };
    Object.keys(base).forEach((key) => {
      if (Array.isArray(base[key]) && !Array.isArray(state[key])) state[key] = [];
    });
    return state;
  }

  function load() {
    try {
      const stored = localStorage.getItem(CACHE_KEY);
      if (!stored) return emptyState();
      return normalize(JSON.parse(stored));
    } catch (error) {
      console.error('C360.state: erro ao carregar cache local.', error);
      return emptyState();
    }
  }

  let state = load();

  function getState() {
    return state;
  }

  function persistCacheMirror() {
    try {
      state.meta.updatedAt = nowIso();
      localStorage.setItem(CACHE_KEY, JSON.stringify(state));
    } catch (error) {
      console.error('C360.state: erro ao salvar cache local.', error);
    }
  }

  // Mantido por compatibilidade de nome (ver instrução de manter toda a API
  // antiga funcionando); agora só persiste o espelho de cache, não é mais a
  // fonte de verdade.
  function save() {
    persistCacheMirror();
  }

  function replaceState(nextState) {
    state = normalize(nextState);
    persistCacheMirror();
  }

  function reset() {
    state = emptyState();
    try {
      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
    } catch (error) {
      console.error('C360.state: erro ao limpar cache local.', error);
    }
  }

  function activeBusiness() {
    return state.businesses.find((business) => business.id === state.activeBusinessId) || null;
  }

  function ensureBusiness() {
    if (!state.activeBusinessId) {
      throw new Error('Cadastre ou selecione um negócio antes de lançar dados.');
    }
  }

  function byBusiness(collectionName) {
    const businessId = state.activeBusinessId;
    if (!businessId) return [];
    return (state[collectionName] || []).filter((item) => item.businessId === businessId);
  }

  function setActiveBusiness(id) {
    // Nota: no modelo multi-usuário cada perfil pertence a UM negócio só
    // (profiles.business_id), então isto deixa de escolher entre vários
    // negócios do mesmo usuário — vira essencialmente um no-op fora do valor
    // já vindo de profile.businessId. Mantido pela compatibilidade de API.
    state.activeBusinessId = id || null;
    persistCacheMirror();
  }

  function getCurrentUser() {
    return state.profile || null;
  }

  function isAdmin() {
    return !!(state.profile && state.profile.role === 'admin');
  }

  // ---------------------------------------------------------------------
  // camelCase <-> snake_case (independente do conversor de src/api.js — cada
  // arquivo só pode depender do que expõe publicamente, não de internals).
  // ---------------------------------------------------------------------
  function camelToSnakeKey(key) {
    return String(key).replace(/[A-Z]/g, (letter) => `_${letter.toLowerCase()}`);
  }

  function snakeToCamelKey(key) {
    return String(key).replace(/_([a-z0-9])/g, (_, char) => char.toUpperCase());
  }

  function toSnakeCasePayload(obj) {
    if (!obj || typeof obj !== 'object') return obj;
    const result = {};
    Object.entries(obj).forEach(([key, value]) => {
      result[camelToSnakeKey(key)] = value;
    });
    return result;
  }

  function toCamelCaseRow(row) {
    if (!row || typeof row !== 'object') return row;
    const result = {};
    Object.entries(row).forEach(([key, value]) => {
      result[snakeToCamelKey(key)] = value;
    });
    return result;
  }

  // ---------------------------------------------------------------------
  // Nome de coleção local (camelCase, shape antigo do app) <-> nome de
  // tabela real no Postgres (snake_case). Chamadores que já passam o nome de
  // tabela snake_case diretamente (ex.: src/sellerStock.js chamando
  // `state.add('consignment_events', ...)`) continuam funcionando porque
  // tableFor() devolve a própria string quando ela não é uma chave conhecida
  // do mapa (ou seja, já assume que é o nome real da tabela).
  // ---------------------------------------------------------------------
  const TABLE_BY_COLLECTION = {
    businesses: 'businesses',
    products: 'products',
    clients: 'clients',
    suppliers: 'suppliers',
    purchases: 'purchases',
    stockMovements: 'stock_movements',
    recipes: 'recipes',
    productions: 'productions',
    sales: 'sales',
    orders: 'orders',
    consignments: 'consignments',
    consignmentEvents: 'consignment_events',
    tasks: 'tasks',
    sellerPrices: 'seller_prices',
    sellerStock: 'seller_stock',
    salesGoals: 'sales_goals',
    sellerSettings: 'seller_settings',
    saleCarts: 'sale_carts',
    saleCartItems: 'sale_cart_items',
    sellerAccountEntries: 'seller_account_entries',
    sellerPayments: 'seller_payments',
    financialEntries: 'financial_entries',
    operationalMovements: 'operational_movements',
    orderDrafts: 'order_drafts',
    profiles: 'profiles',
  };

  function tableFor(collectionName) {
    return TABLE_BY_COLLECTION[collectionName] || collectionName;
  }

  // Acha a chave do cache (array) correspondente ao nome de coleção recebido,
  // aceitando tanto o nome "local" camelCase (ex.: 'stockMovements') quanto o
  // nome de tabela snake_case (ex.: 'stock_movements' / 'consignment_events').
  function cacheKeyFor(collectionName) {
    if (Array.isArray(state[collectionName])) return collectionName;
    const camel = snakeToCamelKey(collectionName);
    if (Array.isArray(state[camel])) return camel;
    return null;
  }

  // Coleções cujas linhas pertencem a um vendedor (seller_id NOT NULL/():
  // usado para auto-carimbar sellerId em add() quando quem está logado é
  // vendedor, do mesmo jeito que o add() síncrono antigo carimbava
  // businessId automaticamente.
  const SELLER_OWNED_COLLECTIONS = new Set(['clients', 'sales', 'orders', 'consignments', 'saleCarts', 'operationalMovements']);

  async function add(collectionName, payload) {
    ensureBusiness();
    const table = tableFor(collectionName);
    const stamped = { ...payload };
    if (stamped.businessId === undefined) stamped.businessId = state.activeBusinessId;
    const user = getCurrentUser();
    if (user && user.role === 'vendedor' && stamped.sellerId === undefined && SELLER_OWNED_COLLECTIONS.has(collectionName)) {
      stamped.sellerId = user.id;
    }
    const rawRow = await window.C360.api.insert(table, toSnakeCasePayload(stamped));
    const record = toCamelCaseRow(rawRow) || { id: uid(table), ...stamped };
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) state[cacheKey].push(record);
    persistCacheMirror();
    return record;
  }

  async function addGlobal(collectionName, payload) {
    const table = tableFor(collectionName);
    const rawRow = await window.C360.api.insert(table, toSnakeCasePayload(payload));
    const record = toCamelCaseRow(rawRow) || { id: uid(table), ...payload };
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) state[cacheKey].push(record);
    persistCacheMirror();
    return record;
  }

  async function update(collectionName, id, patch) {
    const table = tableFor(collectionName);
    const rawRow = await window.C360.api.update(table, id, toSnakeCasePayload(patch));
    const record = toCamelCaseRow(rawRow) || null;
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) {
      const list = state[cacheKey];
      const idx = list.findIndex((item) => item.id === id);
      const merged = record ? { ...(idx !== -1 ? list[idx] : {}), ...record } : { ...(idx !== -1 ? list[idx] : {}), ...patch, id };
      if (idx !== -1) list[idx] = merged;
      else list.push(merged);
    }
    if (state.profile && state.profile.id === id) {
      state.profile = { ...state.profile, ...(record || patch) };
    }
    persistCacheMirror();
    return record || { id, ...patch };
  }

  async function remove(collectionName, id) {
    const table = tableFor(collectionName);
    await window.C360.api.remove(table, id);
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) {
      const list = state[cacheKey];
      const idx = list.findIndex((item) => item.id === id);
      if (idx !== -1) list.splice(idx, 1);
    }
    persistCacheMirror();
  }

  // NOTA/gap de backend (ver relatório do agente): `stock_movements` está
  // descrito em docs/backend.md §6 como admin-only (única policy de RLS é
  // `stock_movements_all_admin`; não existe policy de INSERT para
  // vendedor). Se um vendedor chamar recordMovement() hoje, o PostgREST
  // devolve 401/permission denied — src/returns.js (recordDevolucao/
  // recordDesperdicio) depende deste método também para o fluxo do
  // vendedor, então esta é uma lacuna real a resolver no schema/RLS, não
  // algo que este arquivo possa contornar sozinho.
  async function recordMovement(payload) {
    ensureBusiness();
    const stamped = { ...payload };
    if (stamped.businessId === undefined) stamped.businessId = state.activeBusinessId;
    const rawRow = await window.C360.api.insert('stock_movements', toSnakeCasePayload(stamped));
    const record = toCamelCaseRow(rawRow) || { id: uid('mov'), ...stamped };
    state.stockMovements.push(record);
    persistCacheMirror();
    return record;
  }

  // ---------------------------------------------------------------------
  // refresh() — repovoa o cache a partir de C360.api, de acordo com o papel
  // do usuário logado.
  // ---------------------------------------------------------------------
  async function refreshAsAdmin(businessId) {
    const api = window.C360.api;
    const [
      businesses, products, clients, suppliers, purchases, stockMovements,
      recipes, productions, sales, orders, consignments, consignmentEvents, tasks,
      profiles, sellerPrices, sellerStock, sellerSettings, saleCarts, saleCartItems,
      sellerAccountEntries, sellerPayments, financialEntries, operationalMovements, orderDrafts,
    ] = await Promise.all([
      api.list('businesses', { id: businessId }),
      api.list('products', { business_id: businessId, _order: 'name.asc' }),
      api.list('clients', { business_id: businessId }),
      api.list('suppliers', { business_id: businessId }),
      api.list('purchases', { business_id: businessId }),
      api.list('stock_movements', { business_id: businessId }),
      api.list('recipes', { business_id: businessId }),
      api.list('productions', { business_id: businessId }),
      api.list('sales', { business_id: businessId }),
      api.list('orders', { business_id: businessId }),
      api.list('consignments', { business_id: businessId }),
      api.list('consignment_events', { business_id: businessId }),
      api.list('tasks', { business_id: businessId }),
      api.list('profiles', { business_id: businessId }),
      api.list('seller_prices', { business_id: businessId }),
      api.list('seller_stock', { business_id: businessId }),
      api.list('seller_settings', { business_id: businessId }),
      api.list('sale_carts', { business_id: businessId, _order: 'created_at.desc' }),

      api.list('seller_account_entries', { business_id: businessId, _order: 'created_at.desc' }),

      api.list('financial_entries', { business_id: businessId, _order: 'due_date.asc' }),
      api.list('operational_movements', { business_id: businessId, _order: 'created_at.desc' }),
      api.list('order_drafts', { business_id: businessId, _order: 'created_at.desc' }),
    ]);

    state.businesses = businesses.map(toCamelCaseRow);
    state.products = products.map(toCamelCaseRow);
    state.clients = clients.map(toCamelCaseRow);
    state.suppliers = suppliers.map(toCamelCaseRow);
    state.purchases = purchases.map(toCamelCaseRow);
    state.stockMovements = stockMovements.map(toCamelCaseRow);
    state.recipes = recipes.map(toCamelCaseRow);
    state.productions = productions.map(toCamelCaseRow);
    state.sales = sales.map(toCamelCaseRow);
    state.orders = orders.map(toCamelCaseRow);
    state.consignments = consignments.map(toCamelCaseRow);
    state.consignmentEvents = consignmentEvents.map(toCamelCaseRow);
    state.tasks = tasks.map(toCamelCaseRow);
    state.profiles = profiles.map(toCamelCaseRow);
    state.sellers = state.profiles.filter((profile) => profile.role === 'vendedor');
    state.sellerPrices = sellerPrices.map(toCamelCaseRow);
    state.sellerStock = sellerStock.map(toCamelCaseRow);
    state.sellerSettings = sellerSettings.map(toCamelCaseRow);
    state.saleCarts = saleCarts.map(toCamelCaseRow);
    state.saleCartItems = saleCartItems.map(toCamelCaseRow);
    state.sellerAccountEntries = sellerAccountEntries.map(toCamelCaseRow);
    state.sellerPayments = sellerPayments.map(toCamelCaseRow);
    state.financialEntries = financialEntries.map(toCamelCaseRow);
    state.operationalMovements = operationalMovements.map(toCamelCaseRow);
    state.orderDrafts = orderDrafts.map(toCamelCaseRow);

    const [salesGoals, goalsProgress] = await Promise.all([
      api.listSalesGoals(),
      api.listGoalsProgress(),
    ]);
    state.salesGoals = salesGoals;
    state.goalsProgress = goalsProgress;
  }

  async function refreshAsSeller(businessId, userId) {
    const api = window.C360.api;
    const [
      businesses, sellerProducts, clients, sales, orders, consignments,
      consignmentEvents, sellerPrices, sellerStock, sellerSettings, saleCarts, saleCartItems,
      sellerAccountEntries, sellerPayments, operationalMovements, orderDrafts,
    ] = await Promise.all([
      api.list('businesses', { id: businessId }),
      api.listSellerProducts(businessId),
      api.list('clients', { seller_id: userId }),
      api.list('sales', { seller_id: userId }),
      api.list('orders', { seller_id: userId }),
      api.list('consignments', { seller_id: userId }),
      api.list('consignment_events', { business_id: businessId }),
      api.listSellerPrices(userId),
      api.listSellerStock(userId),
      api.listSellerSettings({ sellerId: userId }),
      api.listSaleCarts({ seller_id: userId }),
      api.listSaleCartItems({ business_id: businessId }),
      api.list('seller_account_entries', { seller_id: userId, _order: 'created_at.desc' }),
      api.list('seller_payments', { seller_id: userId, _order: 'created_at.desc' }),
      api.list('operational_movements', { seller_id: userId, _order: 'created_at.desc' }),
      api.list('order_drafts', { created_by: userId, _order: 'created_at.desc' }),
    ]);

    state.businesses = businesses.map(toCamelCaseRow);
    state.products = sellerProducts; // já camelCase (seller_products, sem custo)
    state.clients = clients.map(toCamelCaseRow);
    state.sales = sales.map(toCamelCaseRow);
    state.orders = orders.map(toCamelCaseRow);
    state.consignments = consignments.map(toCamelCaseRow);
    state.consignmentEvents = consignmentEvents.map(toCamelCaseRow);
    state.sellerPrices = sellerPrices;
    state.sellerStock = sellerStock;
    state.sellerSettings = sellerSettings;
    state.saleCarts = saleCarts;
    state.saleCartItems = saleCartItems;
    state.sellerAccountEntries = sellerAccountEntries.map(toCamelCaseRow);
    state.sellerPayments = sellerPayments.map(toCamelCaseRow);
    state.financialEntries = [];
    state.operationalMovements = operationalMovements.map(toCamelCaseRow);
    state.orderDrafts = orderDrafts.map(toCamelCaseRow);

    // Tabelas admin-only (RLS devolveria [] mesmo se chamássemos): evitamos
    // o round-trip de rede e já deixamos vazio.
    state.suppliers = [];
    state.purchases = [];
    state.stockMovements = [];
    state.recipes = [];
    state.productions = [];
    state.tasks = [];
    state.profiles = [];
    state.sellers = [];

    const [salesGoals, goalsProgress] = await Promise.all([
      api.listSalesGoals({ sellerId: userId }),
      api.listGoalsProgress({ sellerId: userId }),
    ]);
    state.salesGoals = salesGoals;
    state.goalsProgress = goalsProgress;
  }

  async function refresh() {
    const api = window.C360.api;
    if (!api || typeof api.getCurrentAuthUserId !== 'function') return;

    const userId = api.getCurrentAuthUserId();
    if (!userId) return; // não autenticado; getState() segue servindo o cache atual

    const profile = await api.getProfile(userId);
    if (!profile) return;

    state.profile = profile;
    state.activeBusinessId = profile.businessId || null;

    if (!profile.businessId) {
      // Perfil provisionado sem negócio ainda (bootstrap pendente) — nada
      // mais para buscar além do próprio perfil.
      persistCacheMirror();
      return;
    }

    if (profile.role === 'admin') {
      await refreshAsAdmin(profile.businessId);
    } else {
      await refreshAsSeller(profile.businessId, userId);
    }

    persistCacheMirror();
  }

  window.C360.state = {
    DEFAULT_SETTINGS,
    getState,
    save,
    replaceState,
    reset,
    activeBusiness,
    ensureBusiness,
    byBusiness,
    add,
    addGlobal,
    update,
    remove,
    setActiveBusiness,
    recordMovement,
    getCurrentUser,
    isAdmin,
    refresh,
  };
})();
