  <style>
/* Controle360 Multi — interface operacional.
   Direção: ferramenta de trabalho calma e legível, mobile-first (a maioria dos
   vendedores usa no celular). Um único acento de cor para ação e dinheiro,
   números tabulares alinhados como assinatura (estoque e valores sempre
   "batem" coluna a coluna). Paleta configurável por tema — ver seção
   "Temas" logo abaixo do :root. */

:root {
  /* ---- Valores fixos (não variam por tema) ---- */
  --danger: #b3261e;
  --danger-soft: #fbe7e6;
  --danger-deep: #8f1e17;
  --success: #1f7a45;
  --success-soft: #e3f3ea;
  --warning: #9a5a08;
  --radius: 14px;
  --radius-sm: 10px;
  --num: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
}

/* ---------- Temas ----------
   Contrato para quem for ligar o seletor de tema (ver nota no relatório):
   - atributo: data-theme="ouro" | data-theme="classico" no <html> (ou <body>).
   - sem o atributo, o tema padrão é "ouro" (direção atual do produto).
   - trocar o atributo repinta o app inteiro: botões, badges, aba ativa,
     anéis de foco, cabeçalhos de coluna do kanban e barras de destaque
     usam só variáveis, não cores fixas. */

:root,
:root[data-theme="ouro"] {
  --bg: #f5efe1;
  --surface: #ffffff;
  --surface-soft: #faf5e8;
  --ink: #241d10;
  --text: #2b2417;
  --muted: #79705d;
  --line: #e7dec7;
  --line-strong: #d8c9a2;

  /* estrutura/"chrome": ouro pede tinta escura (quase preto/marrom) para contraste */
  --brand: #241d10;
  --brand-deep: #140f09;
  --brand-soft: #efe3c5;
  --brand-border-soft: #e2d3a4;
  --brand-soft-hover: #e8dcae;

  /* acento principal: ouro/dourado — botões, aba ativa, foco, destaques */
  --accent: #c9a227;
  --accent-deep: #8a6a12;
  --accent-soft: #f7ecc9;
  --accent-ink: #7a5e0a;
  --accent-border-soft: #ecd9a0;
  --accent-contrast: #241d10;

  --header-eyebrow: #e7cf8f;
  --header-subtitle: #ddc998;
  --ink-contrast: #f7f0df;
  --ink-contrast-soft: #ecdfb8;
  --bg-glow: rgba(120, 94, 20, 0.14);

  --focus-ring: rgba(184, 138, 20, 0.5);
  --focus-ring-soft: rgba(184, 138, 20, 0.18);

  --shadow: 0 12px 30px rgba(30, 22, 6, 0.16);
  --shadow-sm: 0 4px 14px rgba(30, 22, 6, 0.12);
}

:root[data-theme="classico"] {
  --bg: #eef2f1;
  --surface: #ffffff;
  --surface-soft: #f6f8f7;
  --ink: #14302f;
  --text: #1f2d2c;
  --muted: #5d6f6d;
  --line: #d8e1df;
  --line-strong: #c2cfcc;

  --brand: #0f6b62;
  --brand-deep: #0c4f49;
  --brand-soft: #e4efed;
  --brand-border-soft: #bfe0db;
  --brand-soft-hover: #d2e8e4;

  --accent: #c9610c;
  --accent-deep: #b3550a;
  --accent-soft: #fbeede;
  --accent-ink: #7a4406;
  --accent-border-soft: #f0d4b3;
  --accent-contrast: #ffffff;

  --header-eyebrow: #a9dcd5;
  --header-subtitle: #c4e7e2;
  --ink-contrast: #eafaf7;
  --ink-contrast-soft: #d8efea;
  --bg-glow: rgba(15, 107, 98, 0.1);

  --focus-ring: rgba(201, 97, 12, 0.45);
  --focus-ring-soft: rgba(201, 97, 12, 0.16);

  --shadow: 0 12px 30px rgba(12, 60, 56, 0.1);
  --shadow-sm: 0 4px 14px rgba(12, 60, 56, 0.07);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background:
    radial-gradient(1200px 480px at 100% -10%, var(--bg-glow), transparent 60%),
    var(--bg);
  color: var(--text);
  line-height: 1.5;
}

h1, h2, h3 { line-height: 1.18; margin: 0; color: var(--ink); letter-spacing: -0.01em; }
p { margin: 0; }

button, input, select, textarea { font: inherit; color: inherit; }

/* ---------- Botões ---------- */
/* min-height ~44px em qualquer largura: alvo de toque confortável no celular. */
button {
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-contrast);
  padding: 0.7rem 1.05rem;
  min-height: 44px;
  cursor: pointer;
  font-weight: 650;
  letter-spacing: 0.005em;
  transition: transform 0.04s ease, background-color 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}
button:hover { background: var(--accent-deep); }
button:active { transform: translateY(1px); }
button:disabled { opacity: 0.45; cursor: not-allowed; }

button.secondary {
  background: var(--brand);
  color: #fff;
}
button.secondary:hover { background: var(--brand-deep); }

button.ghost {
  background: transparent;
  color: var(--brand-deep);
  border-color: var(--line-strong);
}
button.ghost:hover { background: var(--brand-soft); border-color: var(--brand); }

button.danger { background: var(--danger); color: #fff; }
button.danger:hover { background: var(--danger-deep); }
button.danger.ghost { background: transparent; color: var(--danger); border-color: var(--danger-soft); }
button.danger.ghost:hover { background: var(--danger-soft); }

button.small { padding: 0.4rem 0.7rem; font-size: 0.85rem; border-radius: 8px; min-height: 36px; }

:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: 6px;
}

/* ---------- Cabeçalho ---------- */
/* Sticky só a partir do desktop (ver media query abaixo): no celular o
   cabeçalho fica alto (marca empilhada + botões de ação em largura total —
   Baixar Excel/Backup e exportação/Sair), e travá-lo no topo cobriria boa
   parte da tela o tempo todo durante a rolagem. */
.app-header {
  position: static;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.9rem;
  padding: 1.1rem clamp(1rem, 4vw, 2.4rem);
  background: linear-gradient(180deg, var(--brand-deep), var(--brand));
  color: var(--ink-contrast);
  box-shadow: var(--shadow-sm);
}
.app-header .brand p { color: var(--header-subtitle); max-width: 60ch; }
.app-header h1 {
  color: #ffffff;
  font-size: clamp(1.4rem, 3.4vw, 2rem);
  font-weight: 760;
  margin: 0.15rem 0 0.25rem;
}
.app-header h1 span { color: var(--accent-soft); font-weight: 760; }
.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 0.66rem;
  font-weight: 700;
  color: var(--header-eyebrow) !important;
}
.header-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; width: 100%; }
.header-actions[hidden] { display: none; }
.header-actions button { flex: 1 1 160px; }
.app-header button.secondary { background: var(--accent); color: var(--accent-contrast); }
.app-header button.secondary:hover { background: var(--accent-deep); }
.app-header button.ghost { color: var(--ink-contrast); border-color: rgba(255, 255, 255, 0.35); }
.app-header button.ghost:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255,255,255,0.6); }

/* Desktop: cabeçalho volta a ser uma única linha, texto à esquerda e ações à
   direita, e cabe travado no topo (sticky) sem atrapalhar o conteúdo. */
@media (min-width: 721px) {
  .app-header { position: sticky; top: 0; flex-direction: row; align-items: flex-end; justify-content: space-between; gap: 1.5rem; }
  .header-actions { width: auto; flex-wrap: nowrap; }
  .header-actions button { flex: 0 0 auto; }
}

/* ---------- Estrutura ---------- */
.app-shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(1rem, 3vw, 1.8rem) clamp(0.8rem, 4vw, 2.4rem) 4rem;
}

.business-bar {
  display: flex;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 0.85rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  box-shadow: var(--shadow-sm);
}
.business-bar > div { display: flex; flex-direction: column; gap: 0.3rem; flex: 1 1 240px; min-width: 0; }
.business-bar label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
.business-bar select { min-width: 200px; }
.business-bar button { flex: 1 1 auto; }

@media (max-width: 480px) {
  .business-bar select { min-width: 0; width: 100%; }
  .business-bar button { width: 100%; }
}

/* ---------- Dashboard ---------- */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0.7rem;
  margin: 1.1rem 0;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0.95rem 1.05rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--accent);
}
.metric-card span { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; }
.metric-card strong { font-size: 1.5rem; font-weight: 720; font-variant-numeric: tabular-nums; font-family: var(--num); color: var(--ink); }

@media (max-width: 400px) {
  /* 2 colunas em vez de empilhar tudo: no celular a rolagem até o conteúdo
     das abas fica bem mais curta com 6 métricas em 3 linhas em vez de 6. */
  .dashboard { grid-template-columns: repeat(2, 1fr); gap: 0.55rem; }
  .metric-card { padding: 0.8rem 0.85rem; }
  .metric-card strong { font-size: 1.15rem; }
}

/* ---------- Abas ---------- */
/* Nota de correção: .tabs NÃO fica sticky (era `position: sticky; top: 0`
   igual ao .app-header, que também é sticky top:0 — dois elementos presos
   no mesmo topo se sobrepõem, e o cabeçalho (z-index maior) acaba cobrindo
   as abas assim que a rolagem prende os dois ao mesmo tempo). Sem medir a
   altura real do cabeçalho (variável: 1 ou 2 linhas conforme a largura) não
   dá para travar as abas exatamente abaixo dele só com CSS, então a rolagem
   normal é o comportamento seguro. Mais abas virão (Vendedores, Aprovações,
   Metas, Ajuda, Calculadora...), por isso a barra rola horizontalmente e
   nunca quebra o layout. */
.tabs {
  display: flex;
  gap: 0.3rem;
  margin: 1.1rem 0 1.2rem;
  padding: 0.35rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  box-shadow: var(--shadow-sm);
}
.tabs::-webkit-scrollbar { height: 6px; }
.tabs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
.tab-button {
  background: transparent;
  color: var(--muted);
  border: 0;
  padding: 0.6rem 1rem;
  min-height: 44px;
  border-radius: 999px;
  font-weight: 650;
  white-space: nowrap;
  flex: 0 0 auto;
}
.tab-button:hover { background: var(--brand-soft); color: var(--brand-deep); }
.tab-button.active { background: var(--accent); color: var(--accent-contrast); }

/* ---------- Seções ---------- */
.view { display: block; }
.section-head {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}
.section-head h2 { font-size: 1.3rem; font-weight: 720; }
.section-head p { color: var(--muted); margin-top: 0.25rem; max-width: 72ch; }

@media (min-width: 721px) {
  .section-head { flex-direction: row; justify-content: space-between; align-items: flex-start; gap: 1rem; }
}

/* ---------- Formulários ---------- */
.grid-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.85rem 1rem;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.15rem;
  margin-bottom: 1.4rem;
  box-shadow: var(--shadow-sm);
}
.grid-form label {
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  font-weight: 650;
  font-size: 0.86rem;
  color: var(--ink);
}
.grid-form label.full,
.grid-form label.wide { grid-column: 1 / -1; }
.grid-form label span {
  font-weight: 500;
  font-size: 0.76rem;
  color: var(--muted);
}
.grid-form button[type="submit"] {
  grid-column: 1 / -1;
  justify-self: start;
  padding: 0.78rem 1.5rem;
  width: 100%;
}

@media (min-width: 481px) {
  .grid-form button[type="submit"] { width: auto; }
}

/* Formulário empilhado (uma coluna): usado em painéis menores (ficha
   técnica, simulador de custo, devolução/desperdício) em vez do grid de
   múltiplas colunas do .grid-form. */
.stack-form {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.stack-form label {
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  font-weight: 650;
  font-size: 0.86rem;
  color: var(--ink);
}
.stack-form button[type="submit"] { width: 100%; }
@media (min-width: 481px) {
  .stack-form button[type="submit"] { width: auto; align-self: flex-start; }
}

/* Duas colunas lado a lado (Fichas técnicas, Preços) — empilha em telas
   estreitas, igual ao .three-columns já usado em Relatórios. */
.two-columns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
  margin-bottom: 1.1rem;
  align-items: start;
}
.two-columns .panel-card { margin-top: 0; }

input, select, textarea {
  width: 100%;
  background: var(--surface-soft);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.7rem;
  min-height: 44px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--focus-ring-soft);
}
textarea { min-height: 76px; resize: vertical; }
input[type="number"] { font-variant-numeric: tabular-nums; font-family: var(--num); }

/* ---------- Tabelas ---------- */
/* Estratégia mobile: rolagem horizontal dentro de .table-wrap (sem exigir
   mudança de marcação em src/ui.js) + primeira coluna fixada (sticky) para
   manter a identificação da linha (nome/id) visível enquanto o resto da
   tabela rola por baixo. Sombras de rolagem (gradiente) sinalizam que há
   mais colunas fora da tela. */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  background-image:
    linear-gradient(to right, var(--surface) 0%, rgba(255, 255, 255, 0) 100%),
    linear-gradient(to left, var(--surface) 0%, rgba(255, 255, 255, 0) 100%),
    linear-gradient(to right, rgba(20, 16, 8, 0.12), rgba(20, 16, 8, 0) 100%),
    linear-gradient(to left, rgba(20, 16, 8, 0.12), rgba(20, 16, 8, 0) 100%);
  background-repeat: no-repeat;
  background-size: 24px 100%, 24px 100%, 10px 100%, 10px 100%;
  background-position: left, right, left, right;
  background-attachment: local, local, scroll, scroll;
}
table { width: 100%; border-collapse: collapse; min-width: 540px; }
thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  text-align: left;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  background: var(--surface-soft);
  padding: 0.7rem 0.85rem;
  border-bottom: 2px solid var(--line);
  white-space: nowrap;
}
tbody td {
  padding: 0.65rem 0.85rem;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  font-size: 0.92rem;
}
tbody tr:nth-child(even) td { background: rgba(15, 107, 98, 0.025); }
tbody tr:hover td { background: var(--brand-soft); }
tbody td strong { font-variant-numeric: tabular-nums; font-family: var(--num); font-weight: 650; }
table .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

/* Primeira coluna fixa (nome/id) ao rolar na horizontal — só entra em jogo
   em telas estreitas, onde a tabela realmente precisa rolar. */
@media (max-width: 720px) {
  .table-wrap table th:first-child,
  .table-wrap table td:first-child {
    position: sticky;
    left: 0;
    z-index: 1;
    background: var(--surface);
    box-shadow: 1px 0 0 var(--line);
  }
  .table-wrap table thead th:first-child { z-index: 3; }
}

/* ---------- Badges ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.12rem 0.5rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  background: var(--brand-soft);
  color: var(--brand-deep);
  white-space: nowrap;
}
.badge.ok { background: var(--success-soft); color: var(--success); }
.badge.warn { background: var(--accent-soft); color: var(--accent-ink); }

/* ---------- Avisos ---------- */
.notice {
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  font-size: 0.9rem;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  margin-bottom: 1rem;
}
.notice.warning { background: var(--accent-soft); border-color: var(--accent-border-soft); color: var(--accent-ink); }
.notice.info { background: var(--brand-soft); border-color: var(--brand-border-soft); color: var(--brand-deep); }
.notice.success { background: var(--success-soft); border-color: #c2e4cf; color: var(--success); }
.notice.error { background: var(--danger-soft); border-color: #f0c5c2; color: var(--danger); }

/* ---------- Estado vazio ---------- */
.empty-state {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  align-items: flex-start;
  padding: 2rem 1.4rem;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface-soft);
  color: var(--muted);
}
.empty-state strong { color: var(--ink); font-size: 1.02rem; }

/* ---------- Cartões e colunas ---------- */
.panel-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.1rem;
  box-shadow: var(--shadow-sm);
  margin-top: 1.1rem;
}
.panel-card h3 { font-size: 1rem; margin-bottom: 0.75rem; }
.three-columns {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}
.three-columns .panel-card { margin-top: 0; }

/* ---------- Caixa de custo ---------- */
.cost-box {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.7rem;
  margin-top: 1rem;
}
.cost-item {
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 0.75rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.cost-item span { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }

(function () {
  'use strict';

  window.C360 = window.C360 || {};

  function uid(prefix) {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function today() {
    const date = new Date();
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function nowIso() {
    return new Date().toISOString();
  }

  function number(value, fallback = 0) {
    if (typeof value === 'number') return Number.isFinite(value) ? value : fallback;
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const normalized = text.includes(',')
      ? text.replace(/\s/g, '').replace(/\./g, '').replace(',', '.')
      : text.replace(/\s/g, '');
    const parsed = Number(normalized);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function percent(value) {
    return number(value) / 100;
  }

  function money(value) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(number(value));
  }

  function qty(value, unit) {
    const formatted = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 3 }).format(number(value));
    return unit ? `${formatted} ${unit}` : formatted;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function downloadBlob(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function downloadText(filename, text, mime = 'application/json') {
    downloadBlob(filename, new Blob([text], { type: mime }));
  }

  function formData(form) {
    return Object.fromEntries(new FormData(form).entries());
  }

  function sortByDateDesc(items, key = 'date') {
    return [...items].sort((a, b) => String(b[key] || '').localeCompare(String(a[key] || '')));
  }

  function findById(items, id) {
    return items.find((item) => item.id === id) || null;
  }

  function compact(value, fallback = '—') {
    return value === undefined || value === null || value === '' ? fallback : value;
  }

  function assertPositive(value, label) {
    if (number(value) <= 0) throw new Error(`${label} precisa ser maior que zero.`);
  }

  window.C360.utils = {
    uid,
    today,
    nowIso,
    number,
    percent,
    money,
    qty,
    escapeHtml,
    downloadBlob,
    downloadText,
    formData,
    sortByDateDesc,
    findById,
    compact,
    assertPositive,
  };
})();
</script>

  // camelCase <-> snake_case
  // ---------------------------------------------------------------------
  function camelToSnakeKey(key) {
    return String(key).replace(/[A-Z]/g, (letter) => `_${letter.toLowerCase()}`);
  }

  function snakeToCamelKey(key) {
    return String(key).replace(/_([a-z0-9])/g, (_, char) => char.toUpperCase());
  }

  function mapKeys(obj, keyFn) {
    if (!obj || typeof obj !== 'object') return obj;
    const result = {};
    Object.entries(obj).forEach(([key, value]) => {
      result[keyFn(key)] = value;
    });
    return result;
  }

  // ---------------------------------------------------------------------
  // Erros: sempre Error com .status; mensagem = campo de erro do PostgREST/
  // GoTrue/Edge Function quando existir.
  // ---------------------------------------------------------------------
  async function parseBodySafe(res) {
    const text = await res.text();
    if (!text) return null;
    try {
      return JSON.parse(text);
    } catch (error) {
      return text;
    }
  }

  function messageFromBody(body, status) {
    if (body && typeof body === 'object') {
      if (body.message) return body.message;
      if (body.error_description) return body.error_description;
      if (body.error) return body.error;
      if (body.msg) return body.msg;
    }
    if (typeof body === 'string' && body.trim()) return body;
    return `Erro ${status} ao comunicar com o servidor.`;
  }

  function buildError(body, status) {
    const error = new Error(messageFromBody(body, status));
    error.status = status;
    error.body = body;
    return error;
  }

  // ---------------------------------------------------------------------
  // Fetch helpers
  // ---------------------------------------------------------------------
  function baseHeaders(extra = {}) {
    const headers = { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json', ...extra };
    if (session.accessToken) headers.Authorization = `Bearer ${session.accessToken}`;
    return headers;
  }

  async function tryRefreshOnce() {
    if (!session.refreshToken) return false;
    try {
      await refreshSession(session.refreshToken);
      return true;
    } catch (error) {
      return false;
    }
  }

  // requisição autenticada a PostgREST (rest/v1/...). Em 401, tenta renovar a
  // sessão UMA vez com o refresh_token guardado e repete a chamada original.
  async function restRequest(path, { method = 'GET', headers = {}, body, allowRetry = true } = {}) {
    const res = await fetch(`${SUPABASE_URL}${path}`, {
      method,
      headers: baseHeaders(headers),
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });

    if (res.status === 401 && allowRetry) {
      const refreshed = await tryRefreshOnce();
      if (refreshed) {
        return restRequest(path, { method, headers, body, allowRetry: false });
      }
    }

    if (!res.ok) {
      const parsedBody = await parseBodySafe(res);
      throw buildError(parsedBody, res.status);
    }

    if (res.status === 204) return null;
    return parseBodySafe(res);
  }

  // ---------------------------------------------------------------------
  // Query string para list(): eq simples por coluna + `_order`/`_select`
  // reservados. Chaves camelCase são convertidas para snake_case (ver nota
  // de reconciliação no topo do arquivo).
  // ---------------------------------------------------------------------
  function buildQueryString(query = {}) {
    const params = new URLSearchParams();
    Object.entries(query).forEach(([key, value]) => {
      if (value === undefined || value === null) return;
      if (key === '_order') {
        params.set('order', value);
        return;
      }
      if (key === '_select') {
        params.set('select', value);
        return;
      }
      params.set(camelToSnakeKey(key), `eq.${value}`);
    });
    return params.toString();
  }

  // ---------------------------------------------------------------------
  // CRUD genérico (passthrough snake_case)
  // ---------------------------------------------------------------------
  async function list(table, query = {}) {
    const qs = buildQueryString(query);
    const rows = await restRequest(`/rest/v1/${table}${qs ? `?${qs}` : ''}`, { method: 'GET' });
    return Array.isArray(rows) ? rows : [];
  }

  async function insert(table, payload) {
    const result = await restRequest(`/rest/v1/${table}`, {
      method: 'POST',
      headers: { Prefer: 'return=representation' },
      body: payload,
    });
    return Array.isArray(result) ? result[0] : result;
  }

  async function update(table, id, patch) {
    const result = await restRequest(`/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { Prefer: 'return=representation' },
      body: patch,
    });
    return Array.isArray(result) ? result[0] : result;
  }

  async function remove(table, id) {
    await restRequest(`/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: { Prefer: 'return=minimal' },
    });
  }

  // Upsert por (seller_id, product_id) — usado por setSellerPrice/setSellerStock.
  async function upsert(table, payload, conflictColumns) {
    const result = await restRequest(`/rest/v1/${table}?on_conflict=${conflictColumns}`, {
      method: 'POST',
      headers: { Prefer: 'return=representation,resolution=merge-duplicates' },
      body: payload,
    });
    return Array.isArray(result) ? result[0] : result;
  }

  // ---------------------------------------------------------------------
  // Auth (GoTrue)
  // ---------------------------------------------------------------------
  async function authPost(path, body, extraHeaders = {}) {
    const res = await fetch(`${SUPABASE_URL}${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json', ...extraHeaders },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    const parsed = await parseBodySafe(res);
    if (!res.ok) throw buildError(parsed, res.status);

  }

  function applySession(raw) {
    session.accessToken = raw.access_token || null;
    session.refreshToken = raw.refresh_token || null;
    session.expiresAt = raw.expires_at != null ? raw.expires_at : null;
    session.userId = raw.user && raw.user.id ? raw.user.id : null;
    return {
      accessToken: session.accessToken,
      refreshToken: session.refreshToken,
      expiresAt: session.expiresAt,
      user: raw.user ? { id: raw.user.id, email: raw.user.email } : null,
    };
  }

  async function signInWithPassword(email, password) {
    const raw = await authPost('/auth/v1/token?grant_type=password', { email, password });
    return applySession(raw);
  }

  async function refreshSession(refreshToken) {
    const raw = await authPost('/auth/v1/token?grant_type=refresh_token', { refresh_token: refreshToken });
    return applySession(raw);
  }

  async function signOut(accessToken) {
    const token = accessToken || session.accessToken;
    try {
      if (token) {
        await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
          method: 'POST',
          headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` },
        });
      }
    } finally {
      session.accessToken = null;
      session.refreshToken = null;
      session.expiresAt = null;
      session.userId = null;
    }
  }

  async function getAuthUser(accessToken) {
    const token = accessToken || session.accessToken;
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token || ''}` },
    });
    const parsed = await parseBodySafe(res);

  // que src/state.js saiba QUEM é o usuário logado sem que api.js precise
  // vazar o access_token para fora de si mesmo (ver comentário em src/auth.js
  // sobre essa premissa). Ver relatório do agente.
  function getCurrentAuthUserId() {
    return session.userId;
  }

  async function currentBusinessId() {
    if (!session.userId) return null;
    const profile = await getProfile(session.userId);
    return profile ? profile.businessId : null;
  }

  // ---------------------------------------------------------------------
  // profiles / seller management
  // ---------------------------------------------------------------------
  async function getProfile(userId) {
    const rows = await list('profiles', { id: userId });
    const row = rows[0];
    if (!row) return null;
    return {
      id: row.id,
      role: row.role,
      name: row.name,
      businessId: row.business_id,
      active: row.active,
    };
  }

  async function createSeller({ email, password, name }) {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-seller`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        Authorization: `Bearer ${session.accessToken || ''}`,
      },
      body: JSON.stringify({ email, password, name }),
    });
    const parsed = await parseBodySafe(res);
    if (!res.ok) throw buildError(parsed, res.status);
    return {
      id: parsed.id,
      email: parsed.email,
      name: parsed.name,
      role: parsed.role,
      businessId: parsed.business_id,

  // auth.users, que não é exposto via PostgREST para anon/authenticated).
  // `email` volta null aqui — src/auth.js já trata isso com fallback '—' na

  async function listSellers() {
    const rows = await list('profiles', { role: 'vendedor', _order: 'name.asc' });
    return rows.map((row) => ({ id: row.id, name: row.name, active: row.active, email: null }));
  }

  // ---------------------------------------------------------------------
  // Produtos (view seller_products para vendedor / tabela products p/ admin
  // já é acessada via list('products', ...) genérico pelo state.js; este
  // helper nomeado serve o catálogo do vendedor com mapeamento camelCase).
  // ---------------------------------------------------------------------
  function mapProductRow(row) {
    return {
      id: row.id,
      businessId: row.business_id,
      name: row.name,
      type: row.type,
      unit: row.unit,
      currentStock: row.current_stock,
      salePrice: row.sale_price,
      defaultPrice: row.default_price,
      priceFloor: row.price_floor,
      minStock: row.min_stock,
      notes: row.notes,
      avgCost: row.avg_cost,
      laborCostPerUnit: row.labor_cost_per_unit,
      overheadCostPerUnit: row.overhead_cost_per_unit,
      lossPercent: row.loss_percent,
      targetMarginPercent: row.target_margin_percent,
      taxFeePercent: row.tax_fee_percent,
      createdAt: row.created_at,
      updatedAt: row.updated_at,
    };
  }

  async function listSellerProducts(businessId) {
    const rows = await list('seller_products', { business_id: businessId, _order: 'name.asc' });
    return rows.map(mapProductRow);
  }

  // ---------------------------------------------------------------------
  // seller_prices / seller_stock (camelCase in/out, upsert por par único)
  // ---------------------------------------------------------------------
  async function listSellerPrices(sellerId) {
    const rows = await list('seller_prices', { seller_id: sellerId });
    return rows.map((row) => ({
      id: row.id,
      businessId: row.business_id,
      sellerId: row.seller_id,
      productId: row.product_id,
      price: row.price,
      floor: row.floor,
      createdAt: row.created_at,
      updatedAt: row.updated_at,
    }));
  }

  async function setSellerPrice({ sellerId, productId, price, floor }) {
    const businessId = await currentBusinessId();
    const payload = {
      business_id: businessId,
      seller_id: sellerId,
      product_id: productId,
      price: price === undefined ? null : price,
      floor: floor === undefined ? null : floor,
    };
    const row = await upsert('seller_prices', payload, 'seller_id,product_id');
    if (!row) return null;
    return {
      id: row.id,
      businessId: row.business_id,
      sellerId: row.seller_id,
      productId: row.product_id,
      price: row.price,
      floor: row.floor,
    };
  }

  async function listSellerStock(sellerId) {
    const rows = await list('seller_stock', { seller_id: sellerId });
    return rows.map((row) => ({
      id: row.id,
      businessId: row.business_id,
      sellerId: row.seller_id,
      productId: row.product_id,
      quantity: row.quantity,
    }));
  }

  async function setSellerStock({ sellerId, productId, quantity }) {
    const businessId = await currentBusinessId();
    const payload = {
      business_id: businessId,
      seller_id: sellerId,
      product_id: productId,
      quantity: quantity === undefined ? 0 : quantity,
    };
    const row = await upsert('seller_stock', payload, 'seller_id,product_id');
    if (!row) return null;
    return {
      id: row.id,
      businessId: row.business_id,
      sellerId: row.seller_id,
      productId: row.product_id,
      quantity: row.quantity,
    };
  }

  // ---------------------------------------------------------------------
  // Metas de vendas — snake_case puro (ver nota de reconciliação no topo:
  // src/goals.js já foi escrito lendo/gravando os nomes de coluna crus).
  // ---------------------------------------------------------------------
  async function listSalesGoals(params = {}) {
    const query = { _order: 'period_start.desc' };
    if (params.sellerId) {
      query.seller_id = params.sellerId;
    } else {
      const businessId = await currentBusinessId();
      if (businessId) query.business_id = businessId;
    }
    return list('sales_goals', query);
  }

  async function listGoalsProgress(params = {}) {
    const query = {};
    if (params.sellerId) {
      query.seller_id = params.sellerId;
    } else {
      const businessId = await currentBusinessId();
      if (businessId) query.business_id = businessId;
    }
    return list('sales_goals_progress', query);
  }

  async function createSalesGoal(payload) {
    const businessId = await currentBusinessId();
    return insert('sales_goals', { business_id: businessId, ...payload });
  }

  async function updateSalesGoal(id, patch) {
    return update('sales_goals', id, patch);
  }

  async function deleteSalesGoal(id) {
    return remove('sales_goals', id);
  }

  // ---------------------------------------------------------------------
  // Aprovação de pedidos (admin only — RLS/trigger barram vendedor)
  // ---------------------------------------------------------------------
  async function approveOrder(id) {
    return update('orders', id, { approval_status: 'aprovado' });
  }

  async function rejectOrder(id) {
    return update('orders', id, { approval_status: 'rejeitado' });
  }

  window.C360.api = {
    list,
    insert,
    update,
    remove,

    signInWithPassword,
    refreshSession,
    signOut,
    getAuthUser,
    getProfile,
    createSeller,

    listSellers,
    listSellerProducts,
    listSellerPrices,
    setSellerPrice,
    listSellerStock,
    setSellerStock,
    listSalesGoals,
    listGoalsProgress,
    createSalesGoal,
    updateSalesGoal,
    deleteSalesGoal,
    approveOrder,
    rejectOrder,

    // Extra (fora do contrato literal, necessária para state.js — ver relatório).
    getCurrentAuthUserId,
  };
})();

  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const { uid, nowIso } = window.C360.utils;

  // ==========================================================================
  // C360.state — cache em memória alimentado por C360.api (Supabase), com
  // espelho em localStorage só para pintura instantânea no reload (a rede é
  // sempre a fonte de verdade assim que `refresh()` resolve).
  //
  // MIGRAÇÃO IMPORTANTE para quem integra com src/app.js: `add`, `addGlobal`,
  // `update` e `remove` agora são ASSÍNCRONOS (retornam Promise). Todo
  // call-site em app.js que hoje faz `const rec = C360.state.add(...)` de
  // forma síncrona precisa virar `async function renderX/addX() { ... const
  // rec = await C360.state.add(...); ... }`, e todo handler de formulário
  // (`form.addEventListener('submit', ...)`) precisa ser `async`. Ver
  // relatório do agente para a lista completa de pontos identificados em

  //
  // Chaves do cache (getState()): igual ao shape antigo (schemaVersion 2)
  // MAIS: sellerPrices, sellerStock, salesGoals, goalsProgress, profile

  // vendedor, só a própria linha) e sellers (alias de profiles filtrado por
  // role === 'vendedor' — src/sellerStock.js lê `getState().profiles`
  // diretamente, então os dois nomes precisam existir).
  // ==========================================================================

  const CACHE_KEY = 'controle360_cache_v1'; // novo espelho pós-refresh (fonte: rede)
  const LEGACY_STORAGE_KEY = 'controle360_multi_v2'; // formato antigo (100% localStorage, pré multi-usuário)

  const DEFAULT_SETTINGS = {
    productTypes: [
      { value: 'materia_prima', label: 'Matéria-prima' },
      { value: 'embalagem', label: 'Embalagem / vidro / rótulo / caixa' },
      { value: 'produto_final', label: 'Produto final produzido' },
      { value: 'mercadoria', label: 'Mercadoria comprada pronta' },
      { value: 'kit', label: 'Kit / composição' },
      { value: 'servico', label: 'Serviço sem estoque físico' },
    ],
    units: ['un', 'kg', 'g', 'l', 'ml', 'pct', 'cx', 'm', 'cm'],
    businessSegments: [
      'Essências aromáticas',
      'Alimentos / marmitas',
      'Revenda de mercadorias',
      'Consignado',
      'Serviços com materiais',
      'Outro',
    ],
    channels: ['Direto', 'WhatsApp', 'Instagram', 'Site', 'Marketplace', 'Consignado', 'Outro'],
    orderStatuses: [
      { value: 'pendente', label: 'Pendente' },
      { value: 'em_preparo', label: 'Em preparo' },
      { value: 'pronto', label: 'Pronto' },
      { value: 'despachado', label: 'Despachado' },
      { value: 'concluido', label: 'Concluído' },

        createdAt: nowIso(),
        updatedAt: nowIso(),

      activeBusinessId: null,

      businesses: [],
      products: [],
      clients: [],
      suppliers: [],
      purchases: [],
      stockMovements: [],
      recipes: [],
      productions: [],

      consignments: [],

    Object.keys(base).forEach((key) => {

  function getState() {
    return state;
  }

  function persistCacheMirror() {

  function replaceState(nextState) {

  function activeBusiness() {
    return state.businesses.find((business) => business.id === state.activeBusinessId) || null;
  }

  function ensureBusiness() {
    if (!state.activeBusinessId) {
      throw new Error('Cadastre ou selecione um negócio antes de lançar dados.');
    }
  }

  function byBusiness(collectionName) {
    const businessId = state.activeBusinessId;
    if (!businessId) return [];

  // ---------------------------------------------------------------------
  // camelCase <-> snake_case (independente do conversor de src/api.js — cada

  // ---------------------------------------------------------------------
  function camelToSnakeKey(key) {
    return String(key).replace(/[A-Z]/g, (letter) => `_${letter.toLowerCase()}`);
  }

  function snakeToCamelKey(key) {
    return String(key).replace(/_([a-z0-9])/g, (_, char) => char.toUpperCase());
  }

  function toSnakeCasePayload(obj) {
    if (!obj || typeof obj !== 'object') return obj;
    const result = {};
    Object.entries(obj).forEach(([key, value]) => {

    return result;

  function toCamelCaseRow(row) {

    const result = {};

  // do mapa (ou seja, já assume que é o nome real da tabela).
  // ---------------------------------------------------------------------
  const TABLE_BY_COLLECTION = {
    businesses: 'businesses',
    products: 'products',
    clients: 'clients',
    suppliers: 'suppliers',
    purchases: 'purchases',
    stockMovements: 'stock_movements',
    recipes: 'recipes',
    productions: 'productions',
    sales: 'sales',
    orders: 'orders',
    consignments: 'consignments',
    consignmentEvents: 'consignment_events',
    tasks: 'tasks',
    sellerPrices: 'seller_prices',
    sellerStock: 'seller_stock',
    salesGoals: 'sales_goals',
    profiles: 'profiles',
  };

  function tableFor(collectionName) {
    return TABLE_BY_COLLECTION[collectionName] || collectionName;

  // Acha a chave do cache (array) correspondente ao nome de coleção recebido,
  // aceitando tanto o nome "local" camelCase (ex.: 'stockMovements') quanto o

  function cacheKeyFor(collectionName) {
    if (Array.isArray(state[collectionName])) return collectionName;
    const camel = snakeToCamelKey(collectionName);
    if (Array.isArray(state[camel])) return camel;
    return null;
  }

  // Coleções cujas linhas pertencem a um vendedor (seller_id NOT NULL/():
  // usado para auto-carimbar sellerId em add() quando quem está logado é
  // vendedor, do mesmo jeito que o add() síncrono antigo carimbava
  // businessId automaticamente.
  const SELLER_OWNED_COLLECTIONS = new Set(['clients', 'sales', 'orders', 'consignments']);

  async function add(collectionName, payload) {
    ensureBusiness();
    const table = tableFor(collectionName);
    const stamped = { ...payload };
    if (stamped.businessId === undefined) stamped.businessId = state.activeBusinessId;
    const user = getCurrentUser();
    if (user && user.role === 'vendedor' && stamped.sellerId === undefined && SELLER_OWNED_COLLECTIONS.has(collectionName)) {
      stamped.sellerId = user.id;
    }
    const rawRow = await window.C360.api.insert(table, toSnakeCasePayload(stamped));
    const record = toCamelCaseRow(rawRow) || { id: uid(table), ...stamped };
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) state[cacheKey].push(record);
    persistCacheMirror();
    return record;
  }

  async function addGlobal(collectionName, payload) {
    const table = tableFor(collectionName);
    const rawRow = await window.C360.api.insert(table, toSnakeCasePayload(payload));
    const record = toCamelCaseRow(rawRow) || { id: uid(table), ...payload };
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) state[cacheKey].push(record);
    persistCacheMirror();
    return record;
  }

  async function update(collectionName, id, patch) {
    const table = tableFor(collectionName);
    const rawRow = await window.C360.api.update(table, id, toSnakeCasePayload(patch));
    const record = toCamelCaseRow(rawRow) || null;
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) {
      const list = state[cacheKey];
      const idx = list.findIndex((item) => item.id === id);
      const merged = record ? { ...(idx !== -1 ? list[idx] : {}), ...record } : { ...(idx !== -1 ? list[idx] : {}), ...patch, id };
      if (idx !== -1) list[idx] = merged;
      else list.push(merged);
    }
    if (state.profile && state.profile.id === id) {
      state.profile = { ...state.profile, ...(record || patch) };
    }
    persistCacheMirror();
    return record || { id, ...patch };
  }

  async function remove(collectionName, id) {
    const table = tableFor(collectionName);
    await window.C360.api.remove(table, id);
    const cacheKey = cacheKeyFor(collectionName);
    if (cacheKey) {
      const list = state[cacheKey];
      const idx = list.findIndex((item) => item.id === id);
      if (idx !== -1) list.splice(idx, 1);
    }
    persistCacheMirror();
  }

  // NOTA/gap de backend (ver relatório do agente): `stock_movements` está
  // descrito em docs/backend.md §6 como admin-only (única policy de RLS é
  // `stock_movements_all_admin`; não existe policy de INSERT para
  // vendedor). Se um vendedor chamar recordMovement() hoje, o PostgREST
  // devolve 401/permission denied — src/returns.js (recordDevolucao/
  // recordDesperdicio) depende deste método também para o fluxo do
  // vendedor, então esta é uma lacuna real a resolver no schema/RLS, não
  // algo que este arquivo possa contornar sozinho.
  async function recordMovement(payload) {
    ensureBusiness();
    const stamped = { ...payload };
    if (stamped.businessId === undefined) stamped.businessId = state.activeBusinessId;
    const rawRow = await window.C360.api.insert('stock_movements', toSnakeCasePayload(stamped));
    const record = toCamelCaseRow(rawRow) || { id: uid('mov'), ...stamped };
    state.stockMovements.push(record);
    persistCacheMirror();
    return record;
  }

  // ---------------------------------------------------------------------
  // refresh() — repovoa o cache a partir de C360.api, de acordo com o papel
  // do usuário logado.
  // ---------------------------------------------------------------------
  async function refreshAsAdmin(businessId) {
    const api = window.C360.api;
    const [
      businesses, products, clients, suppliers, purchases, stockMovements,
      recipes, productions, sales, orders, consignments, consignmentEvents, tasks,
      profiles, sellerPrices, sellerStock,
    ] = await Promise.all([
      api.list('businesses', { id: businessId }),
      api.list('products', { business_id: businessId, _order: 'name.asc' }),
      api.list('clients', { business_id: businessId }),
      api.list('suppliers', { business_id: businessId }),
      api.list('purchases', { business_id: businessId }),
      api.list('stock_movements', { business_id: businessId }),
      api.list('recipes', { business_id: businessId }),
      api.list('productions', { business_id: businessId }),
      api.list('sales', { business_id: businessId }),
      api.list('orders', { business_id: businessId }),
      api.list('consignments', { business_id: businessId }),
      api.list('consignment_events', { business_id: businessId }),
      api.list('tasks', { business_id: businessId }),
      api.list('profiles', { business_id: businessId }),
      api.list('seller_prices', { business_id: businessId }),
      api.list('seller_stock', { business_id: businessId }),
    ]);

    state.businesses = businesses.map(toCamelCaseRow);
    state.products = products.map(toCamelCaseRow);
    state.clients = clients.map(toCamelCaseRow);
    state.suppliers = suppliers.map(toCamelCaseRow);
    state.purchases = purchases.map(toCamelCaseRow);
    state.stockMovements = stockMovements.map(toCamelCaseRow);
    state.recipes = recipes.map(toCamelCaseRow);
    state.productions = productions.map(toCamelCaseRow);
    state.sales = sales.map(toCamelCaseRow);
    state.orders = orders.map(toCamelCaseRow);
    state.consignments = consignments.map(toCamelCaseRow);
    state.consignmentEvents = consignmentEvents.map(toCamelCaseRow);
    state.tasks = tasks.map(toCamelCaseRow);
    state.profiles = profiles.map(toCamelCaseRow);
    state.sellers = state.profiles.filter((profile) => profile.role === 'vendedor');
    state.sellerPrices = sellerPrices.map(toCamelCaseRow);
    state.sellerStock = sellerStock.map(toCamelCaseRow);

    const [salesGoals, goalsProgress] = await Promise.all([
      api.listSalesGoals(),
      api.listGoalsProgress(),
    ]);
    state.salesGoals = salesGoals;
    state.goalsProgress = goalsProgress;
  }

  async function refreshAsSeller(businessId, userId) {
    const api = window.C360.api;
    const [
      businesses, sellerProducts, clients, sales, orders, consignments,
      consignmentEvents, sellerPrices, sellerStock,
    ] = await Promise.all([
      api.list('businesses', { id: businessId }),
      api.listSellerProducts(businessId),
      api.list('clients', { seller_id: userId }),
      api.list('sales', { seller_id: userId }),
      api.list('orders', { seller_id: userId }),
      api.list('consignments', { seller_id: userId }),
      api.list('consignment_events', { business_id: businessId }),
      api.listSellerPrices(userId),
      api.listSellerStock(userId),
    ]);

    state.businesses = businesses.map(toCamelCaseRow);
    state.products = sellerProducts; // já camelCase (seller_products, sem custo)
    state.clients = clients.map(toCamelCaseRow);
    state.sales = sales.map(toCamelCaseRow);
    state.orders = orders.map(toCamelCaseRow);
    state.consignments = consignments.map(toCamelCaseRow);
    state.consignmentEvents = consignmentEvents.map(toCamelCaseRow);
    state.sellerPrices = sellerPrices;
    state.sellerStock = sellerStock;

    // Tabelas admin-only (RLS devolveria [] mesmo se chamássemos): evitamos
    // o round-trip de rede e já deixamos vazio.
    state.suppliers = [];
    state.purchases = [];
    state.stockMovements = [];
    state.recipes = [];
    state.productions = [];
    state.tasks = [];
    state.profiles = [];
    state.sellers = [];

    const [salesGoals, goalsProgress] = await Promise.all([
      api.listSalesGoals({ sellerId: userId }),
      api.listGoalsProgress({ sellerId: userId }),
    ]);
    state.salesGoals = salesGoals;
    state.goalsProgress = goalsProgress;
  }

  async function refresh() {
    const api = window.C360.api;
    if (!api || typeof api.getCurrentAuthUserId !== 'function') return;

    const userId = api.getCurrentAuthUserId();
    if (!userId) return; // não autenticado; getState() segue servindo o cache atual

    const profile = await api.getProfile(userId);
    if (!profile) return;

    state.profile = profile;
    state.activeBusinessId = profile.businessId || null;

    if (!profile.businessId) {
      // Perfil provisionado sem negócio ainda (bootstrap pendente) — nada
      // mais para buscar além do próprio perfil.
      persistCacheMirror();
      return;
    }

    if (profile.role === 'admin') {
      await refreshAsAdmin(profile.businessId);
    } else {
      await refreshAsSeller(profile.businessId, userId);
    }

    persistCacheMirror();
  }

  window.C360.state = {
    DEFAULT_SETTINGS,
    getState,
    save,
    replaceState,
    reset,
    activeBusiness,
    ensureBusiness,
    byBusiness,
    add,
    addGlobal,
    update,
    remove,
    setActiveBusiness,
    recordMovement,
    getCurrentUser,
    isAdmin,
    refresh,
  };
})();
</script>
  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const { number, money } = window.C360.utils;

  function weightedAverageCost(currentStock, currentAvgCost, incomingQuantity, incomingTotalCost) {
    const stock = number(currentStock);
    const avg = number(currentAvgCost);
    const qty = number(incomingQuantity);
    const total = number(incomingTotalCost);
    const currentValue = Math.max(stock, 0) * avg;
    const newQuantity = Math.max(stock, 0) + qty;
    if (newQuantity <= 0) return 0;
    return (currentValue + total) / newQuantity;
  }

  function calculateRecipeCost(finalProductId, state) {
    const finalProduct = state.products.find((product) => product.id === finalProductId);
    const rows = state.recipes.filter((row) => row.finalProductId === finalProductId);

    const items = rows.map((row) => {
      const input = state.products.find((product) => product.id === row.inputProductId);
      const quantityPerUnit = number(row.quantityPerUnit);
      const avgCost = input ? number(input.avgCost) : 0;
      return {
        ...row,
        input,
        quantityPerUnit,
        avgCost,
        costPerUnit: quantityPerUnit * avgCost,
      };
    });

    const materialsCost = items.reduce((sum, item) => sum + item.costPerUnit, 0);
    const laborCost = number(finalProduct?.laborCostPerUnit);
    const overheadCost = number(finalProduct?.overheadCostPerUnit);
    const baseCost = materialsCost + laborCost + overheadCost;
    const lossPercent = number(finalProduct?.lossPercent) / 100;
    const lossCost = baseCost * Math.max(lossPercent, 0);
    const totalCostPerUnit = baseCost + lossCost;
    const targetMarginPercent = number(finalProduct?.targetMarginPercent) / 100;
    const taxFeePercent = number(finalProduct?.taxFeePercent) / 100;
    const denominator = 1 - targetMarginPercent - taxFeePercent;
    const suggestedSalePrice = denominator > 0.02 ? totalCostPerUnit / denominator : 0;
    const manualSalePrice = number(finalProduct?.salePrice);
    const selectedSalePrice = manualSalePrice > 0 ? manualSalePrice : suggestedSalePrice;
    const grossProfitAtSelectedPrice = selectedSalePrice - (selectedSalePrice * taxFeePercent) - totalCostPerUnit;
    const marginAtSelectedPrice = selectedSalePrice > 0 ? grossProfitAtSelectedPrice / selectedSalePrice : 0;

    return {
      finalProduct,
      items,
      materialsCost,
      laborCost,
      overheadCost,
      baseCost,
      lossCost,
      totalCostPerUnit,
      targetMarginPercent,
      taxFeePercent,
      suggestedSalePrice,
      manualSalePrice,
      selectedSalePrice,
      grossProfitAtSelectedPrice,
      marginAtSelectedPrice,
    };
  }

  function saleMath({ quantity, unitPrice, discount, fixedFees, feePercent, unitCost }) {
    const qty = number(quantity);
    const price = number(unitPrice);
    const grossRevenue = qty * price;
    const percentFees = grossRevenue * (number(feePercent) / 100);
    const netRevenue = grossRevenue - number(discount) - number(fixedFees) - percentFees;
    const cogs = qty * number(unitCost);
    const grossProfit = netRevenue - cogs;
    const margin = netRevenue > 0 ? grossProfit / netRevenue : 0;
    return { grossRevenue, percentFees, netRevenue, cogs, grossProfit, margin };
  }

  function consignmentOpenAmount(consignment) {
    const soldValue = number(consignment.quantitySold) * number(consignment.unitPrice);
    return Math.max(soldValue - number(consignment.amountPaid), 0);
  }

  function consignmentAvailableWithClient(consignment) {
    return number(consignment.quantitySent) - number(consignment.quantitySold) - number(consignment.quantityReturned);
  }

  function businessMetrics(state) {
    const businessId = state.activeBusinessId;
    if (!businessId) {
      return {
        stockValue: 0,
        lowStockCount: 0,
        netRevenue: 0,
        grossProfit: 0,
        consignmentsOpen: 0,
        pendingOrders: 0,
      };
    }

    const products = state.products.filter((product) => product.businessId === businessId);
    const sales = state.sales.filter((sale) => sale.businessId === businessId);
    const consignments = state.consignments.filter((item) => item.businessId === businessId);
    const orders = state.orders.filter((order) => order.businessId === businessId);

    return {
      stockValue: products.reduce((sum, product) => sum + number(product.currentStock) * number(product.avgCost), 0),
      lowStockCount: products.filter((product) => number(product.minStock) > 0 && number(product.currentStock) <= number(product.minStock)).length,
      netRevenue: sales.reduce((sum, sale) => sum + number(sale.netRevenue), 0),
      grossProfit: sales.reduce((sum, sale) => sum + number(sale.grossProfit), 0),
      consignmentsOpen: consignments.reduce((sum, item) => sum + consignmentOpenAmount(item), 0),
      pendingOrders: orders.filter((order) => !['despachado', 'concluido'].includes(order.status)).length,
    };
  }

  // Resolve o preço sugerido e o piso efetivo para um vendedor + produto,
  // espelhando exatamente a prioridade usada pelo trigger de piso de preço
  // no banco (docs/backend.md §7, passos 1-3):
  //   preço: seller_prices.price (se > 0) -> product.salePrice (se > 0) -> product.defaultPrice -> 0
  //   piso:  seller_prices.floor (se não for null/undefined) -> product.priceFloor -> null (sem piso)
  function resolveSellerPrice({ product, sellerPrice } = {}) {
    const sellerOverridePrice = number(sellerPrice?.price);
    const productSalePrice = number(product?.salePrice);
    const price = sellerOverridePrice > 0
      ? sellerOverridePrice
      : (productSalePrice > 0 ? productSalePrice : number(product?.defaultPrice));

    const sellerFloorDefined = sellerPrice != null && sellerPrice.floor !== null && sellerPrice.floor !== undefined;
    const productFloorDefined = product != null && product.priceFloor !== null && product.priceFloor !== undefined;
    const floor = sellerFloorDefined
      ? number(sellerPrice.floor)
      : (productFloorDefined ? number(product.priceFloor) : null);

    return { price, floor };
  }

  // Valida um preço unitário contra o piso efetivo. `floor` nulo/undefined
  // significa "sem piso" (sempre válido) — mesma regra do trigger de banco.
  function validatePriceFloor({ unitPrice, floor } = {}) {
    if (floor === null || floor === undefined) return { ok: true, message: null };
    const price = number(unitPrice);
    const floorValue = number(floor);
    if (price < floorValue) {
      return { ok: false, message: `Preço mínimo para este produto: ${money(floorValue)}` };
    }
    return { ok: true, message: null };
  }

  window.C360.calc = {
    weightedAverageCost,
    calculateRecipeCost,
    saleMath,
    consignmentOpenAmount,
    consignmentAvailableWithClient,
    businessMetrics,
    resolveSellerPrice,
    validatePriceFloor,
  };
})();
</script>

        <div class="cost-item"><span>Preço sugerido ${help('precoSugerido')}</span><strong>${money(cost.suggestedSalePrice)}</strong></div>
      </div>
    `;
  }

  // Arrastar com o mouse (draggable) não funciona em telas touch, então cada
  // cartão também tem um select "mover para" como alternativa — ver
  // app.js handleKanbanMove().
  function kanbanMoveSelect(card, statuses) {
    const options = statuses.map((status) => `<option value="${escapeHtml(status.value)}" ${status.value === card.status ? 'selected' : ''}>${escapeHtml(status.label)}</option>`).join('');
    return `
      <label class="kanban-move">
        <span>Mover para</span>
        <select data-kanban-move data-card-id="${escapeHtml(card.id)}">${options}</select>
      </label>
    `;
  }

  function kanban({ statuses, cards, type }) {
    return `<div class="kanban" data-kanban-type="${escapeHtml(type)}">
      ${statuses.map((status) => {
        const filtered = cards.filter((card) => card.status === status.value);
        return `
          <div class="kanban-column" data-status="${escapeHtml(status.value)}">
            <h3>${escapeHtml(status.label)} ${badge(String(filtered.length))}</h3>
            <div class="kanban-dropzone">
              ${filtered.map((card) => `
                <article class="kanban-card" draggable="true" data-card-id="${escapeHtml(card.id)}">
                  <strong>${escapeHtml(card.title)}</strong>
                  ${card.subtitle ? `<p>${escapeHtml(card.subtitle)}</p>` : ''}
                  ${card.detail ? `<p>${escapeHtml(card.detail)}</p>` : ''}
                  ${kanbanMoveSelect(card, statuses)}
                  <div class="actions">${card.actions || ''}</div>
                </article>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>`;
  }

  window.C360.ui = {
    HELP,
    help,
    fieldLabel,
    optionList,
    table,
    metric,
    badge,
    productName,
    moneyCell,
    stockCell,
    actionButton,
    section,
    formNotice,
    costBox,
    kanban,
    compact,
  };
})();

  <script>
(function () {
  'use strict';

  window.C360 = window.C360 || {};
  const U = window.C360.utils;
  const UI = window.C360.ui;

  // ==========================================================================
  // Autenticação (login/logout/sessão) + tela de gestão de vendedores (admin).
  //
  // Depende de window.C360.api e window.C360.state, implementados em paralelo
  // por outro agente (ver docs/backend.md). Os métodos são acessados de forma
  // preguiçosa (api()/state() abaixo) em vez de capturados no topo do arquivo,
  // porque a ordem de carregamento dos <script> entre auth.js/api.js/state.js
  // é responsabilidade do integrador — não presumimos qual carrega primeiro.
  //
  // API consumida (contrato, ver docs/backend.md):
  //   C360.api.signInWithPassword(email, password) -> {accessToken, refreshToken, expiresAt, user}
  //   C360.api.refreshSession(refreshToken)         -> {accessToken, refreshToken, expiresAt, user}
  //   C360.api.signOut(accessToken)                 -> void
  //   C360.api.getAuthUser(accessToken)              -> {id, email}
  //   C360.api.getProfile(userId)                    -> {id, role, name, businessId, active}
  //   C360.api.createSeller({email, password, name}) -> {id, email, name, role, businessId}
  //   C360.api.listSellers()                         -> Array<{id, name, active}>
  //   (opcional, usado só se existir) C360.api.update('profiles', id, patch)
  //
  //   C360.state.getState() / C360.state.refresh() / C360.state.getCurrentUser()
  //   C360.state.isAdmin() / (opcional) C360.state.update('profiles', id, patch)
  //   (opcional) C360.state.reset()
  //
  // Premissa assumida (não coberta explicitamente pelo contrato): os métodos
  // de domínio do C360.api que não recebem accessToken como parâmetro (ex.:
  // listSellers, createSeller) presumem que o próprio C360.api guarda
  // internamente o token da sessão ativa a partir das chamadas a
  // signInWithPassword/refreshSession. Este módulo não expõe o token para
  // fora de si mesmo além de passá-lo explicitamente nas chamadas que o
  // contrato define com esse parâmetro (getAuthUser, signOut). Se essa
  // premissa estiver errada, o integrador precisa adicionar uma ponte entre
  // auth.js e api.js para compartilhar o token atual.
  // ==========================================================================

  const STORAGE_KEY = 'controle360_session_v1';

  // ---------------------------------------------------------------------
  // Acesso preguiçoso aos módulos vizinhos
  // ---------------------------------------------------------------------
  function api() {
    return window.C360.api || null;
  }

  function state() {
    return window.C360.state || null;
  }

  // ---------------------------------------------------------------------
  // Armazenamento da sessão (accessToken / refreshToken / expiresAt)
  // ---------------------------------------------------------------------
  function persistSession(session) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        accessToken: session.accessToken,
        refreshToken: session.refreshToken,
        expiresAt: session.expiresAt,
      }));
    } catch (error) {
      console.error('C360.auth: erro ao salvar sessão local.', error);
    }
  }

  function readStoredSession() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object' || !parsed.refreshToken) return null;
      return parsed;
    } catch (error) {
      console.error('C360.auth: erro ao ler sessão local.', error);
      return null;
    }
  }

  function clearStoredSession() {
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (error) {
      console.error('C360.auth: erro ao limpar sessão local.', error);
    }
  }

  // ---------------------------------------------------------------------
  // Perfil + validação de conta ativa
  // ---------------------------------------------------------------------
  async function fetchProfile(accessToken) {
    const authUser = await api().getAuthUser(accessToken);
    if (!authUser || !authUser.id) throw new Error('Não foi possível identificar o usuário logado.');
    return api().getProfile(authUser.id);
  }

  async function safeSignOutToken(accessToken) {
    try {
      await api().signOut(accessToken);
    } catch (error) {
      console.error('C360.auth: erro ao encerrar sessão desativada no servidor.', error);
    }
  }

  // ---------------------------------------------------------------------
  // Mapeamento de erros -> mensagens amigáveis em PT-BR
  // ---------------------------------------------------------------------
  function mapSignInError(error) {
    const message = String((error && error.message) || '').trim();
    const lower = message.toLowerCase();
    if (lower.includes('invalid login credentials') || lower.includes('invalid_grant')) {
      return 'E-mail ou senha inválidos.';
    }
    if (lower.includes('email not confirmed')) {
      return 'Confirme seu e-mail antes de entrar.';
    }
    if (error && error.status === 429) {
      return 'Muitas tentativas. Aguarde um instante e tente novamente.';
    }
    if (message) return message;
    return 'Não foi possível entrar. Verifique sua conexão e tente novamente.';
  }

  function mapCreateSellerError(error) {
    const status = error && error.status;
    const message = String((error && error.message) || '').trim();
    const lower = message.toLowerCase();

    if (status === 403 || lower.includes('permiss')) {
      return 'Você não tem permissão para criar vendedores.';
    }
    if (status === 409 || lower.includes('já está em uso') || lower.includes('already') || lower.includes('duplicate')) {
      return 'Este e-mail já está em uso.';
    }
    if (status === 401) {
      return 'Sua sessão expirou. Faça login novamente.';
    }
    if (status === 400) {
      return message || 'Dados inválidos. Verifique nome, e-mail e senha (mínimo 6 caracteres).';
    }
    if (status === 500) {
      return message || 'Erro interno do servidor. Tente novamente em instantes.';
    }
    return message || 'Não foi possível criar o vendedor. Tente novamente.';
  }

  // ---------------------------------------------------------------------
  // API pública: signIn / signOut / restoreSession
  // ---------------------------------------------------------------------
  async function signIn(email, password) {
    const trimmedEmail = String(email || '').trim();
    const pwd = String(password || '');
    if (!trimmedEmail || !pwd) {
      return { ok: false, error: 'Informe e-mail e senha.' };
    }
    if (!api() || typeof api().signInWithPassword !== 'function') {
      return { ok: false, error: 'Serviço de autenticação indisponível no momento.' };
    }

    let session;
    try {
      session = await api().signInWithPassword(trimmedEmail, pwd);
    } catch (error) {
      return { ok: false, error: mapSignInError(error) };
    }

    persistSession(session);

    try {
      const profile = await fetchProfile(session.accessToken);
      if (!profile || profile.active === false) {
        await safeSignOutToken(session.accessToken);
        clearStoredSession();
        return { ok: false, error: 'Sua conta foi desativada. Fale com o administrador.' };
      }
    } catch (error) {
      clearStoredSession();
      console.error('C360.auth: erro ao carregar perfil após login.', error);
      return { ok: false, error: 'Login feito, mas não foi possível carregar seu perfil. Tente novamente.' };
    }

    try {
      if (state() && typeof state().refresh === 'function') {
        await state().refresh();
      }
    } catch (error) {
      // Sessão e perfil são válidos; não bloqueamos o login por uma falha ao
      // atualizar o cache de dados — o usuário pode tentar recarregar depois.
      console.error('C360.auth: erro ao atualizar estado após login.', error);
    }

    return { ok: true };
  }

  async function signOut() {
    const stored = readStoredSession();
    if (stored && stored.accessToken && api() && typeof api().signOut === 'function') {
      try {
        await api().signOut(stored.accessToken);
      } catch (error) {
        console.error('C360.auth: erro ao encerrar sessão no servidor.', error);
      }
    }
    clearStoredSession();
    if (state() && typeof state().reset === 'function') {
      try {
        state().reset();
      } catch (error) {
        console.error('C360.auth: erro ao limpar estado local.', error);
      }
    }
  }

  async function restoreSession() {
    const stored = readStoredSession();
    if (!stored || !stored.refreshToken) return false;
    if (!api() || typeof api().refreshSession !== 'function') return false;

    let session;
    try {
      session = await api().refreshSession(stored.refreshToken);
    } catch (error) {
      clearStoredSession();
      return false;
    }

    persistSession(session);

    try {
      const profile = await fetchProfile(session.accessToken);
      if (!profile || profile.active === false) {
        clearStoredSession();
        return false;
      }
    } catch (error) {
      clearStoredSession();
      return false;
    }

    try {
      if (state() && typeof state().refresh === 'function') {
        await state().refresh();
      }
    } catch (error) {
      console.error('C360.auth: erro ao atualizar estado ao restaurar sessão.', error);
    }

    return true;
  }

  function getCurrentUser() {
    return (state() && typeof state().getCurrentUser === 'function') ? state().getCurrentUser() : null;
  }

  function isAdmin() {
    return !!(state() && typeof state().isAdmin === 'function' && state().isAdmin());
  }

  // ---------------------------------------------------------------------
  // Tela de login (também serve como gate "não autenticado")
  // Classes novas: .auth-screen, .auth-title, .auth-subtitle (ver relatório).
  // Demais classes são reaproveitadas de styles/main.css (.grid-form,
  // .notice/.notice.error, botão padrão).
  // ---------------------------------------------------------------------
  function render() {
    return `
      <div class="auth-screen">
        <h1 class="auth-title">Controle360</h1>
        <p class="auth-subtitle">Entre com seu e-mail e senha para continuar.</p>
        <div id="authError"></div>
        <form id="authLoginForm" class="grid-form" novalidate>
          <label class="full">E-mail
            <input type="email" name="email" required autocomplete="username" inputmode="email" placeholder="voce@exemplo.com">
          </label>
          <label class="full">Senha
            <input type="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
          </label>
          <button type="submit">Entrar</button>
        </form>
      </div>
    `;
  }

  function mount(container, options = {}) {
    if (!container) return;
    const onSuccess = (options && typeof options.onSuccess === 'function') ? options.onSuccess : function () {};

    function errorHost() {
      return container.querySelector('#authError');
    }

    function showError(message) {
      const host = errorHost();
      if (host) host.innerHTML = UI.formNotice(message, 'error');
    }

    function clearError() {
      const host = errorHost();
      if (host) host.innerHTML = '';
    }

    async function handleSubmit(event) {
      const form = event.target.closest('#authLoginForm');
      if (!form || !container.contains(form)) return;
      event.preventDefault();
      clearError();

      const data = U.formData(form);
      const email = (data.email || '').trim();
      const password = data.password || '';
      if (!email || !password) {
        showError('Informe e-mail e senha.');
        return;
      }

      const submitButton = form.querySelector('button[type="submit"]');
      const originalLabel = submitButton ? submitButton.textContent : '';
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = 'Entrando...';
      }

      try {
        const result = await signIn(email, password);
        if (result.ok) {
          onSuccess();
        } else {
          showError(result.error || 'Não foi possível entrar.');
        }
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalLabel;
        }
      }
    }

    container.addEventListener('submit', handleSubmit);
  }

  // ---------------------------------------------------------------------
  // Tela de gestão de vendedores (admin)
  // ---------------------------------------------------------------------
  function sellerRow(seller) {
    const isActive = seller.active !== false;
    const statusBadge = isActive ? UI.badge('Ativo', 'ok') : UI.badge('Inativo', 'warn');
    const toggleAction = isActive ? 'deactivate-seller' : 'activate-seller';
    const toggleLabel = isActive ? 'Desativar' : 'Reativar';
    const toggleClass = isActive ? 'danger' : 'secondary';
    return [
      U.escapeHtml(seller.name || '—'),
      U.escapeHtml(seller.email || '—'),
      statusBadge,
      `<div class="actions">${UI.actionButton(toggleAction, seller.id, toggleLabel, toggleClass)}</div>`,
    ];
  }

  function renderSellers(data = {}) {
    const sellers = Array.isArray(data.sellers) ? data.sellers : [];
    const loading = !!data.loading;
    const rows = sellers.map(sellerRow);
    const listHtml = loading
      ? UI.formNotice('Carregando vendedores...', 'info')
      : UI.table(['Nome', 'E-mail', 'Status', 'Ações'], rows, 'Nenhum vendedor cadastrado ainda.');

    return UI.section(
      'Vendedores',
      'Crie contas de vendedores e gerencie o acesso deles. Desativar não apaga os dados do vendedor.',
      `
        <div id="authSellersError"></div>
        <form id="authCreateSellerForm" class="grid-form">
          <label class="full">Nome
            <input name="name" required placeholder="Nome do vendedor">
          </label>
          <label>E-mail
            <input type="email" name="email" required autocomplete="off" placeholder="vendedor@exemplo.com">
          </label>
          <label>Senha provisória
            <input type="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
          </label>
          <button type="submit">Criar vendedor</button>
        </form>
        ${listHtml}
      `
    );
  }

  function mountSellers(container) {
    if (!container) return null;

    let sellers = [];
    let loading = true;

    function paint() {
      container.innerHTML = renderSellers({ sellers, loading });
    }

    function errorHost() {
      return container.querySelector('#authSellersError');
    }

    function showError(message) {
      const host = errorHost();
      if (host) host.innerHTML = UI.formNotice(message, 'error');
    }

    function clearError() {
      const host = errorHost();
      if (host) host.innerHTML = '';
    }

    async function loadSellers() {
      loading = true;
      paint();
      let list = [];
      let loadError = '';
      try {
        if (!api() || typeof api().listSellers !== 'function') {
          throw new Error('Serviço de vendedores indisponível no momento.');
        }
        const result = await api().listSellers();
        list = Array.isArray(result) ? result : [];
      } catch (error) {
        loadError = (error && error.message) || 'Não foi possível carregar os vendedores.';
      }
      sellers = list;
      loading = false;
      paint();
      if (loadError) showError(loadError);
    }

    container.addEventListener('submit', async (event) => {
      const form = event.target.closest('#authCreateSellerForm');
      if (!form || !container.contains(form)) return;
      event.preventDefault();
      clearError();

      const data = U.formData(form);
      const name = (data.name || '').trim();
      const email = (data.email || '').trim();
      const password = data.password || '';

      if (!name) { showError('Informe o nome do vendedor.'); return; }
      if (!email) { showError('Informe o e-mail do vendedor.'); return; }
      if (password.length < 6) { showError('A senha provisória precisa ter ao menos 6 caracteres.'); return; }

      const submitButton = form.querySelector('button[type="submit"]');
      const originalLabel = submitButton ? submitButton.textContent : '';
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = 'Criando...';
      }

      try {
        if (!api() || typeof api().createSeller !== 'function') {
          throw new Error('Serviço de vendedores indisponível no momento.');
        }
        await api().createSeller({ email, password, name });
        form.reset();
        await loadSellers();
      } catch (error) {
        showError(mapCreateSellerError(error));
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalLabel;
        }
      }
    });

    container.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-action]');
      if (!button || !container.contains(button)) return;
      const { action, id } = button.dataset;
      if (action !== 'deactivate-seller' && action !== 'activate-seller') return;

      const nextActive = action === 'activate-seller';
      if (action === 'deactivate-seller'
        && !confirm('Desativar este vendedor? Os dados dele são mantidos, só o acesso é bloqueado.')) {
        return;
      }

      clearError();
      button.disabled = true;
      try {
        if (state() && typeof state().update === 'function') {
          await state().update('profiles', id, { active: nextActive });
        } else if (api() && typeof api().update === 'function') {
          await api().update('profiles', id, { active: nextActive });
        } else {
          throw new Error('Não foi possível atualizar o status do vendedor: nenhuma API disponível.');
        }
        await loadSellers();
      } catch (error) {
        showError((error && error.message) || 'Não foi possível atualizar o status do vendedor.');
        button.disabled = false;
      }
    });

    paint();
    loadSellers();

    return { refresh: loadSellers };
  }

  window.C360.auth = {
    signIn,
    signOut,
    restoreSession,
    getCurrentUser,
    isAdmin,
    render,
    mount,
    renderSellers,
    mountSellers,
  };
})();
</script>
